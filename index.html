/* ══════════════════ CONFRONTO METE ══════════════════ */
function ConfrontoScreen({pois,camper,onBack}){
  const results=useMemo(()=>{
    return pois.map(p=>{
      const cacheKey="oit_cache_"+p.id;
      const cached=LS.getJ(cacheKey);
      const hasCache=cached&&(Date.now()-cached.timestamp<7*24*3600*1000);
      return{poi:p,cached:hasCache?cached:null};
    });
  },[pois]);
  const bestIdx=useMemo(()=>{
    let best=-1,bestScore=-1;
    results.forEach((r,i)=>{if(r.cached&&r.cached.score&&r.cached.score.score>bestScore){bestScore=r.cached.score.score;best=i;}});
    return best;
  },[results]);
  return(
    <div className="pg fade">
      <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:8}}>
        <button className="btn bgh bsm" onClick={onBack}>← {t("back")}</button>
        <div style={{fontFamily:"Poppins",fontWeight:800,fontSize:14}}>⚖️ Confronto {pois.length} mete</div>
      </div>
      <div style={{overflowX:"auto",paddingBottom:8}}>
        <table style={{width:"100%",borderCollapse:"separate",borderSpacing:6,fontSize:11}}>
          <thead>
            <tr>
              <td style={{fontWeight:700,color:"var(--text2)",padding:4,minWidth:90}}></td>
              {results.map((r,i)=>(
                <td key={i} style={{padding:6,background:bestIdx===i?"#dcfce7":"var(--card)",border:"1.5px solid "+(bestIdx===i?"#86efac":"var(--border2)"),borderRadius:10,minWidth:120,verticalAlign:"top",textAlign:"center"}}>
                  <div style={{fontWeight:700,fontSize:12,marginBottom:4}}>{r.poi.name}</div>
                  {bestIdx===i&&<span style={{background:"#16a34a",color:"#fff",borderRadius:6,padding:"1px 6px",fontSize:9,fontWeight:700}}>Migliore</span>}
                </td>
              ))}
            </tr>
          </thead>
          <tbody>
            {[
              ["Punteggio",r=>r.cached?.score?r.cached.score.score+"/100":"—"],
              ["Verdetto",r=>r.cached?.analysis?({ok:"✅ Adatto",warn:"⚠️ Riserva",no:"🔴 Non adatto"}[r.cached.analysis.verdict]||"—"):"—"],
              ["Distanza",r=>r.cached?.routing?.dist?r.cached.routing.dist+"km":"—"],
              ["Tempo",r=>r.cached?.routing?.time?r.cached.routing.time+"min":"—"],
              ["Confidenza",r=>r.cached?.analysis?.confidence?r.cached.analysis.confidence+"%":"—"],
              ["Distanza",r=>r.poi.distKm<99?(r.poi.distKm<1?(r.poi.distKm*1000).toFixed(0)+"m":r.poi.distKm.toFixed(1)+"km"):"—"],
            ].map(([label,fn])=>(
              <tr key={label}>
                <td style={{fontWeight:600,color:"var(--text2)",padding:"4px 6px"}}>{label}</td>
                {results.map((r,i)=>(
                  <td key={i} style={{padding:"4px 6px",textAlign:"center",background:bestIdx===i?"#f0fdf4":"transparent",borderRadius:6}}>{fn(r)}</td>
                ))}
              </tr>
            ))}
            <tr>
              <td style={{fontWeight:600,color:"var(--text2)",padding:"4px 6px"}}>Stato</td>
              {results.map((r,i)=>(
                <td key={i} style={{padding:"4px 6px",textAlign:"center",fontSize:10}}>
                  {r.cached?<span style={{color:"#16a34a",fontWeight:700}}>📦 Analizzato</span>:<span style={{color:"#94a3b8"}}>{t("notAnalyzed")}</span>}
                </td>
              ))}
            </tr>
            <tr>
              <td style={{fontWeight:600,color:"var(--text2)",padding:"4px 6px"}}>Sintesi</td>
              {results.map((r,i)=>(
                <td key={i} style={{padding:"4px 6px",fontSize:10,lineHeight:1.5,color:"var(--text2)"}}>{r.cached?.analysis?.sintesi||"—"}</td>
              ))}
            </tr>
          </tbody>
        </table>
      </div>
      {results.some(r=>!r.cached)&&(
        <div style={{fontSize:11,color:"#a16207",background:"#fef9c3",borderRadius:8,padding:"8px 10px",textAlign:"center"}}>
          ⚠️ Alcune mete non hanno ancora dati in cache. Analizzale singolarmente prima di confrontare.
        </div>
      )}
    </div>
  );
}
/* ══════════════════ TAB CERCA ══════════════════ */
function TabCerca({camper,ttKey,geminiKey,groqKey,cerebrasKey,orsKey,mapillaryKey,onSaveOversize,onSaveCert,onCenterChange,oversizeItems,certItems,t,lang}){
  const [q,setQ]=useState("");
  const [loading,setLoading]=useState(false);
  const [center,setCenter]=useState({lat:41.9,lng:12.5});
  const [zoom,setZoom]=useState(6);
  const [destMk,setDestMk]=useState(null);
  const [pois,setPois]=useState([]);
  const [searched,setSearched]=useState(false);
  const [selPoi,setSelPoi]=useState(null);
  const [filter,setFilter]=useState("all");
  const [searchHistory,setSearchHistory]=useState(()=>LS.getJ("oit_search_history")||[]);
  const [compareMode,setCompareMode]=useState(false);
  const [compareList,setCompareList]=useState([]);
  const [showConfronto,setShowConfronto]=useState(false);
  /* ─── Autocomplete suggestions (Nominatim) ─── */
  const [suggestions,setSuggestions]=useState([]);
  const [showSugg,setShowSugg]=useState(false);
  const suggTimer=useRef(null);
  const suggCache=useRef({});
  function fetchSuggestions(text){
    if(suggTimer.current)clearTimeout(suggTimer.current);
    if(!text||text.trim().length<2){setSuggestions([]);setShowSugg(false);return;}
    const cacheKey=text.trim().toLowerCase();
    if(suggCache.current[cacheKey]){setSuggestions(suggCache.current[cacheKey]);setShowSugg(true);return;}
    suggTimer.current=setTimeout(async()=>{
      try{
        const r=await fetch(
          "https://nominatim.openstreetmap.org/search?q="+encodeURIComponent(text.trim())+"&format=json&limit=6&addressdetails=1&accept-language=it,en",
          {headers:{"User-Agent":"OversizeInTour/1.0"},signal:AbortSignal.timeout(4000)}
        );
        const d=await r.json();
        const items=(d||[]).map(function(s){
          const parts=[];
          const a=s.address||{};
          if(a.tourism||a.leisure)parts.push(a.tourism||a.leisure);
          if(a.city||a.town||a.village||a.municipality)parts.push(a.city||a.town||a.village||a.municipality);
          if(a.county||a.state)parts.push(a.county||a.state);
          if(a.country)parts.push(a.country);
          const subtitle=parts.join(", ");
          const typeIco=s.type==="camp_site"||s.type==="caravan_site"?"🏕":
                        s.type==="city"||s.type==="town"||s.type==="village"?"🏙":
                        s.type==="lake"||s.type==="water"?"🌊":
                        s.type==="beach"?"🏖":
                        s.type==="mountain"||s.type==="peak"?"🏔":
                        s.type==="island"?"🏝":
                        s.class==="boundary"?"📍":
                        s.class==="tourism"?"⛺":"📍";
          return{
            display:s.display_name||text,
            short:(s.name||"").length>0?s.name:s.display_name?.split(",")[0]||text,
            subtitle,typeIco,
            lat:parseFloat(s.lat),lng:parseFloat(s.lon)
          };
        }).filter(function(s){return s.short&&s.short.length>1;});
        suggCache.current[cacheKey]=items;
        setSuggestions(items);
        setShowSugg(items.length>0);
      }catch(e){/* silently fail */}
    },320);
  }
  function handleInputChange(e){
    const v=e.target.value;
    setQ(v);
    fetchSuggestions(v);
  }
  function selectSuggestion(s){
    setQ(s.short);
    setSuggestions([]);
    setShowSugg(false);
  }

  if(showConfronto&&compareList.length>=2)return<ConfrontoScreen pois={compareList} camper={camper} onBack={()=>setShowConfronto(false)}/>;
  if(selPoi)return<AnalisiScreen poi={selPoi} camper={camper} ttKey={ttKey} geminiKey={geminiKey} groqKey={groqKey} cerebrasKey={cerebrasKey} orsKey={orsKey} mapillaryKey={mapillaryKey}
    onBack={()=>setSelPoi(null)} onSave={onSaveOversize} onSaveCert={onSaveCert} t={t} lang={lang}/>;

  async function cerca(){
    if(!q.trim())return;
    setShowSugg(false);setSuggestions([]);
    setLoading(true);setPois([]);setSelPoi(null);setSearched(true);
    try{
      const coord=await geocode(null,q);
      if(coord){
        setCenter({lat:coord.lat,lng:coord.lng});setZoom(11);
        setDestMk({id:"dest",lat:coord.lat,lng:coord.lng,name:q,isDest:true,sub:"Destinazione"});
        if(onCenterChange)onCenterChange({lat:coord.lat,lng:coord.lng,city:q.split(",")[0].trim()});
        const found=await searchPOIs(null,coord.lat,coord.lng);
        setPois(found);
        // Save search history
        if(found.length>0){
          const history=LS.getJ("oit_search_history")||[];
          const entry={q:q.trim(),lat:coord.lat,lng:coord.lng,count:found.length,ts:Date.now()};
          const updated=[entry,...history.filter(h=>h.q.toLowerCase()!==q.trim().toLowerCase())].slice(0,10);
          LS.setJ("oit_search_history",updated);
          setSearchHistory(updated);
        }
      }
    }catch(e){}
    setLoading(false);
  }

  const filtered=filter==="all"?pois:filter==="sosta"?pois.filter(p=>!p.isCamp&&!p.isDump):filter==="dump"?pois.filter(p=>p.isDump):pois.filter(p=>p.isCamp);
  const mapMarkers=[
    ...(destMk?[destMk]:[]),
    ...pois.map(p=>({...p,isDest:false,sub:p.address+(p.distKm<99?" · "+(p.distKm<1?(p.distKm*1000).toFixed(0)+"m":p.distKm.toFixed(1)+"km"):""),_markerColor:p.isDump?"#16a34a":p.isCamp?"#8b5cf6":"#3b82f6"}))
  ];
  return(
    <div className="pg">
      <div className="hero">
        <img src={CAMPER_IMG_HERO} style={{position:"absolute",right:-10,bottom:-5,height:70,opacity:.18,pointerEvents:"none"}} alt=""/>
        <h2>{t("findStop")}</h2>
        <p>{t("heroDesc",camper.length)}</p>
      </div>
      {/* Search with autocomplete */}
      <div style={{position:"relative"}}>
        <div className="sbar">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#adb5bd" strokeWidth="2.2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input placeholder="Es: Lago di Garda, Côte d'Azur, Barcelona, Bayern..." value={q}
            onChange={handleInputChange}
            onKeyDown={e=>{if(e.key==="Enter"){setShowSugg(false);cerca();}if(e.key==="Escape")setShowSugg(false);}}
            onFocus={()=>{if(suggestions.length>0)setShowSugg(true);}}
            onBlur={()=>setTimeout(()=>setShowSugg(false),200)}
            autoComplete="off"/>
          {q&&<button onClick={()=>{setQ("");setPois([]);setSearched(false);setDestMk(null);setZoom(6);setCenter({lat:41.9,lng:12.5});setSuggestions([]);setShowSugg(false);}} style={{border:"none",background:"none",color:"#adb5bd",cursor:"pointer",fontSize:20}}>×</button>}
        </div>
        {/* Autocomplete dropdown */}
        {showSugg&&suggestions.length>0&&(
          <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:500,background:"#fff",border:"1.5px solid #e2e8f0",borderTop:"none",borderRadius:"0 0 14px 14px",boxShadow:"0 8px 24px rgba(0,0,0,.12)",maxHeight:280,overflowY:"auto"}}>
            {suggestions.map(function(s,i){return(
              <div key={i} onClick={function(){selectSuggestion(s);}}
                style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",cursor:"pointer",borderBottom:i<suggestions.length-1?"1px solid #f1f5f9":"none",transition:"background .15s"}}
                onMouseEnter={function(e){e.currentTarget.style.background="#fefce8";}}
                onMouseLeave={function(e){e.currentTarget.style.background="#fff";}}>
                <span style={{fontSize:20,flexShrink:0,width:28,textAlign:"center"}}>{s.typeIco}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:13,color:"#1a1a2e",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.short}</div>
                  <div style={{fontSize:10,color:"#94a3b8",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginTop:1}}>{s.subtitle}</div>
                </div>
                <span style={{fontSize:11,color:"#b8860b",fontWeight:600,flexShrink:0}}>→</span>
              </div>
            );})}
            <div style={{padding:"6px 14px",fontSize:10,color:"#cbd5e1",textAlign:"center",borderTop:"1px solid #f1f5f9"}}>
              Powered by OpenStreetMap/Nominatim
            </div>
          </div>
        )}
      </div>
      <button className="btn bto" style={{width:"100%"}} onClick={cerca} disabled={loading||!q.trim()}>
        {loading?<><span className="spin"/>{t("searching")}</>:("🔍 "+t("searchBtn"))}
      </button>
      {/* Search History */}
      {!q&&!searched&&searchHistory.length>0&&(
        <div style={{background:"var(--card)",borderRadius:12,border:"1px solid var(--border)",padding:"10px 12px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
            <span style={{fontSize:11,fontWeight:700,color:"var(--text2)"}}>🕒 {t("recentSearches")}</span>
            <button onClick={()=>{LS.del("oit_search_history");setSearchHistory([]);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:10,color:"#dc2626",fontWeight:600}}>🗑 {t("clearHistory")}</button>
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {searchHistory.map((h,i)=>(
              <button key={i} onClick={()=>{setQ(h.q);setShowSugg(false);setLoading(true);setPois([]);setSelPoi(null);setSearched(true);(async()=>{try{const coord=await geocode(null,h.q);if(coord){setCenter({lat:coord.lat,lng:coord.lng});setZoom(11);setDestMk({id:"dest",lat:coord.lat,lng:coord.lng,name:h.q,isDest:true,sub:"Destinazione"});if(onCenterChange)onCenterChange({lat:coord.lat,lng:coord.lng,city:h.q.split(",")[0].trim()});const found=await searchPOIs(null,coord.lat,coord.lng);setPois(found);}}catch(e){}setLoading(false);})();}} style={{
                padding:"5px 10px",borderRadius:99,border:"1.5px solid var(--border2)",
                background:"var(--bg)",fontSize:11,fontWeight:600,color:"var(--text2)",cursor:"pointer",
                display:"flex",alignItems:"center",gap:4
              }}>
                📍 {h.q} <span style={{fontSize:9,color:"var(--text3)"}}>({h.count})</span>
              </button>
            ))}
          </div>
        </div>
      )}
      {/* Link esterni per la ricerca manuale */}
      {destMk&&(
        <div style={{display:"flex",gap:6}}>
          <a href={"https://www.google.com/maps/search/campeggi+aree+sosta+camper/@"+destMk.lat+","+destMk.lng+",12z"} target="_blank" style={{textDecoration:"none",flex:1}}>
            <button className="btn bsm bgh" style={{width:"100%"}}>🗺 Google Maps</button>
          </a>
        </div>
      )}
      {/* Mappa */}
      {searched&&(
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"2px 2px 8px"}}>
            <div style={{fontFamily:"Poppins",fontWeight:700,fontSize:13}}>
              {pois.length>0?pois.length+t("structuresFound"):(loading?t("searchInProgress"):t("noStructures"))}
            </div>
            <div style={{fontSize:9,color:"#94a3b8"}}>🟠 meta · 🟣 camp · 🔵 sosta</div>
          </div>
          <div className="mwrap">
            <TomMap ttKey={ttKey} center={center} zoom={zoom} markers={mapMarkers}
              onPoiClick={p=>setSelPoi(p)} height={260}/>
          </div>
          {pois.length>0&&<div style={{fontSize:11,color:"#94a3b8",textAlign:"center",padding:"5px 0"}}>
            👆 Tocca un punto sulla mappa o seleziona dalla lista sotto
          </div>}
        </div>
      )}
      {/* Filtri + Lista */}
      {pois.length>0&&(
        <>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
            {[["all",t("allFilter")+" ("+pois.length+")"],["sosta","🅿️ "+t("restAreas")],["camp","🏕 "+t("campsites")],["dump","🚰 "+t("dumpStations")]].map(([v,l])=>(
              <button key={v} onClick={()=>setFilter(v)} style={{
                padding:"5px 10px",borderRadius:99,border:"1.5px solid",
                borderColor:filter===v?"#b8860b":"#e2e8f0",
                background:filter===v?"#fefce8":"#fff",
                fontSize:11,fontWeight:700,color:filter===v?"#996515":"#64748b",cursor:"pointer"
              }}>{l}</button>
            ))}
            <button onClick={()=>{setCompareMode(!compareMode);if(compareMode)setCompareList([]);}} style={{
              padding:"5px 10px",borderRadius:99,border:"1.5px solid",
              borderColor:compareMode?"#7c3aed":"#e2e8f0",
              background:compareMode?"#f3e8ff":"#fff",
              fontSize:11,fontWeight:700,color:compareMode?"#7c3aed":"#64748b",cursor:"pointer"
            }}>⚖️ {t("compare")}</button>
          </div>
          {compareMode&&compareList.length>0&&(
            <div style={{display:"flex",gap:6,alignItems:"center",background:"#f3e8ff",borderRadius:10,padding:"8px 12px",border:"1.5px solid #ddd6fe"}}>
              <span style={{fontSize:11,color:"#7c3aed",fontWeight:600}}>{compareList.length}/3 selezionate</span>
              {compareList.length>=2&&(
                <button className="btn bsm" style={{marginLeft:"auto",background:"#7c3aed",color:"#fff",border:"none"}} onClick={()=>setShowConfronto(true)}>⚖️ Confronta selezionati</button>
              )}
              <button className="btn bsm" style={{background:"#fee2e2",color:"#dc2626",border:"none"}} onClick={()=>setCompareList([])}>Annulla</button>
            </div>
          )}
          <div className="card">
            <div style={{fontFamily:"Poppins",fontWeight:700,fontSize:13,marginBottom:10,display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontSize:14}}>📍</span>
              {"Strutture trovate \u2014 tocca per analisi AI"}
            </div>
            {filtered.map(p=>{
              const isInCompare=compareList.some(c=>c.id===p.id);
              /* ⭐ Check se è nei preferiti */
              const isFav=oversizeItems&&oversizeItems.some(f=>f.lat&&p.lat&&Math.abs(f.lat-p.lat)<0.002&&Math.abs(f.lng-p.lng)<0.002);
              /* 🏅 Check se è certificato */
              const isCert=certItems&&certItems.some(c=>c.lat&&p.lat&&Math.abs(c.lat-p.lat)<0.002&&Math.abs(c.lng-p.lng)<0.002);
              const hasDimWarn=p._sizeWarnings&&p._sizeWarnings.length>0;
              return(
              <div key={p.id} className="poi-row" onClick={()=>{if(compareMode){if(isInCompare){setCompareList(prev=>prev.filter(c=>c.id!==p.id));}else if(compareList.length<3){setCompareList(prev=>[...prev,p]);}return;}setSelPoi(p);}} style={{...(isInCompare?{borderColor:"#7c3aed",background:"#faf5ff"}:isCert?{borderColor:"#16a34a",background:"#f0fdf4"}:isFav?{borderColor:"#b8860b",background:"#fefce8"}:{}),opacity:hasDimWarn?0.7:1}}>
                {compareMode&&(
                  <div style={{width:22,height:22,borderRadius:6,border:"2px solid "+(isInCompare?"#7c3aed":"#cbd5e1"),background:isInCompare?"#7c3aed":"#fff",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:12,color:"#fff"}}>
                    {isInCompare?"✓":""}
                  </div>
                )}
                <div className="poi-ico" style={{background:p.isDump?"#dcfce7":p.isCamp?"#fdf4ff":"#eff6ff",position:"relative"}}>
                  {p.isDump?"🚰":p.isCamp?"🏕":p.isStellplatz?"🚐":"🅿️"}
                  {isFav&&<span style={{position:"absolute",top:-4,right:-4,fontSize:12,filter:"drop-shadow(0 1px 1px rgba(0,0,0,.3))"}}>⭐</span>}
                  {isCert&&<img src={typeof CAMPER_IMG_SM!=="undefined"?CAMPER_IMG_SM:""} style={{position:"absolute",bottom:-4,right:-6,width:18,height:"auto",filter:"drop-shadow(0 1px 1px rgba(0,0,0,.3))"}} alt="✓"/>}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:4}}>
                    <div style={{fontWeight:700,fontSize:13,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",flex:1}}>{p.name}</div>
                    {isFav&&<span style={{fontSize:9,fontWeight:700,padding:"1px 4px",borderRadius:4,background:"#fefce8",color:"#b8860b",border:"1px solid #d4a017",flexShrink:0}}>⭐ Preferito</span>}
                    {isCert&&<span style={{fontSize:9,fontWeight:700,padding:"1px 4px",borderRadius:4,background:"#dcfce7",color:"#16a34a",border:"1px solid #86efac",flexShrink:0}}>🏅 Certificato</span>}
                    {p._rating&&<span style={{fontSize:9,color:"#f59e0b",fontWeight:700,flexShrink:0}}>★{p._rating}</span>}
                  </div>
                  <div style={{fontSize:11,color:"#64748b",marginTop:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.address}{p._fee?" · "+({yes:"💰",no:"🆓"}[p._fee]||""):""}{p._capacity?" · "+p._capacity+" posti":""}</div>
                  {/* ⚠️ Avviso dimensioni */}
                  {hasDimWarn&&<div style={{fontSize:9,color:"#dc2626",fontWeight:700,marginTop:2,display:"flex",alignItems:"center",gap:3}}>⛔ {p._sizeWarnings.join(" · ")}</div>}
                  <div style={{display:"flex",gap:5,marginTop:4,flexWrap:"wrap"}}>
                    <a href={"https://www.google.com/maps/search/"+encodeURIComponent(p.name+" "+p.address)} target="_blank" onClick={e=>e.stopPropagation()} style={{textDecoration:"none"}}>
                      <span className="src-logo src-gm">🗺 Maps</span>
                    </a>
                    {p.website&&<a href={p.website} target="_blank" onClick={e=>e.stopPropagation()} style={{textDecoration:"none"}}>
                      <span className="src-logo src-tt">🌐 Sito</span>
                    </a>}
                  </div>
                </div>
                <div style={{flexShrink:0,display:"flex",flexDirection:"column",alignItems:"flex-end",gap:3}}>
                  {p.distKm<99&&<span style={{fontSize:10,color:"#94a3b8"}}>{p.distKm<1?(p.distKm*1000).toFixed(0)+"m":p.distKm.toFixed(1)+"km"}</span>}
                  <span style={{fontSize:12,color:hasDimWarn?"#dc2626":"#b8860b",fontWeight:700,whiteSpace:"nowrap"}}>{hasDimWarn?"⛔ Troppo piccolo":"\ud83e\udd16 Analizza \u2192"}</span>
                </div>
              </div>
              );
            })}
          </div>
        </>
      )}
    </div>
  );
}

async function detectCountryRegion(lat,lng){
  try{

      {headers:{"User-Agent":"OversizeInTour/1.0"},signal:AbortSignal.timeout(5000)});

  }catch(e){return{country:null,region:null,countryCode:null};}

const IT_REGIONS_META=[
  ["Valle d'Aosta","🏔"],["Piemonte","🍇"],["Liguria","⛵"],["Lombardia","🏙"],
  ["Trentino-Alto Adige","⛷"],["Veneto","🦁"],["Friuli Venezia Giulia","⚓"],
  ["Emilia-Romagna","🍝"],["Toscana","🌻"],["Umbria","🫒"],["Marche","⛱"],
  ["Lazio","🏛"],["Abruzzo","🐺"],["Molise","🌿"],["Campania","🌋"],
  ["Puglia","🌴"],["Basilicata","🪨"],["Calabria","🌶"],["Sicilia","🌊"],["Sardegna","🏝"]
];
const IT_REGION_ICO=Object.fromEntries(IT_REGIONS_META);
function normalizeRegion(raw){
  if(!raw)return null;
  const low=raw.toLowerCase();
  for(const [name] of IT_REGIONS_META){
    if(low.includes(name.toLowerCase()))return name;
  }
  if(low.includes("südtirol")||low.includes("alto adige")||low.includes("trentino"))return"Trentino-Alto Adige";
  if(low.includes("friuli"))return"Friuli Venezia Giulia";
  if(low.includes("emilia"))return"Emilia-Romagna";
  if(low.includes("valle d"))return"Valle d'Aosta";
  return raw;
}
async function detectRegion(lat,lng){
  try{
    const r=await fetch("https://nominatim.openstreetmap.org/reverse?format=json&lat="+lat+"&lon="+lng+"&zoom=10&addressdetails=1&accept-language=it,en",
      {headers:{"User-Agent":"OversizeInTour/1.0"},signal:AbortSignal.timeout(5000)});
    const d=await r.json();
    const addr=d.address||{};
    const rawCountry=addr.country||null;
    const country=normalizeCountryName(rawCountry)||rawCountry;
    const rawRegion=addr.state||addr.region||null;
    const region=(country==="Italia")?normalizeRegion(rawRegion):rawRegion;
    const province=addr.county||addr.province||addr.state_district||null;
    return{country:country||"Altro",region:region||"Sconosciuta",province:province||null};
  }catch(e){return{country:"Altro",region:"Sconosciuta",province:null};}
}

      if(province){
        if(!byCountry[country][region]._provinces[province])byCountry[country][region]._provinces[province]=[];
        byCountry[country][region]._provinces[province].push(item);
      }else{
        byCountry[country][region]._items.push(item);
      }
    });
    return Object.entries(byCountry).sort(([a],[b])=>a.localeCompare(b)).map(([country,regions])=>{
      const regionEntries=Object.entries(regions).sort(([a],[b])=>a.localeCompare(b)).map(([regName,regData])=>{
        const provinces=Object.entries(regData._provinces||{}).sort(([a],[b])=>a.localeCompare(b));
        const loose=regData._items||[];
        const total=loose.length+provinces.reduce((s,[,items])=>s+items.length,0);
        return[regName,loose,provinces,total];
      });
      const totalCountry=regionEntries.reduce((s,[,,, t])=>s+t,0);
      return[country,regionEntries,totalCountry];
    });
  },[filtered,regionMap]);

  const stats={total:items.length,"9.5":items.filter(i=>{const f=i.sizeFlags;return f?f["9.5"]:parseFloat(i.maxSize)>=9.5;}).length,"10.5":items.filter(i=>{const f=i.sizeFlags;return f?f["10.5"]:parseFloat(i.maxSize)>=10.5;}).length,"12":items.filter(i=>{const f=i.sizeFlags;return f?f["12"]:i.maxSize==="12";}).length};

  function timeAgo(ts){
    if(!ts)return"";
    const d=Date.now()-ts;
    if(d<3600000)return Math.round(d/60000)+"min fa";
    if(d<86400000)return Math.round(d/3600000)+"h fa";
    if(d<2592000000)return Math.round(d/86400000)+"g fa";
    return new Date(ts).toLocaleDateString("it-IT");
  }

  /* ── Mini-mappa per provincia con marker cliccabili ── */
  function CertMiniMap({items:mapItems,onSelect}){
    const mapRef=useRef(null);
    const mapInst=useRef(null);
    useEffect(()=>{
      if(!mapRef.current||!window.L)return;
      const withCoords=mapItems.filter(i=>i.lat&&i.lng);
      if(withCoords.length===0)return;
      /* Init map */
      if(mapInst.current){mapInst.current.remove();mapInst.current=null;}
      const m=window.L.map(mapRef.current,{zoomControl:true,attributionControl:false,scrollWheelZoom:true});
      window.L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:18}).addTo(m);
      const bounds=[];
      const verdictColors={"ok":"#16a34a","warn":"#ca8a04","no":"#dc2626"};
      withCoords.forEach(it=>{
        const sizeCat=SIZE_CATS.find(s=>s.id===it.maxSize)||SIZE_CATS[1];
        const vc=verdictColors[it.verdict]||sizeCat.color;
        const icon=window.L.divIcon({
          className:"",
          html:'<div style="width:28px;height:28px;border-radius:50%;background:'+vc+';border:2.5px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;">'+(TYPE_ICONS[it.type]||"📍")+'</div>',
          iconSize:[28,28],iconAnchor:[14,14]
        });
        const marker=window.L.marker([it.lat,it.lng],{icon}).addTo(m);
        marker.bindTooltip(it.name,{direction:"top",offset:[0,-14],className:"cert-tooltip"});
        marker.on("click",()=>{if(onSelect)onSelect(it);});
        bounds.push([it.lat,it.lng]);
      });
      if(bounds.length===1){m.setView(bounds[0],13);}
      else{m.fitBounds(bounds,{padding:[30,30],maxZoom:14});}
      mapInst.current=m;
      return()=>{if(mapInst.current){mapInst.current.remove();mapInst.current=null;}};
    },[mapItems]);
    const withCoords=mapItems.filter(i=>i.lat&&i.lng);
    if(withCoords.length===0)return null;
    return <div ref={mapRef} style={{width:"100%",height:200,borderRadius:10,overflow:"hidden",border:"1.5px solid #ddd6fe",marginBottom:6,marginTop:4}}/>;
  }

  /* ── Render singolo item certificato (usato sia in lista che in grouped) ── */

          <div style={{fontSize:14,color:"#94a3b8",alignSelf:"center"}}>›</div>
        </div>
      </div>
    );

                    <div style={{flex:1}}>

                    <div style={{fontSize:12,fontWeight:700,color:"var(--text1)"}}>{t("certGreyWater")}</div>

                      {svc.greyWater===true?"✅ "+t("certGreyYes"):svc.greyWater===false?"❌ "+t("certGreyNo"):t("certNotSet")}

            <div style={{fontSize:10,color:"var(--text3)",marginBottom:8,lineHeight:1.5}}>{t("certSizeCascade")}</div>
            <div style={{display:"flex",gap:8}}>
              {SIZE_CATS.map(s=>{
                const active=flags[s.id];
                return(
                  <button key={s.id} onClick={()=>updateSizeFlag(it.id,s.id,!active)}
                    style={{flex:1,padding:"12px 6px",borderRadius:12,border:"2.5px solid "+(active?s.color:"var(--border2)"),
                      background:active?s.bg:"var(--card)",cursor:"pointer",textAlign:"center",transition:"all .2s",opacity:active?1:0.5}}>
                    <div style={{margin:"4px 0"}}>{s.isSvg?<MhIcon id={s.emoji} size={45}/>:<span style={{fontSize:20}}>{s.emoji}</span>}</div>
                    <div style={{fontSize:13,fontWeight:800,color:active?s.color:"var(--text3)"}}>{s.id}m</div>

              })}
            </div>

          {/* 📝 Note community */}
          <div style={{marginBottom:14,background:"#f0f9ff",borderRadius:10,padding:"10px 12px",border:"1.5px solid #bae6fd"}}>

  return(
    <div className="pg">
      <div className="hero" style={{background:"linear-gradient(135deg,#1e40af 0%,#7c3aed 50%,#db2777 100%)"}}>
        <img src={CAMPER_IMG_HERO} style={{position:"absolute",right:-10,bottom:-5,height:70,opacity:.18,pointerEvents:"none"}} alt=""/>
        <h2 style={{fontSize:22}}>{t("certificate")}</h2>
        <p>{t("certDesc")}</p>
      </div>
      {/* Stats */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6}}>
        <div style={{background:"var(--card)",border:"1.5px solid var(--border2)",borderRadius:10,padding:"8px 6px",textAlign:"center"}}>

        {SIZE_CATS.map(s=>(

      {adding&&(
        <div className="card" style={{border:"2px solid #7c3aed"}}>

          <div style={{fontSize:11,fontWeight:700,color:"var(--text2)",marginBottom:4}}>{t("accessibleTo")}</div>

          <input className="inp" placeholder="Coordinate (lat)" value={form.lat} onChange={e=>setForm({...form,lat:e.target.value})} style={{marginBottom:6}}/>

          <textarea className="inp" placeholder="Note: ingresso largo, piazzole grandi, manovra facile..." value={form.note} onChange={e=>setForm({...form,note:e.target.value})} rows={2} style={{marginBottom:8,resize:"vertical"}}/>
          <button className="btn" style={{width:"100%",background:"#7c3aed",color:"#fff"}} onClick={addCertified} disabled={!form.name.trim()}>
            ✅ {t("certifyBtn")}
          </button>

      )}
      {/* Search + Filters */}
      <div className="card" style={{padding:"10px 12px"}}>
        <div className="sbar" style={{marginBottom:8}}>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#adb5bd" strokeWidth="2.2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>
          <input placeholder={t("searchNameAddr")} value={searchQ} onChange={e=>setSearchQ(e.target.value)} style={{fontSize:12}}/>
        </div>
        {/* Size filter */}
        <div style={{display:"flex",gap:4,marginBottom:6,flexWrap:"wrap"}}>
          <button onClick={()=>setFilterSize("all")} className={"btn bsm "+(filterSize==="all"?"bto":"bgh")} style={{fontSize:10}}>{t("all")}</button>
          {SIZE_CATS.map(s=>(
            <button key={s.id} onClick={()=>setFilterSize(filterSize===s.id?"all":s.id)} className={"btn bsm"} style={{fontSize:10,background:filterSize===s.id?s.bg:"var(--card)",color:filterSize===s.id?s.color:"var(--text3)",border:"1.5px solid "+(filterSize===s.id?s.color:"var(--border2)")}}>
              {s.isSvg?<MhIcon id={s.emoji} size={24}/>:s.emoji} {s.id}m
            </button>
          ))}
        </div>
        {/* View mode + Sort */}
        <div style={{display:"flex",gap:4,marginBottom:6}}>
          <button onClick={()=>setViewMode("grouped")} className={"btn bsm "+(viewMode==="grouped"?"bto":"bgh")} style={{fontSize:10}}>🗂 {t("certByRegion")}</button>
          <button onClick={()=>setViewMode("list")} className={"btn bsm "+(viewMode==="list"?"bto":"bgh")} style={{fontSize:10}}>📋 {t("certList")}</button>
        </div>
        <div style={{display:"flex",gap:4}}>
          <button onClick={()=>setSortBy("recent")} className={"btn bsm "+(sortBy==="recent"?"bto":"bgh")} style={{fontSize:10}}>🕐 {t("recent")}</button>
          <button onClick={()=>setSortBy("votes")} className={"btn bsm "+(sortBy==="votes"?"bto":"bgh")} style={{fontSize:10}}>🔥 {t("popular")}</button>
          <button onClick={()=>setSortBy("name")} className={"btn bsm "+(sortBy==="name"?"bto":"bgh")} style={{fontSize:10}}>🔤 {t("name")}</button>
        </div>
      </div>
      {detectingRegions&&<div style={{fontSize:10,color:"#b8860b",textAlign:"center",padding:4}}>🔄 {t("certDetectingRegions")}</div>}
      {/* List or Grouped */}
      {filtered.length===0&&(
        <div style={{textAlign:"center",padding:"30px 20px",color:"var(--text3)"}}>
          {items.length===0?(
            <div>
              <div style={{fontSize:40,marginBottom:10}}>🏅</div>
              <div style={{fontWeight:700,fontSize:14,marginBottom:6}}>{t("noCert")}</div>
              <div style={{fontSize:12}}>{t("beFirst")}</div>
            </div>
          ):(
            <div style={{fontSize:12}}>{t("noFilter")}</div>
          )}
        </div>
      )}
      {viewMode==="grouped"&&grouped.map(([country,regionEntries,totalCountry])=>{
        const cKey="c_"+country;
        const cOpen=openSections[cKey]!==false; /* default open */
        return(
          <div key={cKey} style={{marginBottom:6}}>
            <div onClick={()=>toggleSection(cKey)} style={{display:"flex",alignItems:"center",gap:8,padding:"10px 12px",background:"linear-gradient(135deg,#1e40af,#7c3aed)",borderRadius:10,cursor:"pointer",color:"#fff"}}>
              <span style={{fontSize:16}}>{COUNTRY_FLAGS[country]||"🏳"}</span>
              <span style={{fontWeight:800,fontSize:14,flex:1}}>{country}</span>
              <span style={{fontSize:11,opacity:.8}}>{totalCountry} mete</span>
              <span style={{fontSize:12,transition:"transform .2s",transform:cOpen?"rotate(90deg)":"rotate(0)"}}>▶</span>
            </div>
            {cOpen&&regionEntries.map(([regName,loose,provinces,total])=>{
              const rKey="r_"+country+"_"+regName;
              const rOpen=openSections[rKey]!==false;
              if(regName==="_unknown"||regName==="Sconosciuta"){
                /* Items senza regione → mostra direttamente */
                return loose.map(it=>renderCertItem(it));
              }
              return(
                <div key={rKey} style={{marginLeft:8,marginTop:4}}>
                  <div onClick={()=>toggleSection(rKey)} style={{display:"flex",alignItems:"center",gap:6,padding:"8px 10px",background:"#eff6ff",borderRadius:8,cursor:"pointer",border:"1px solid #bfdbfe"}}>
                    <span style={{fontSize:13}}>📍</span>
                    <span style={{fontWeight:700,fontSize:12,flex:1,color:"#1e40af"}}>{regName}</span>
                    <span style={{fontSize:10,color:"#3b82f6"}}>{total}</span>
                    <span style={{fontSize:10,transition:"transform .2s",transform:rOpen?"rotate(90deg)":"rotate(0)",color:"#3b82f6"}}>▶</span>
                  </div>
                  {rOpen&&(
                    <div style={{marginLeft:8,marginTop:4}}>
                      {/* Province */}
                      {provinces.map(([provName,provItems])=>{
                        const pKey="p_"+country+"_"+regName+"_"+provName;
                        const pOpen=openSections[pKey]!==undefined?openSections[pKey]:true;
                        return(
                          <div key={pKey} style={{marginBottom:4}}>
                            <div onClick={()=>toggleSection(pKey)} style={{display:"flex",alignItems:"center",gap:5,padding:"6px 8px",background:"#faf5ff",borderRadius:7,cursor:"pointer",border:"1px solid #e9d5ff"}}>
                              <span style={{fontSize:11}}>🏛</span>
                              <span style={{fontWeight:600,fontSize:11,flex:1,color:"#7c3aed"}}>{provName}</span>
                              <span style={{fontSize:9,color:"#a855f7"}}>{provItems.length}</span>
                              <span style={{fontSize:9,transition:"transform .2s",transform:pOpen?"rotate(90deg)":"rotate(0)",color:"#a855f7"}}>▶</span>
                            </div>
                            {pOpen&&<>
                              <CertMiniMap items={provItems} onSelect={setSelectedItem}/>
                              {provItems.map(it=>renderCertItem(it))}
                            </>}
                          </div>
                        );
                      })}
                      {/* Loose items without province */}
                      {loose.length>0&&provinces.length===0&&<CertMiniMap items={loose} onSelect={setSelectedItem}/>}
                      {loose.map(it=>renderCertItem(it))}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        );
      })}
      {viewMode==="list"&&filtered.map(it=>renderCertItem(it))}
      {/* Info community */}
      <div className="card" style={{background:"#faf5ff",border:"1.5px solid #ddd6fe",padding:"12px 14px"}}>
        <div style={{fontWeight:700,fontSize:12,color:"#7c3aed",marginBottom:6}}>ℹ️ {t("howCertWorks")}</div>
        <div style={{fontSize:11,color:"#6b21a8",lineHeight:1.6}}>
          <b>🏅 {t("certify")}</b>{"\n"}
          <b>👍 {t("voteDesc")}</b>{"\n"}
          <b>📏 {t("categories")}:</b> <MhIcon id="mh-sm" size={20}/> ≤9.5m · <MhIcon id="mh-md" size={22}/> ≤10.5m · <MhIcon id="mh-lg" size={24}/> ≤12m{"\n"}
          <b>📐 Cascata misure:</b> Se adatto a 12m → automaticamente adatto anche a 10.5m e 9.5m{"\n"}
          <b>✅/❌:</b> {t("fitBadge",camper.length)}
        </div>
      </div>
    </div>
  );
}
function TabOversize({camper,ttKey,externalItems,onRemove,t}){
  const [adding,setAdding]=useState(false);
  const [form,setForm]=useState({name:"",address:"",note:"",website:""});
  const [localItems,setLocalItems]=useState(()=>LS.getJ("oit_oversize_manual")||[]);
  const [regionMap,setRegionMap]=useState(()=>LS.getJ("oit_region_map")||{});
  /* ── Sync manual items con Firebase ── */
  useEffect(()=>{
    if(!FB.ready())return;
    const uid=FB.userId();
    const unsub=FB.listen("oversize_manual/"+uid,data=>{
      const fbItems=data.map(d=>({...d}));
      setLocalItems(fbItems);
      LS.setJ("oit_oversize_manual",fbItems);
    });
    return unsub;
  },[]);
  const [openRegions,setOpenRegions]=useState({});
  const [detecting,setDetecting]=useState(false);
  const allItems=[...externalItems,...localItems];
  // Auto-detect regions for items without one
  useEffect(()=>{
    let cancelled=false;
    async function detectAll(){
      const toDetect=allItems.filter(i=>i.lat&&!regionMap[i.id]);
      if(toDetect.length===0)return;
      setDetecting(true);
      const newMap={...regionMap};
      for(let idx=0;idx<toDetect.length;idx++){
        if(cancelled)break;
        const it=toDetect[idx];
        const reg=await detectRegion(it.lat,it.lng);
        if(reg)newMap[it.id]=reg;
        if(idx<toDetect.length-1)await new Promise(r=>setTimeout(r,1100));
      }
      if(!cancelled){
        setRegionMap(newMap);
        LS.setJ("oit_region_map",newMap);
        setDetecting(false);
      }
    }
    detectAll();
    return()=>{cancelled=true;};
  },[allItems.length]);
  // Group items by country > region > province
  const grouped=useMemo(()=>{
    const byCountry={};
    allItems.forEach(item=>{
      const info=regionMap[item.id]||null;
      let country,region,province;
      if(info&&typeof info==="object"){country=info.country||"Altro";region=info.region||"Sconosciuta";province=info.province||null;}
      else if(typeof info==="string"){country="Italia";region=info;province=null;}
      else{country="_unknown";region="_unknown";province=null;}
      if(!byCountry[country])byCountry[country]={};
      if(!byCountry[country][region])byCountry[country][region]={_items:[],_provinces:{}};
      if(province){
        if(!byCountry[country][region]._provinces[province])byCountry[country][region]._provinces[province]=[];
        byCountry[country][region]._provinces[province].push(item);
      }else{
        byCountry[country][region]._items.push(item);
      }
    });
    // Sort countries by EU_COUNTRY_ORDER, then alphabetically
    const countryEntries=Object.entries(byCountry).sort(([a],[b])=>{
      if(a==="_unknown")return 1;if(b==="_unknown")return-1;
      const ia=EU_COUNTRY_ORDER.indexOf(a),ib=EU_COUNTRY_ORDER.indexOf(b);
      if(ia>=0&&ib>=0)return ia-ib;
      if(ia>=0)return-1;if(ib>=0)return 1;
      return a.localeCompare(b);
    });
    const itOrder=IT_REGIONS_META.map(([n])=>n);
    return countryEntries.map(([country,regions])=>{
      const regionEntries=Object.entries(regions).sort(([a],[b])=>{
        if(a==="_unknown")return 1;if(b==="_unknown")return-1;
        if(country==="Italia"){
          const ia=itOrder.indexOf(a),ib=itOrder.indexOf(b);
          if(ia>=0&&ib>=0)return ia-ib;
          if(ia>=0)return-1;if(ib>=0)return 1;
        }
        return a.localeCompare(b);
      }).map(([regName,regData])=>{
        const provinces=Object.entries(regData._provinces||{}).sort(([a],[b])=>a.localeCompare(b));
        const loose=regData._items||[];
        const allRegItems=[...loose,...provinces.flatMap(([,items])=>items)];
        return[regName,allRegItems,provinces];
      });
      return[country,regionEntries];
    });
  },[allItems,regionMap]);
  const populatedCountries=grouped.filter(([k])=>k!=="_unknown").length;
  const totalRegions=grouped.reduce((s,[,regs])=>s+regs.filter(([k])=>k!=="_unknown").length,0);
  function toggleRegion(reg){setOpenRegions(prev=>({...prev,[reg]:!prev[reg]}));}
  function saveManual(){
    if(!form.name.trim())return;
    const ni={id:"m_"+Date.now(),...form,lat:null,lng:null,manual:true};
    if(form.address){
      geocode(null,form.address).then(c=>{
        if(c){
          setLocalItems(prev=>{
            const u=prev.map(i=>i.id===ni.id?{...i,lat:c.lat,lng:c.lng}:i);
            LS.setJ("oit_oversize_manual",u);
            /* Update Firebase with coords */
            if(FB.ready()){const tgt=u.find(x=>x.id===ni.id);if(tgt&&tgt._fbId){const uid=FB.userId();FB.update("oversize_manual/"+uid+"/"+tgt._fbId,{lat:c.lat,lng:c.lng});}}
            return u;
          });
        }
      });
    }
    const upd=[...localItems,ni];
    setLocalItems(upd);LS.setJ("oit_oversize_manual",upd);
    /* Sync to Firebase */
    if(FB.ready()){const uid=FB.userId();FB.push("oversize_manual/"+uid,ni);}
    setForm({name:"",address:"",note:"",website:""});setAdding(false);
  }
  function removeLocal(id){
    const target=localItems.find(i=>i.id===id);
    const u=localItems.filter(i=>i.id!==id);
    setLocalItems(u);LS.setJ("oit_oversize_manual",u);
    /* Remove from Firebase */
    if(FB.ready()&&target&&target._fbId){const uid=FB.userId();FB.remove("oversize_manual/"+uid+"/"+target._fbId);}
    // Also remove from regionMap
    const nm={...regionMap};delete nm[id];setRegionMap(nm);LS.setJ("oit_region_map",nm);
  }
  function removeItem(item){
    if(item.manual)removeLocal(item.id);
    else{onRemove(item.id);const nm={...regionMap};delete nm[item.id];setRegionMap(nm);LS.setJ("oit_region_map",nm);}
  }
  const mapMks=allItems.filter(i=>i.lat).map(i=>({...i,isOversize:true,sub:i.address||""}));
  function renderItem(item){
    return(
      <div key={item.id} className="oversize-item">
        <div style={{width:34,height:34,borderRadius:9,background:item.verdict==="ok"?"#dcfce7":item.verdict==="warn"?"#fef9c3":"#f0fdf4",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,flexShrink:0}}>
          {item.verdict==="ok"?"✅":item.verdict==="warn"?"⚠️":item.verdict==="no"?"🔴":"📍"}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:700,fontSize:13}}>{item.name}</div>
          {item.address&&<div style={{fontSize:11,color:"#15803d",marginTop:2}}>📍 {item.address}</div>}
          {item.note&&<div style={{fontSize:11,color:"#475569",marginTop:2,fontStyle:"italic"}}>"{item.note}"</div>}
          {item.website&&<a href={item.website.startsWith("http")?item.website:"https://"+item.website} target="_blank" style={{fontSize:11,color:"#b8860b",marginTop:2,display:"block",fontWeight:600}}>🌐 {item.website}</a>}
          {item.verdict&&<div style={{fontSize:10,marginTop:3,color:item.verdict==="ok"?"#16a34a":item.verdict==="warn"?"#a16207":"#dc2626",fontWeight:700}}>
            {item.verdict==="ok"?"✅ Adatto":item.verdict==="warn"?"⚠️ Con attenzione":"🔴 Non adatto"}
          </div>}
        </div>
        <div style={{flexShrink:0,display:"flex",flexDirection:"column",gap:5}}>
          {item.lat&&<a href={"https://www.google.com/maps/dir/?api=1&destination="+encodeURIComponent(item.name+" "+(item.address||""))} target="_blank" style={{textDecoration:"none"}}><button className="btn bgh bsm">🧭</button></a>}
          <button style={{background:"#fee2e2",color:"#dc2626",border:"none",cursor:"pointer",borderRadius:8,padding:"5px 10px",fontSize:11,fontWeight:700}}
            onClick={()=>removeItem(item)}>🗑</button>
        </div>
      </div>
    );
  }
  return(
    <div className="pg">
      <div className="hero" style={{background:"linear-gradient(135deg,#b8860b,#996515)"}}>
        <img src={CAMPER_IMG_HERO} style={{position:"absolute",right:-10,bottom:-5,height:70,opacity:.18,pointerEvents:"none"}} alt=""/>
        <h2>⭐ {t("myFav")}</h2>
        <p>{t("myFavDesc",camper.length)}</p>
        {allItems.length>0&&(
          <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
            <span style={{background:"rgba(255,255,255,.2)",borderRadius:99,padding:"3px 10px",fontSize:11,fontWeight:700}}>📍 {allItems.length} mete</span>
            {populatedCountries>0&&<span style={{background:"rgba(255,255,255,.2)",borderRadius:99,padding:"3px 10px",fontSize:11,fontWeight:700}}>🌍 {populatedCountries} {populatedCountries===1?"paese":"paesi"}</span>}
            {totalRegions>0&&<span style={{background:"rgba(255,255,255,.2)",borderRadius:99,padding:"3px 10px",fontSize:11,fontWeight:700}}>🗺 {totalRegions} regioni</span>}
          </div>
        )}
      </div>
      {mapMks.length>0&&(
        <div className="mwrap">
          <TomMap ttKey={ttKey} center={{lat:mapMks[0].lat,lng:mapMks[0].lng}} zoom={6} markers={mapMks} height={200}/>
        </div>
      )}
      {detecting&&(
        <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 14px",background:"#eff6ff",borderRadius:10,fontSize:12,color:"#1d4ed8"}}>
          <span className="spin"/>Rilevamento regioni in corso...
        </div>
      )}
      {/* Country > Region grouped list */}
      {grouped.length>0&&grouped.map(([country,regions])=>{
        const isUnknownCountry=country==="_unknown";
        const countryFlag=EU_COUNTRY_FLAGS[country]||"🌍";
        const countryName=isUnknownCountry?"Da rilevare":country;
        const countryItemCount=regions.reduce((s,[,items])=>s+items.length,0);
        const isCountryOpen=openRegions["c_"+country]!==false;
        return(
          <div key={"c_"+country} style={{marginBottom:10}}>
            <button onClick={()=>toggleRegion("c_"+country)} style={{
              width:"100%",display:"flex",alignItems:"center",gap:10,padding:"10px 14px",
              background:isCountryOpen?"#ecfdf5":"#f8fafc",border:"1.5px solid #d1fae5",borderRadius:12,cursor:"pointer",textAlign:"left"
            }}>
              <span style={{fontSize:24}}>{countryFlag}</span>

/* ─── Rental POI search: Overpass/OSM (gratuito, nessuna chiave) ─── */
async function searchRentalPOIs(_key,lat,lng){
  const query=`[out:json][timeout:15];
(
  node(around:20000,${lat},${lng})["amenity"="car_rental"];
  way(around:20000,${lat},${lng})["amenity"="car_rental"];
  node(around:20000,${lat},${lng})["amenity"="bicycle_rental"];
  node(around:20000,${lat},${lng})["amenity"="motorcycle_rental"];
  node(around:20000,${lat},${lng})["name"~"noleggio|rent|hertz|avis|europcar|sixt|maggiore|autovermietung|location|alquiler",i]["shop"];
);out body center 20;`;
  try{
    const r=await fetch("https://overpass-api.de/api/interpreter",{
      method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},
      body:"data="+encodeURIComponent(query),signal:AbortSignal.timeout(15000)
    });
    const d=await r.json();
    const seen=new Set();
    return(d.elements||[])
      .map(el=>{
        const t=el.tags||{};
        const elLat=el.lat||el.center?.lat;
        const elLng=el.lon||el.center?.lon;
        if(!elLat||!elLng)return null;
        const name=t.name||t["name:en"]||t["name:de"]||t["name:fr"]||t["name:it"]||"Rental/Noleggio";
        if(seen.has(name))return null; seen.add(name);
        const addr=[t["addr:street"],t["addr:housenumber"],t["addr:city"]].filter(Boolean).join(", ");
        const distKm=calcDistKm(lat,lng,elLat,elLng);
        const isMoto=/(bicycle|motorcycle|moto|scooter)/i.test(t.amenity||name);
        return{id:el.id,name,address:addr||"",lat:elLat,lng:elLng,distKm,
          phone:t.phone||t["contact:phone"]||null,website:t.website||t["contact:website"]||null,isMoto};
      })
      .filter(Boolean)
      .sort((a,b)=>a.distKm-b.distKm).slice(0,20);
  }catch(e){return[];}
}
function TabNoleggio({t,lang}){
  const [zona,setZona]=useState("");
  const [results,setResults]=useState([]);
  const [loading,setLoading]=useState(false);
  const [searched,setSearched]=useState(false);

  async function searchRental(){
    if(!zona.trim())return;
    setLoading(true);setSearched(true);
    try{
      const geo=await fetch("https://nominatim.openstreetmap.org/search?q="+encodeURIComponent(zona.trim())+"&format=json&limit=1",{headers:{"User-Agent":"OversizeInTour/1.0"}});
      const gd=await geo.json();
      if(!gd||!gd.length){setResults([]);setLoading(false);return;}
      const lat=gd[0].lat,lng=gd[0].lon;
      const q2=`[out:json][timeout:20];(
        nwr(around:15000,${lat},${lng})["amenity"="car_rental"];
        nwr(around:15000,${lat},${lng})["shop"="car_rental"];
        nwr(around:15000,${lat},${lng})["shop"="motorcycle"];
        nwr(around:15000,${lat},${lng})["amenity"="motorcycle_rental"];
        nwr(around:15000,${lat},${lng})["shop"="rental"]["rental"~"car|motorcycle|scooter|vehicle"];
      );out body center 50;`;
      const r=await fetch("https://overpass-api.de/api/interpreter",{method:"POST",body:"data="+encodeURIComponent(q2),signal:AbortSignal.timeout(25000)});
      const d=await r.json();
      const items=(d.elements||[]).map(el=>{
        const tags=el.tags||{};
        const lat2=el.lat||el.center?.lat;
        const lng2=el.lon||el.center?.lon;
        if(!lat2)return null;
        const name=tags.name||tags["name:en"]||tags.brand||(tags.amenity==="car_rental"?"Autonoleggio":"Noleggio");
        const type=tags.amenity==="motorcycle_rental"||tags.shop==="motorcycle"?"\ud83c\udfcd Moto/Scooter":"\ud83d\ude97 Auto";
        const phone=tags.phone||tags["contact:phone"]||"";
        const website=tags.website||tags["contact:website"]||"";
        const addr=[tags["addr:street"],tags["addr:housenumber"],tags["addr:city"]].filter(Boolean).join(", ");
        const brand=tags.brand||"";
        const opening=tags.opening_hours||"";
        return{name,type,phone,website,addr,brand,opening,lat:lat2,lng:lng2};
      }).filter(Boolean);
      const dedup=[];
      for(const it of items){
        const dup=dedup.some(d2=>Math.abs(d2.lat-it.lat)<0.001&&Math.abs(d2.lng-it.lng)<0.001);
        if(!dup)dedup.push(it);
      }
      setResults(dedup);
    }catch(e){setResults([]);}
    setLoading(false);
  }

  return(
    <div style={{padding:"12px 0"}}>
      <div className="hero" style={{background:"linear-gradient(135deg,#1e40af 0%,#7c3aed 100%)"}}>
        <h2>{"\ud83d\ude97"} {t("rental")}</h2>
        <p>{t("rentalDesc")}</p>
        <img src={CAMPER_IMG_HERO} style={{position:"absolute",right:-10,bottom:-5,height:70,opacity:.18,pointerEvents:"none"}} alt=""/>
      </div>

      <div style={{padding:"0 16px"}}>
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          <input className="inp" placeholder={t("rentalPlaceholder")} value={zona} onChange={e=>setZona(e.target.value)} onKeyDown={e=>e.key==="Enter"&&searchRental()} style={{flex:1}}/>
          <button className="btn bto" onClick={searchRental} disabled={loading}>{loading?"\u23f3":"\ud83d\udd0d"}</button>
        </div>
        {loading&&<div style={{textAlign:"center",padding:30,color:"var(--text2)"}}><div style={{fontSize:28,marginBottom:8}}>{"\ud83d\udd0d"}</div>{t("searching")}</div>}
        {!loading&&searched&&results.length===0&&<div style={{textAlign:"center",padding:30,color:"var(--text2)"}}><div style={{fontSize:28,marginBottom:8}}>{"\ud83d\ude15"}</div>{t("noRental")}</div>}
        {results.map((r2,i)=>(
          <div key={i} className="card" style={{marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div>
                <div style={{fontWeight:700,fontSize:14,color:"var(--text)"}}>{r2.name}</div>
                <div style={{fontSize:11,color:"var(--accent)",fontWeight:600,marginTop:2}}>{r2.type}{r2.brand?" \u00b7 "+r2.brand:""}</div>
              </div>
            </div>
            {r2.addr&&<div style={{fontSize:11,color:"var(--text2)",marginTop:4}}>{"\ud83d\udccd"} {r2.addr}</div>}
            {r2.phone&&<div style={{fontSize:11,color:"var(--text2)",marginTop:2}}>{"\ud83d\udcde"} <a href={"tel:"+r2.phone} style={{color:"var(--accent)"}}>{r2.phone}</a></div>}
            {r2.opening&&<div style={{fontSize:11,color:"var(--text2)",marginTop:2}}>{"\ud83d\udd50"} {r2.opening}</div>}
            <div style={{display:"flex",gap:6,marginTop:8}}>
              {r2.website&&<a href={r2.website} target="_blank" rel="noreferrer" className="btn bgh bsm">{"\ud83c\udf10"} Web</a>}
              <a href={"https://www.google.com/maps/dir/?api=1&destination="+r2.lat+","+r2.lng} target="_blank" rel="noreferrer" className="btn bto bsm">{"\ud83d\udccd"} {t("navigate").split(" ").slice(-2).join(" ")}</a>
            </div>
          </div>
        ))}
        {!loading&&results.length>0&&<div style={{fontSize:11,color:"var(--text3)",textAlign:"center",marginTop:10}}>{"\ud83d\udcca"} {results.length} {t("rentalFound")}</div>}
      </div>
    </div>
  );
}

        </div>

            if(confirm("Vuoi collegare questo dispositivo all'account "+code+"?\n\nI salvataggi locali verranno sostituiti con quelli dell'account remoto.")){
              LS.set("oit_user_id",code);
              alert("Collegato! Ricarica l'app per sincronizzare.");

        </div>
      </div>
      {/* Privacy Policy & Terms */}
      <div className="card">

          </div>
        </details>
      </div>
      {/* Reset App */}
      <button className="btn bred" style={{width:"100%"}} onClick={onReset}>🔄 {t("resetApp")}</button>

  function handleSaveOversize(poi,analysis){
    const item={
      id:"ai_"+poi.id,
      name:poi.name,address:poi.address,
      lat:poi.lat,lng:poi.lng,
      website:poi.website||null,
      verdict:analysis?.verdict||"ok",
      note:analysis?.sintesi||""
    };
    setOversizeItems(prev=>{
      if(prev.find(i=>i.id===item.id))return prev;
      const u=[...prev,item];
      LS.setJ("oit_oversize_ai",u);
      /* Sync to Firebase */
      if(FB.ready()){const uid=FB.userId();FB.push("oversize/"+uid,item);}
      return u;
    });
  }
  function removeOversize(id){
    setOversizeItems(prev=>{
      const target=prev.find(i=>i.id===id);
      const u=prev.filter(i=>i.id!==id);
      LS.setJ("oit_oversize_ai",u);
      /* Remove from Firebase */
      if(FB.ready()&&target&&target._fbId){const uid=FB.userId();FB.remove("oversize/"+uid+"/"+target._fbId);}
      return u;
    });
  }

      note:(analysis?.verdict==="ok"?"Adatto":analysis?.verdict==="warn"?"Con attenzione":"Non adatto")+" — "+(analysis?.sintesi||"").substring(0,150),
      website:poi.website||"",
      lat:poi.lat||null,lng:poi.lng||null,
      addedBy:"ai_analysis",
      addedAt:Date.now(),
      votes:1,voters:["me"],
      verdict:analysis?.verdict||"ok"
    };

    if(existing.find(i=>i.name===item.name&&i.address===item.address))return;
    const updated=[item,...existing];
    LS.setJ("oit_cert_community",updated);
    if(FB.ready())FB.push("certificates",item);
  }

      {tab==="noleggio"   &&<TabNoleggio t={t} lang={lang}/>}
