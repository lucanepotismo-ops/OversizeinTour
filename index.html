  const [center,setCenter]=useState({lat:41.9,lng:12.5});
  const [zoom,setZoom]=useState(6);
  const [destMk,setDestMk]=useState(null);
  const [pois,setPois]=useState([]);
  const [searched,setSearched]=useState(false);
  const [selPoi,setSelPoi]=useState(null);
  const [filter,setFilter]=useState("all");
  const [searchHistory,setSearchHistory]=useState(()=>LS.getJ("oit_search_history")||[]);
  const [compareMode,setCompareMode]=useState(false);
  const [compareList,setCompareList]=useState([]);
  const [showConfronto,setShowConfronto]=useState(false);
  const [tripMode,setTripMode]=useState(false);
  const [tripStops,setTripStops]=useState(()=>LS.getJ("oit_trip")||[]);
  const [tripSummary,setTripSummary]=useState(null);
  /* ─── Autocomplete suggestions (Nominatim) ─── */
  const [suggestions,setSuggestions]=useState([]);
  const [showSugg,setShowSugg]=useState(false);
  const suggTimer=useRef(null);
  const suggCache=useRef({});
  function fetchSuggestions(text){
    if(suggTimer.current)clearTimeout(suggTimer.current);
    if(!text||text.trim().length<2){setSuggestions([]);setShowSugg(false);return;}
    const cacheKey=text.trim().toLowerCase();
    if(suggCache.current[cacheKey]){setSuggestions(suggCache.current[cacheKey]);setShowSugg(true);return;}
    suggTimer.current=setTimeout(async()=>{
      try{
        const r=await fetch(
          "https://nominatim.openstreetmap.org/search?q="+encodeURIComponent(text.trim())+"&format=json&limit=6&addressdetails=1&accept-language=it,en",
          {headers:{"User-Agent":"OversizeInTour/1.0"},signal:AbortSignal.timeout(4000)}
        );
        const d=await r.json();
        const items=(d||[]).map(function(s){
          const parts=[];
          const a=s.address||{};
          if(a.tourism||a.leisure)parts.push(a.tourism||a.leisure);
          if(a.city||a.town||a.village||a.municipality)parts.push(a.city||a.town||a.village||a.municipality);
          if(a.county||a.state)parts.push(a.county||a.state);
          if(a.country)parts.push(a.country);
          const subtitle=parts.join(", ");
          const typeIco=s.type==="camp_site"||s.type==="caravan_site"?"🏕":
                        s.type==="city"||s.type==="town"||s.type==="village"?"🏙":
                        s.type==="lake"||s.type==="water"?"🌊":
                        s.type==="beach"?"🏖":
                        s.type==="mountain"||s.type==="peak"?"🏔":
                        s.type==="island"?"🏝":
                        s.class==="boundary"?"📍":
                        s.class==="tourism"?"⛺":"📍";
          return{
            display:s.display_name||text,
            short:(s.name||"").length>0?s.name:s.display_name?.split(",")[0]||text,
            subtitle,typeIco,
            lat:parseFloat(s.lat),lng:parseFloat(s.lon)
          };
        }).filter(function(s){return s.short&&s.short.length>1;});
        suggCache.current[cacheKey]=items;
        setSuggestions(items);
        setShowSugg(items.length>0);
      }catch(e){/* silently fail */}
    },320);
  }
  function handleInputChange(e){
    const v=e.target.value;
    setQ(v);
    fetchSuggestions(v);
  }
  function selectSuggestion(s){
    setQ(s.short);
    setSuggestions([]);
    setShowSugg(false);
  }

  if(showConfronto&&compareList.length>=2)return<ConfrontoScreen pois={compareList} camper={camper} onBack={()=>setShowConfronto(false)}/>;
  if(selPoi)return<AnalisiScreen poi={selPoi} camper={camper} ttKey={ttKey} geminiKey={geminiKey} groqKey={groqKey} mapillaryKey={mapillaryKey}
    onBack={()=>setSelPoi(null)} onSave={onSaveOversize} tripMode={tripMode} tripStops={tripStops} onAddTrip={(p)=>{const n=[...tripStops,p];setTripStops(n);LS.setJ("oit_trip",n);}}/>;

  async function cerca(){
    if(!q.trim())return;
    setShowSugg(false);setSuggestions([]);
    setLoading(true);setPois([]);setSelPoi(null);setSearched(true);
    try{
      const coord=await geocode(null,q);
      if(coord){
        setCenter({lat:coord.lat,lng:coord.lng});setZoom(11);
        setDestMk({id:"dest",lat:coord.lat,lng:coord.lng,name:q,isDest:true,sub:"Destinazione"});
        if(onCenterChange)onCenterChange({lat:coord.lat,lng:coord.lng,city:q.split(",")[0].trim()});
        const found=await searchPOIs(null,coord.lat,coord.lng);
        setPois(found);
        // Save search history
        if(found.length>0){
          const history=LS.getJ("oit_search_history")||[];
          const entry={q:q.trim(),lat:coord.lat,lng:coord.lng,count:found.length,ts:Date.now()};
          const updated=[entry,...history.filter(h=>h.q.toLowerCase()!==q.trim().toLowerCase())].slice(0,10);
          LS.setJ("oit_search_history",updated);
          setSearchHistory(updated);
        }
      }
    }catch(e){}
    setLoading(false);
  }

  const filtered=filter==="all"?pois:filter==="sosta"?pois.filter(p=>!p.isCamp&&!p.isDump):filter==="dump"?pois.filter(p=>p.isDump):pois.filter(p=>p.isCamp);
  const mapMarkers=[
    ...(destMk?[destMk]:[]),
    ...pois.map(p=>({...p,isDest:false,sub:p.address+(p.distKm<99?" · "+p.distKm+"km":""),_markerColor:p.isDump?"#16a34a":p.isCamp?"#8b5cf6":p._source==="park4night"?"#f59e0b":"#3b82f6"}))
  ];
  return(
    <div className="pg">
      <div className="hero">
        <h2>Trova la tua sosta</h2>
        <p>Cerca una destinazione → scelgo dall'elenco → l'AI analizza l'accesso per il tuo camper {camper.length}m.</p>
      </div>
      {/* Trip Planner Toggle */}
      <div style={{display:"flex",gap:6}}>
        <button onClick={()=>{setTripMode(!tripMode);if(!tripMode)setTimeout(()=>{document.querySelector('.pg')?.scrollTo({top:0,behavior:"smooth"});},100);}} style={{
          flex:1,padding:"8px 12px",borderRadius:10,border:"1.5px solid "+(tripMode?"#f97316":"var(--border2)"),
          background:tripMode?"#fff7ed":"var(--card)",fontSize:11,fontWeight:700,
          color:tripMode?"#ea580c":"var(--text2)",cursor:"pointer"
        }}>
          🗺 {tripMode?"Chiudi Pianifica":"Pianifica viaggio"}
          {tripStops.length>0&&!tripMode&&<span style={{marginLeft:4,background:"#f97316",color:"#fff",borderRadius:99,padding:"1px 6px",fontSize:9}}>{tripStops.length}</span>}
        </button>
      </div>
      {/* Trip Mode Panel */}
      {tripMode&&(
        <div style={{background:"var(--card)",border:"1.5px solid #fed7aa",borderRadius:12,padding:"12px 14px"}}>
          <div style={{fontFamily:"Poppins",fontWeight:700,fontSize:13,marginBottom:8,color:"#ea580c"}}>🗺 Pianifica Viaggio</div>
          {tripStops.length===0&&(
            <div style={{fontSize:11,color:"var(--text3)",textAlign:"center",padding:"8px 0"}}>
              Cerca una destinazione e aggiungi le tappe del tuo viaggio.
            </div>
          )}
          <button onClick={()=>{const inp=document.querySelector('.sbar input');if(inp){inp.scrollIntoView({behavior:"smooth",block:"center"});setTimeout(()=>inp.focus(),400);}}} className="btn bto bsm" style={{width:"100%",marginBottom:tripStops.length>0?0:0}}>
            + Aggiungi tappa
          </button>
          {tripStops.map((stop,i)=>{
            const cached=LS.getJ("oit_cache_"+stop.id);
            const hasCache=cached&&(Date.now()-cached.timestamp<7*24*3600*1000);
            return(
              <div key={stop.id+i} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0",borderBottom:i<tripStops.length-1?"1px solid var(--border2)":"none"}}>
                <div style={{width:24,height:24,borderRadius:"50%",background:"#f97316",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,flexShrink:0}}>{i+1}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{stop.name}</div>
                  <div style={{fontSize:10,color:"var(--text3)"}}>
                    {stop.distKm<99?stop.distKm+"km · ":""}
                    {hasCache?<span style={{color:"#16a34a"}}>📦 Analizzato ({cached.score?.score||"?"}pts)</span>:<span style={{color:"#94a3b8"}}>Non analizzato</span>}
                  </div>
                </div>
                <div style={{display:"flex",gap:3,flexShrink:0}}>
                  {i>0&&<button onClick={()=>{const n=[...tripStops];[n[i-1],n[i]]=[n[i],n[i-1]];setTripStops(n);LS.setJ("oit_trip",n);}} style={{background:"none",border:"1px solid var(--border2)",borderRadius:6,cursor:"pointer",padding:"2px 5px",fontSize:10}}>↑</button>}
                  {i<tripStops.length-1&&<button onClick={()=>{const n=[...tripStops];[n[i],n[i+1]]=[n[i+1],n[i]];setTripStops(n);LS.setJ("oit_trip",n);}} style={{background:"none",border:"1px solid var(--border2)",borderRadius:6,cursor:"pointer",padding:"2px 5px",fontSize:10}}>↓</button>}
                  <button onClick={()=>{setSelPoi(stop);}} style={{background:"#eff6ff",border:"none",borderRadius:6,cursor:"pointer",padding:"2px 6px",fontSize:10,color:"#1d4ed8",fontWeight:700}}>🤖</button>
                  <button onClick={()=>{const n=tripStops.filter((_,j)=>j!==i);setTripStops(n);LS.setJ("oit_trip",n);}} style={{background:"#fee2e2",border:"none",borderRadius:6,cursor:"pointer",padding:"2px 6px",fontSize:10,color:"#dc2626"}}>✕</button>
                </div>
              </div>
            );
          })}
          {tripStops.length>=2&&(
            <div style={{marginTop:8,padding:"8px 10px",background:"#fff7ed",borderRadius:8,border:"1px solid #fed7aa"}}>
              <div style={{fontSize:11,fontWeight:700,color:"#ea580c",marginBottom:4}}>📊 Riepilogo Viaggio</div>
              <div style={{fontSize:11,color:"var(--text2)"}}>
                🏕 {tripStops.length} tappe
                {(()=>{
                  let analyzed=0,totalScore=0;
                  tripStops.forEach(s=>{const c=LS.getJ("oit_cache_"+s.id);if(c&&c.score){analyzed++;totalScore+=c.score.score;}});
                  return analyzed>0?` · 📦 ${analyzed} analizzate · Media punteggio: ${Math.round(totalScore/analyzed)}/100`:" · Nessuna tappa analizzata";
                })()}
              </div>
            </div>
          )}
          {tripStops.length>0&&(
            <button className="btn bred bsm" style={{width:"100%",marginTop:6}} onClick={()=>{setTripStops([]);LS.del("oit_trip");setTripSummary(null);}}>🗑 Cancella viaggio</button>
          )}
        </div>
      )}
      {/* Search with autocomplete */}
      <div style={{position:"relative"}}>
        <div className="sbar">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#adb5bd" strokeWidth="2.2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input placeholder="Es: Lago di Garda, Côte d'Azur, Barcelona, Bayern..." value={q}
            onChange={handleInputChange}
            onKeyDown={e=>{if(e.key==="Enter"){setShowSugg(false);cerca();}if(e.key==="Escape")setShowSugg(false);}}
            onFocus={()=>{if(suggestions.length>0)setShowSugg(true);}}
            onBlur={()=>setTimeout(()=>setShowSugg(false),200)}
            autoComplete="off"/>
          {q&&<button onClick={()=>{setQ("");setPois([]);setSearched(false);setDestMk(null);setZoom(6);setCenter({lat:41.9,lng:12.5});setSuggestions([]);setShowSugg(false);}} style={{border:"none",background:"none",color:"#adb5bd",cursor:"pointer",fontSize:20}}>×</button>}
        </div>
        {/* Autocomplete dropdown */}
        {showSugg&&suggestions.length>0&&(
          <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:500,background:"#fff",border:"1.5px solid #e2e8f0",borderTop:"none",borderRadius:"0 0 14px 14px",boxShadow:"0 8px 24px rgba(0,0,0,.12)",maxHeight:280,overflowY:"auto"}}>
            {suggestions.map(function(s,i){return(
              <div key={i} onClick={function(){selectSuggestion(s);}}
                style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",cursor:"pointer",borderBottom:i<suggestions.length-1?"1px solid #f1f5f9":"none",transition:"background .15s"}}
                onMouseEnter={function(e){e.currentTarget.style.background="#fff7ed";}}
                onMouseLeave={function(e){e.currentTarget.style.background="#fff";}}>
                <span style={{fontSize:20,flexShrink:0,width:28,textAlign:"center"}}>{s.typeIco}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:13,color:"#1a1a2e",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.short}</div>
                  <div style={{fontSize:10,color:"#94a3b8",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginTop:1}}>{s.subtitle}</div>
                </div>
                <span style={{fontSize:11,color:"#f97316",fontWeight:600,flexShrink:0}}>→</span>
              </div>
            );})}
            <div style={{padding:"6px 14px",fontSize:10,color:"#cbd5e1",textAlign:"center",borderTop:"1px solid #f1f5f9"}}>
              Powered by OpenStreetMap/Nominatim
            </div>
          </div>
        )}
      </div>
      <button className="btn bto" style={{width:"100%"}} onClick={cerca} disabled={loading||!q.trim()}>
        {loading?<><span className="spin"/>Ricerca aree sosta e campeggi...</>:"🔍 Cerca aree sosta e campeggi"}
      </button>
      {/* Search History */}
      {!q&&!searched&&searchHistory.length>0&&(
        <div style={{background:"var(--card)",borderRadius:12,border:"1px solid var(--border)",padding:"10px 12px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
            <span style={{fontSize:11,fontWeight:700,color:"var(--text2)"}}>🕒 Ricerche recenti</span>
            <button onClick={()=>{LS.del("oit_search_history");setSearchHistory([]);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:10,color:"#dc2626",fontWeight:600}}>🗑 Cancella</button>
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {searchHistory.map((h,i)=>(
              <button key={i} onClick={()=>{setQ(h.q);setShowSugg(false);setLoading(true);setPois([]);setSelPoi(null);setSearched(true);(async()=>{try{const coord=await geocode(null,h.q);if(coord){setCenter({lat:coord.lat,lng:coord.lng});setZoom(11);setDestMk({id:"dest",lat:coord.lat,lng:coord.lng,name:h.q,isDest:true,sub:"Destinazione"});if(onCenterChange)onCenterChange({lat:coord.lat,lng:coord.lng,city:h.q.split(",")[0].trim()});const found=await searchPOIs(null,coord.lat,coord.lng);setPois(found);}}catch(e){}setLoading(false);})();}} style={{
                padding:"5px 10px",borderRadius:99,border:"1.5px solid var(--border2)",
                background:"var(--bg)",fontSize:11,fontWeight:600,color:"var(--text2)",cursor:"pointer",
                display:"flex",alignItems:"center",gap:4
              }}>
                📍 {h.q} <span style={{fontSize:9,color:"var(--text3)"}}>({h.count})</span>
              </button>
            ))}
          </div>
        </div>
      )}
      {/* Link esterni per la ricerca manuale */}
      {destMk&&(
        <div style={{display:"flex",gap:6}}>
          <a href={"https://www.google.com/maps/search/campeggi+aree+sosta+camper/@"+destMk.lat+","+destMk.lng+",12z"} target="_blank" style={{textDecoration:"none",flex:1}}>
            <button className="btn bsm bgh" style={{width:"100%"}}>🗺 Google Maps</button>
          </a>
          <a href={"https://park4night.com/it/search?lat="+destMk.lat+"&lng="+destMk.lng+"&z=13"} target="_blank" style={{textDecoration:"none",flex:1}}>
            <button className="btn bsm bgh" style={{width:"100%"}}>🌿 Park4Night</button>
          </a>
        </div>
      )}
      {/* Mappa */}
      {searched&&(
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"2px 2px 8px"}}>
            <div style={{fontFamily:"Poppins",fontWeight:700,fontSize:13}}>
              {pois.length>0?pois.length+" strutture trovate":(loading?"Ricerca in corso...":"Nessuna struttura trovata")}
            </div>
            <div style={{fontSize:9,color:"#94a3b8"}}>🟠 meta · 🟣 camp · 🔵 sosta</div>
          </div>
          <div className="mwrap">
            <TomMap ttKey={ttKey} center={center} zoom={zoom} markers={mapMarkers}
              onPoiClick={p=>setSelPoi(p)} height={260}/>
          </div>
          {pois.length>0&&<div style={{fontSize:11,color:"#94a3b8",textAlign:"center",padding:"5px 0"}}>
            👆 Tocca un punto sulla mappa o seleziona dalla lista sotto
          </div>}
        </div>
      )}
      {/* Filtri + Lista */}
      {pois.length>0&&(
        <>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
            {[["all","Tutte ("+pois.length+")"],["sosta","🅿️ Sosta/Stellplatz"],["camp","🏕 Campeggi"],["dump","🚰 Dump Station"]].map(([v,l])=>(
              <button key={v} onClick={()=>setFilter(v)} style={{
                padding:"5px 10px",borderRadius:99,border:"1.5px solid",
                borderColor:filter===v?"#f97316":"#e2e8f0",
                background:filter===v?"#fff7ed":"#fff",
                fontSize:11,fontWeight:700,color:filter===v?"#ea580c":"#64748b",cursor:"pointer"
              }}>{l}</button>
            ))}
            <button onClick={()=>{setCompareMode(!compareMode);if(compareMode)setCompareList([]);}} style={{
              padding:"5px 10px",borderRadius:99,border:"1.5px solid",
              borderColor:compareMode?"#7c3aed":"#e2e8f0",
              background:compareMode?"#f3e8ff":"#fff",
              fontSize:11,fontWeight:700,color:compareMode?"#7c3aed":"#64748b",cursor:"pointer"
            }}>⚖️ Confronta</button>
          </div>
          {compareMode&&compareList.length>0&&(
            <div style={{display:"flex",gap:6,alignItems:"center",background:"#f3e8ff",borderRadius:10,padding:"8px 12px",border:"1.5px solid #ddd6fe"}}>
              <span style={{fontSize:11,color:"#7c3aed",fontWeight:600}}>{compareList.length}/3 selezionate</span>
              {compareList.length>=2&&(
                <button className="btn bsm" style={{marginLeft:"auto",background:"#7c3aed",color:"#fff",border:"none"}} onClick={()=>setShowConfronto(true)}>⚖️ Confronta selezionati</button>
              )}
              <button className="btn bsm" style={{background:"#fee2e2",color:"#dc2626",border:"none"}} onClick={()=>setCompareList([])}>Annulla</button>
            </div>
          )}
          <div className="card">
            <div style={{fontFamily:"Poppins",fontWeight:700,fontSize:13,marginBottom:10,display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontSize:14}}>📍</span>
              {tripMode?"Strutture trovate — tocca + Tappa":"Strutture trovate — tocca per analisi AI"}
            </div>
            {tripMode&&<div style={{background:"#fff7ed",border:"1px solid #fed7aa",borderRadius:8,padding:"6px 10px",marginBottom:10,fontSize:11,color:"#ea580c",fontWeight:600,textAlign:"center"}}>
              👆 Tocca <b>+ Tappa</b> accanto a ogni struttura per aggiungerla al viaggio
            </div>}
            {filtered.map(p=>{
              const isInCompare=compareList.some(c=>c.id===p.id);
              return(
              <div key={p.id} className="poi-row" onClick={()=>{if(compareMode){if(isInCompare){setCompareList(prev=>prev.filter(c=>c.id!==p.id));}else if(compareList.length<3){setCompareList(prev=>[...prev,p]);}return;}setSelPoi(p);}} style={isInCompare?{borderColor:"#7c3aed",background:"#faf5ff"}:{}}>
                {compareMode&&(
                  <div style={{width:22,height:22,borderRadius:6,border:"2px solid "+(isInCompare?"#7c3aed":"#cbd5e1"),background:isInCompare?"#7c3aed":"#fff",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:12,color:"#fff"}}>
                    {isInCompare?"✓":""}
                  </div>
                )}
                <div className="poi-ico" style={{background:p.isDump?"#dcfce7":p.isCamp?"#fdf4ff":p._source==="park4night"?"#fef3c7":"#eff6ff"}}>
                  {p.isDump?"🚰":p.isCamp?"🏕":p.isStellplatz?"🚐":"🅿️"}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <div style={{fontWeight:700,fontSize:13,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",flex:1}}>{p.name}</div>
                    {p._source==="park4night"&&<span style={{fontSize:9,background:"#fef3c7",color:"#92400e",borderRadius:4,padding:"1px 5px",fontWeight:700,flexShrink:0}}>P4N</span>}
                    {p._rating&&<span style={{fontSize:9,color:"#f59e0b",fontWeight:700,flexShrink:0}}>★{p._rating}</span>}
                  </div>
                  <div style={{fontSize:11,color:"#64748b",marginTop:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.address}{p._fee?" · "+({yes:"💰",no:"🆓"}[p._fee]||""):""}{p._capacity?" · "+p._capacity+" posti":""}</div>
                  <div style={{display:"flex",gap:5,marginTop:4,flexWrap:"wrap"}}>
                    <a href={"https://www.google.com/maps/search/"+encodeURIComponent(p.name+" "+p.address)} target="_blank" onClick={e=>e.stopPropagation()} style={{textDecoration:"none"}}>
                      <span className="src-logo src-gm">🗺 Maps</span>
                    </a>
                    {p.website&&<a href={p.website} target="_blank" onClick={e=>e.stopPropagation()} style={{textDecoration:"none"}}>
                      <span className="src-logo src-tt">🌐 Sito</span>
                    </a>}
                  </div>
                </div>
                <div style={{flexShrink:0,display:"flex",flexDirection:"column",alignItems:"flex-end",gap:3}}>
                  {p.distKm<99&&<span style={{fontSize:10,color:"#94a3b8"}}>{p.distKm}km</span>}
                  {tripMode&&!tripStops.some(s=>s.id===p.id)?(
                    <button onClick={e=>{e.stopPropagation();const n=[...tripStops,p];setTripStops(n);LS.setJ("oit_trip",n);}} style={{fontSize:10,color:"#ea580c",fontWeight:700,whiteSpace:"nowrap",background:"#fff7ed",border:"1px solid #fed7aa",borderRadius:6,padding:"3px 8px",cursor:"pointer"}}>+ Tappa</button>
                  ):tripMode&&tripStops.some(s=>s.id===p.id)?(

                  ):(

        const timeAgo=(()=>{

function TabOversize({camper,ttKey,externalItems,onRemove}){
  const [adding,setAdding]=useState(false);
  const [form,setForm]=useState({name:"",address:"",note:"",website:""});
  const [localItems,setLocalItems]=useState(()=>LS.getJ("oit_oversize_manual")||[]);
  const [regionMap,setRegionMap]=useState(()=>LS.getJ("oit_region_map")||{});
  const [openRegions,setOpenRegions]=useState({});
  const [detecting,setDetecting]=useState(false);
  const allItems=[...externalItems,...localItems];
  // Auto-detect regions for items without one
  useEffect(()=>{
    let cancelled=false;
    async function detectAll(){
      const toDetect=allItems.filter(i=>i.lat&&!regionMap[i.id]);
      if(toDetect.length===0)return;
      setDetecting(true);
      const newMap={...regionMap};
      for(let idx=0;idx<toDetect.length;idx++){
        if(cancelled)break;
        const it=toDetect[idx];
        const reg=await detectRegion(it.lat,it.lng);
        if(reg)newMap[it.id]=reg;
        if(idx<toDetect.length-1)await new Promise(r=>setTimeout(r,1100));
      }
      if(!cancelled){
        setRegionMap(newMap);
        LS.setJ("oit_region_map",newMap);
        setDetecting(false);
      }
    }
    detectAll();
    return()=>{cancelled=true;};
  },[allItems.length]);
  // Group items by country > region
  const grouped=useMemo(()=>{
    const byCountry={};
    allItems.forEach(item=>{
      const info=regionMap[item.id]||null;
      // Support old format (string region) and new format ({country,region})
      let country,region;
      if(info&&typeof info==="object"){country=info.country||"Altro";region=info.region||"Sconosciuta";}
      else if(typeof info==="string"){country="Italia";region=info;}
      else{country="_unknown";region="_unknown";}
      if(!byCountry[country])byCountry[country]={};
      if(!byCountry[country][region])byCountry[country][region]=[];
      byCountry[country][region].push(item);
    });
    // Sort countries by EU_COUNTRY_ORDER, then alphabetically
    const countryEntries=Object.entries(byCountry).sort(([a],[b])=>{
      if(a==="_unknown")return 1;if(b==="_unknown")return-1;
      const ia=EU_COUNTRY_ORDER.indexOf(a),ib=EU_COUNTRY_ORDER.indexOf(b);
      if(ia>=0&&ib>=0)return ia-ib;
      if(ia>=0)return-1;if(ib>=0)return 1;
      return a.localeCompare(b);
    });
    // For each country, sort regions (Italy by IT_REGIONS_META order, others alphabetically)
    const itOrder=IT_REGIONS_META.map(([n])=>n);
    return countryEntries.map(([country,regions])=>{
      const regionEntries=Object.entries(regions).sort(([a],[b])=>{
        if(a==="_unknown")return 1;if(b==="_unknown")return-1;
        if(country==="Italia"){
          const ia=itOrder.indexOf(a),ib=itOrder.indexOf(b);
          if(ia>=0&&ib>=0)return ia-ib;
          if(ia>=0)return-1;if(ib>=0)return 1;
        }
        return a.localeCompare(b);
      });
      return[country,regionEntries];
    });
  },[allItems,regionMap]);
  const populatedCountries=grouped.filter(([k])=>k!=="_unknown").length;
  const totalRegions=grouped.reduce((s,[,regs])=>s+regs.filter(([k])=>k!=="_unknown").length,0);
  function toggleRegion(reg){setOpenRegions(prev=>({...prev,[reg]:!prev[reg]}));}
  function saveManual(){
    if(!form.name.trim())return;
    const ni={id:"m_"+Date.now(),...form,lat:null,lng:null,manual:true};
    if(form.address){
      geocode(null,form.address).then(c=>{
        if(c){
          setLocalItems(prev=>{
            const u=prev.map(i=>i.id===ni.id?{...i,lat:c.lat,lng:c.lng}:i);
            LS.setJ("oit_oversize_manual",u);return u;
          });
        }
      });
    }
    const upd=[...localItems,ni];
    setLocalItems(upd);LS.setJ("oit_oversize_manual",upd);
    setForm({name:"",address:"",note:"",website:""});setAdding(false);
  }
  function removeLocal(id){
    const u=localItems.filter(i=>i.id!==id);
    setLocalItems(u);LS.setJ("oit_oversize_manual",u);
    // Also remove from regionMap
    const nm={...regionMap};delete nm[id];setRegionMap(nm);LS.setJ("oit_region_map",nm);
  }
  function removeItem(item){
    if(item.manual)removeLocal(item.id);
    else{onRemove(item.id);const nm={...regionMap};delete nm[item.id];setRegionMap(nm);LS.setJ("oit_region_map",nm);}
  }
  const mapMks=allItems.filter(i=>i.lat).map(i=>({...i,isOversize:true,sub:i.address||""}));
  function renderItem(item){
    return(
      <div key={item.id} className="oversize-item">
        <div style={{width:34,height:34,borderRadius:9,background:item.verdict==="ok"?"#dcfce7":item.verdict==="warn"?"#fef9c3":"#f0fdf4",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,flexShrink:0}}>
          {item.verdict==="ok"?"✅":item.verdict==="warn"?"⚠️":item.verdict==="no"?"🔴":"📍"}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:700,fontSize:13}}>{item.name}</div>
          {item.address&&<div style={{fontSize:11,color:"#15803d",marginTop:2}}>📍 {item.address}</div>}
          {item.note&&<div style={{fontSize:11,color:"#475569",marginTop:2,fontStyle:"italic"}}>"{item.note}"</div>}
          {item.website&&<a href={item.website.startsWith("http")?item.website:"https://"+item.website} target="_blank" style={{fontSize:11,color:"#f97316",marginTop:2,display:"block",fontWeight:600}}>🌐 {item.website}</a>}
          {item.verdict&&<div style={{fontSize:10,marginTop:3,color:item.verdict==="ok"?"#16a34a":item.verdict==="warn"?"#a16207":"#dc2626",fontWeight:700}}>
            {item.verdict==="ok"?"✅ Adatto":item.verdict==="warn"?"⚠️ Con attenzione":"🔴 Non adatto"}
          </div>}
        </div>
        <div style={{flexShrink:0,display:"flex",flexDirection:"column",gap:5}}>
          {item.lat&&<a href={"https://www.google.com/maps/dir/?api=1&destination="+encodeURIComponent(item.name+" "+(item.address||""))} target="_blank" style={{textDecoration:"none"}}><button className="btn bgh bsm">🧭</button></a>}
          <button style={{background:"#fee2e2",color:"#dc2626",border:"none",cursor:"pointer",borderRadius:8,padding:"5px 10px",fontSize:11,fontWeight:700}}
            onClick={()=>removeItem(item)}>🗑</button>
        </div>
      </div>
    );
  }
  return(
    <div className="pg">
      <div className="hero" style={{background:"linear-gradient(135deg,#f97316,#ea580c)"}}>
        <h2>⭐ I miei Preferiti</h2>
        <p>Le tue mete salvate per il camper {camper.length}m — organizzate per paese e regione.</p>
        {allItems.length>0&&(
          <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
            <span style={{background:"rgba(255,255,255,.2)",borderRadius:99,padding:"3px 10px",fontSize:11,fontWeight:700}}>📍 {allItems.length} mete</span>
            {populatedCountries>0&&<span style={{background:"rgba(255,255,255,.2)",borderRadius:99,padding:"3px 10px",fontSize:11,fontWeight:700}}>🌍 {populatedCountries} {populatedCountries===1?"paese":"paesi"}</span>}
            {totalRegions>0&&<span style={{background:"rgba(255,255,255,.2)",borderRadius:99,padding:"3px 10px",fontSize:11,fontWeight:700}}>🗺 {totalRegions} regioni</span>}
          </div>
        )}
      </div>
      {mapMks.length>0&&(
        <div className="mwrap">
          <TomMap ttKey={ttKey} center={{lat:mapMks[0].lat,lng:mapMks[0].lng}} zoom={6} markers={mapMks} height={200}/>
        </div>
      )}
      {detecting&&(
        <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 14px",background:"#eff6ff",borderRadius:10,fontSize:12,color:"#1d4ed8"}}>
          <span className="spin"/>Rilevamento regioni in corso...
        </div>
      )}
      {/* Country > Region grouped list */}
      {grouped.length>0&&grouped.map(([country,regions])=>{
        const isUnknownCountry=country==="_unknown";
        const countryFlag=EU_COUNTRY_FLAGS[country]||"🌍";
        const countryName=isUnknownCountry?"Da rilevare":country;
        const countryItemCount=regions.reduce((s,[,items])=>s+items.length,0);
        const isCountryOpen=openRegions["c_"+country]!==false;
        return(
          <div key={"c_"+country} style={{marginBottom:10}}>
            <button onClick={()=>toggleRegion("c_"+country)} style={{
              width:"100%",display:"flex",alignItems:"center",gap:10,padding:"10px 14px",
              background:isCountryOpen?"#ecfdf5":"#f8fafc",border:"1.5px solid #d1fae5",borderRadius:12,cursor:"pointer",textAlign:"left"
            }}>
              <span style={{fontSize:24}}>{countryFlag}</span>
              <div style={{flex:1}}>
                <div style={{fontFamily:"Poppins",fontWeight:700,fontSize:14,color:"#1a1a2e"}}>{countryName}</div>
                <div style={{fontSize:11,color:"#64748b"}}>{countryItemCount} {countryItemCount===1?"meta":"mete"} · {regions.length} {regions.length===1?"regione":"regioni"}</div>
              </div>
              <span style={{fontSize:16,color:"#94a3b8",transition:"transform .2s",transform:isCountryOpen?"rotate(180deg)":"rotate(0)"}}>{"\u25BC"}</span>
            </button>
            {isCountryOpen&&regions.map(([region,items])=>{
              const isUnknownReg=region==="_unknown";
              const regName=isUnknownReg?"Regione da rilevare":region;
              const regIco=isUnknownReg?"📍":(country==="Italia"?(IT_REGION_ICO[region]||"📍"):"📍");
              const isRegOpen=openRegions["r_"+country+"_"+region]!==false;
              return(
                <div key={"r_"+region} className="card" style={{padding:0,overflow:"hidden",marginBottom:6,marginLeft:12,marginTop:6}}>
                  <button onClick={()=>toggleRegion("r_"+country+"_"+region)} style={{
                    width:"100%",display:"flex",alignItems:"center",gap:8,padding:"10px 12px",
                    background:isRegOpen?"#f0fdf4":"#fff",border:"none",cursor:"pointer",textAlign:"left"
                  }}>
                    <span style={{fontSize:18}}>{regIco}</span>
                    <div style={{flex:1}}>
                      <div style={{fontFamily:"Poppins",fontWeight:600,fontSize:12,color:"#1a1a2e"}}>{regName}</div>
                      <div style={{fontSize:10,color:"#64748b"}}>{items.length} {items.length===1?"struttura":"strutture"}</div>
                    </div>
                    <span style={{fontSize:14,color:"#94a3b8",transition:"transform .2s",transform:isRegOpen?"rotate(180deg)":"rotate(0)"}}>{"\u25BC"}</span>
                  </button>
                  {isRegOpen&&(
                    <div style={{padding:"0 10px 10px",borderTop:"1px solid #e2e8f0"}}>
                      {items.map(renderItem)}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        );
      })}
      {!adding?(
        <button className="btn bgrn" style={{width:"100%"}} onClick={()=>setAdding(true)}>➕ Aggiungi manualmente</button>
      ):(
        <div className="card" style={{border:"2px solid #86efac"}}>
          <div style={{fontFamily:"Poppins",fontWeight:700,fontSize:13,marginBottom:12}}>➕ Aggiungi meta</div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <div className="igrp"><div className="ilab">Nome *</div><input className="inp" placeholder="Es: Camping Bella Vista" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/></div>
            <div className="igrp"><div className="ilab">Indirizzo</div><input className="inp" placeholder="Es: Via Roma 1, Lago di Garda" value={form.address} onChange={e=>setForm({...form,address:e.target.value})}/></div>
            <div className="igrp"><div className="ilab">Sito web</div><input className="inp" placeholder="www.camping..." value={form.website} onChange={e=>setForm({...form,website:e.target.value})}/></div>
            <div className="igrp"><div className="ilab">Note</div><input className="inp" placeholder="Es: Ingresso 4m, piazzole 14m, asfalto" value={form.note} onChange={e=>setForm({...form,note:e.target.value})}/></div>
            <div style={{display:"flex",gap:8}}>
              <button className="btn bgrn" style={{flex:1}} onClick={saveManual}>✅ Salva</button>
              <button className="btn bgh" style={{flex:1}} onClick={()=>setAdding(false)}>Annulla</button>
            </div>
          </div>
        </div>
      )}
      {allItems.length===0&&!adding&&(
        <div style={{textAlign:"center",padding:24,color:"#94a3b8",fontSize:13,lineHeight:1.7}}>
          Nessuna meta ancora.<br/>Le strutture confermate dall'AI appariranno qui,<br/>organizzate automaticamente per regione.
        </div>
      )}
    </div>
  );
}

/* ─── Rental POI search: Overpass/OSM (gratuito, nessuna chiave) ─── */
async function searchRentalPOIs(_key,lat,lng){
  const query=`[out:json][timeout:15];
(
  node(around:20000,${lat},${lng})["amenity"="car_rental"];
  way(around:20000,${lat},${lng})["amenity"="car_rental"];
  node(around:20000,${lat},${lng})["amenity"="bicycle_rental"];
  node(around:20000,${lat},${lng})["amenity"="motorcycle_rental"];
  node(around:20000,${lat},${lng})["name"~"noleggio|rent|hertz|avis|europcar|sixt|maggiore|autovermietung|location|alquiler",i]["shop"];
);out body center 20;`;
  try{
    const r=await fetch("https://overpass-api.de/api/interpreter",{
      method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},
      body:"data="+encodeURIComponent(query),signal:AbortSignal.timeout(15000)
    });
    const d=await r.json();
    const seen=new Set();
    return(d.elements||[])
      .map(el=>{
        const t=el.tags||{};
        const elLat=el.lat||el.center?.lat;
        const elLng=el.lon||el.center?.lon;
        if(!elLat||!elLng)return null;
        const name=t.name||t["name:en"]||t["name:de"]||t["name:fr"]||t["name:it"]||"Rental/Noleggio";
        if(seen.has(name))return null; seen.add(name);
        const addr=[t["addr:street"],t["addr:housenumber"],t["addr:city"]].filter(Boolean).join(", ");
        const distKm=calcDistKm(lat,lng,elLat,elLng);
        const isMoto=/(bicycle|motorcycle|moto|scooter)/i.test(t.amenity||name);
        return{id:el.id,name,address:addr||"",lat:elLat,lng:elLng,distKm,
          phone:t.phone||t["contact:phone"]||null,website:t.website||t["contact:website"]||null,isMoto};
      })
      .filter(Boolean)
      .sort((a,b)=>a.distKm-b.distKm).slice(0,20);
  }catch(e){return[];}
}
function TabNoleggio({ttKey,lastCenter}){

/* ─── Assistenza: geocode + OSM helpers ─── */
async function geocodeZona(zona){
  try{
    const r=await fetch(
      "https://nominatim.openstreetmap.org/search?q="+encodeURIComponent(zona)+"&format=json&limit=1",
      {headers:{"Accept-Language":"it,en","User-Agent":"OversizeInTour/1.0"},signal:AbortSignal.timeout(8000)}
    );
    const d=await r.json();
    if(d&&d[0])return{lat:parseFloat(d[0].lat),lng:parseFloat(d[0].lon)};
  }catch(e){}
  return null;
}
function calcDistKm(lat1,lng1,lat2,lng2){
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}
async function searchCentriOSM(lat,lng){
  const rad=80000;
  const query=`[out:json][timeout:25];
(
  node(around:${rad},${lat},${lng})["shop"~"camper|motorhome|caravan",i];
  way(around:${rad},${lat},${lng})["shop"~"camper|motorhome|caravan",i];
  node(around:${rad},${lat},${lng})["name"~"camper|autocaravan|motorhome|roulotte|caravan|wohnmobil|camping.car|autocaravana|husbil",i]["shop"];
  way(around:${rad},${lat},${lng})["name"~"camper|autocaravan|motorhome|roulotte|caravan|wohnmobil|camping.car|autocaravana|husbil",i]["shop"];
  node(around:${rad},${lat},${lng})["name"~"camper|autocaravan|motorhome|roulotte|caravan|wohnmobil|camping.car|autocaravana|husbil",i]["craft"];
  way(around:${rad},${lat},${lng})["name"~"camper|autocaravan|motorhome|roulotte|caravan|wohnmobil|camping.car|autocaravana|husbil",i]["craft"];
  node(around:${rad},${lat},${lng})["name"~"camper|autocaravan|motorhome|roulotte|caravan|wohnmobil|camping.car|autocaravana|husbil",i]["amenity"="car_repair"];
);out body center;`;
  try{
    const r=await fetch("https://overpass-api.de/api/interpreter",{
      method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},
      body:"data="+encodeURIComponent(query),signal:AbortSignal.timeout(20000)
    });
    const d=await r.json();
    return(d.elements||[]).map(el=>{
      const t=el.tags||{};
      const elLat=el.lat||el.center?.lat;
      const elLng=el.lon||el.center?.lon;
      const dist=(elLat&&elLng)?calcDistKm(lat,lng,elLat,elLng):null;
      return{
        nome:t.name||t["name:it"]||"",
        indirizzo:[t["addr:street"],t["addr:housenumber"],t["addr:city"]].filter(Boolean).join(", ")||"",
        telefono:t.phone||t["contact:phone"]||"",
        website:t.website||t["contact:website"]||"",
        dist,lat:elLat,lng:elLng,source:"osm"
      };
    }).filter(c=>c.nome&&c.nome.length>2);
  }catch(e){return[];}
}

      });

  async function testGemini(){
    const keyToTest=dGk||geminiKey;
    if(!keyToTest){setTestResult({ok:false,msg:"Nessuna chiave Gemini inserita."});return;}
    setTesting(true);setTestResult(null);
    const models=[
      {v:"v1beta",m:"gemini-2.5-flash"},
      {v:"v1beta",m:"gemini-2.5-flash-lite"},
      {v:"v1beta",m:"gemini-1.5-flash"},
      {v:"v1beta",m:"gemini-1.5-flash-8b"},
      {v:"v1",m:"gemini-2.5-flash"},
      {v:"v1",m:"gemini-1.5-flash"},
    ];
    const results=[];
    for(const {v:apiVer,m} of models){
      try{
        const res=await fetch("https://generativelanguage.googleapis.com/"+apiVer+"/models/"+m+":generateContent?key="+keyToTest.trim(),
          {method:"POST",headers:{"Content-Type":"application/json"},
           body:JSON.stringify({contents:[{parts:[{text:"Rispondi solo: OK"}]}],generationConfig:{maxOutputTokens:10}})});
        const text=await res.text();
        let d;
        try{d=JSON.parse(text);}catch(e){results.push(m+": JSON parse error — "+text.slice(0,60));continue;}
        if(d.error){
          results.push(m+": ❌ "+d.error.status+" — "+d.error.message);
          if(d.error.status==="PERMISSION_DENIED"||d.error.status==="UNAUTHENTICATED"){
            setTestResult({ok:false,msg:"Chiave non valida:\n"+results.join("\n")});
            setTesting(false);return;
          }
