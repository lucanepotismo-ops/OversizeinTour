<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Oversize in Tour</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<!-- Firebase SDK (community backend) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
:root {
  --bg: #f5f7fa; --bg2: #fff; --text: #1a1a2e; --text2: #64748b; --text3: #94a3b8;
  --border: #eaecf0; --border2: #e2e8f0; --card: #fff; --card-shadow: rgba(0,0,0,.04);
  --hero-from: #c9a227; --hero-to: #8b6914;
}
[data-theme="dark"] {
  --bg: #0f172a; --bg2: #1e293b; --text: #f1f5f9; --text2: #94a3b8; --text3: #64748b;
  --border: #334155; --border2: #475569; --card: #1e293b; --card-shadow: rgba(0,0,0,.3);
  --hero-from: #92740a; --hero-to: #5c4a08;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:Inter,sans-serif;color:var(--text);-webkit-font-smoothing:antialiased}
.shell{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--bg)}
.hdr{background:var(--bg2);padding:12px 16px 9px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:300;box-shadow:0 1px 8px rgba(0,0,0,.06)}
.hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.logo{font-family:Poppins,sans-serif;font-size:17px;font-weight:800;color:#1a1a2e}
.logo em{color:#b8860b;font-style:normal;text-shadow:0 1px 2px rgba(184,134,11,.2)}
.chip{display:flex;align-items:center;gap:5px;background:#fefce8;border:1.5px solid #d4a017;border-radius:20px;padding:5px 11px;cursor:pointer}
.chip span{font-size:11px;font-weight:700;color:#996515}
.tbar{display:flex;gap:2px}
.tl{flex:1;height:3px;border-radius:99px;background:#e2e8f0;transition:background .2s}
.tl.on{background:#b8860b}
.pg{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px;padding-bottom:90px}
.bnav{background:var(--bg2);border-top:1px solid var(--border);display:flex;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:300;padding:5px 0 11px}
.nv{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:5px 3px;color:#94a3b8;font-size:9px;font-weight:600}
.nv.on{color:#b8860b}
.dot{width:4px;height:4px;border-radius:50%;background:#b8860b;margin-top:1px}
.card{background:var(--card);border-radius:16px;padding:15px;border:1px solid var(--border);box-shadow:0 1px 6px var(--card-shadow)}
.btn{border:none;border-radius:12px;padding:11px 16px;font-family:Poppins,sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;gap:6px;text-decoration:none;line-height:1.2}
.bto{background:#b8860b;color:#fff}
.bto:hover{background:#996515;box-shadow:0 4px 14px rgba(249,115,22,.3);transform:translateY(-1px)}
.bto:disabled{background:#d4a017;cursor:not-allowed;transform:none;box-shadow:none}
.bgh{background:var(--bg);color:var(--text2);border:1.5px solid var(--border2)}
.bgh:hover{background:#f1f5f9}
.bgrn{background:#dcfce7;color:#16a34a;border:1.5px solid #86efac}
.bred{background:#fee2e2;color:#dc2626;border:1.5px solid #fca5a5}
.bsm{padding:6px 12px;font-size:11px;border-radius:9px}
.inp{width:100%;border:1.5px solid var(--border2);border-radius:11px;padding:10px 12px;font-family:Inter,sans-serif;font-size:14px;color:var(--text);outline:none;background:var(--bg2);transition:border-color .2s}
.inp:focus{border-color:#b8860b}
.ilab{font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.irow{display:flex;gap:9px}
.igrp{display:flex;flex-direction:column;flex:1}
.sbar{display:flex;gap:8px;background:var(--card);border-radius:14px;border:1.5px solid var(--border2);padding:10px 13px;align-items:center;box-shadow:0 1px 4px var(--card-shadow)}
.sbar input{flex:1;border:none;outline:none;font-family:Inter,sans-serif;font-size:14px;color:var(--text);background:transparent}
.sbar input::placeholder{color:#adb5bd}
.hero{background:linear-gradient(135deg,#c9a227,#8b6914);border-radius:16px;padding:16px;color:#fff;position:relative;overflow:hidden}
.hero::after{content:none}
.hero h2{font-family:Poppins,sans-serif;font-size:18px;font-weight:800;line-height:1.25}
.hero p{font-size:12px;opacity:.88;margin-top:4px;line-height:1.5}
.mwrap{border-radius:14px;overflow:hidden;border:1.5px solid #e2e8f0}
.poi-row{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:12px;border:1.5px solid var(--border2);cursor:pointer;transition:all .2s;background:var(--card);margin-bottom:8px}
.poi-row:last-child{margin-bottom:0}
.poi-row:hover{border-color:#b8860b;background:#fefce8}
.poi-ico{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
/* Verdetto AI */
.v-card{border-radius:16px;padding:16px;margin-bottom:0}
.v-ok{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:2px solid #86efac}
.v-warn{background:linear-gradient(135deg,#fefce8,#fef9c3);border:2px solid #fde047}
.v-no{background:linear-gradient(135deg,#fff1f2,#fee2e2);border:2px solid #fca5a5}
.v-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:99px;font-family:Poppins,sans-serif;font-weight:800;font-size:13px;margin-bottom:10px}
.vb-ok{background:#16a34a;color:#fff}
.vb-warn{background:#ca8a04;color:#fff}
.vb-no{background:#dc2626;color:#fff}
.v-meter{height:8px;border-radius:99px;background:#e2e8f0;margin:10px 0;overflow:hidden}
.v-meter-fill{height:100%;border-radius:99px;transition:width 1s ease}
.v-section{margin-top:12px;padding-top:12px;border-top:1px solid rgba(0,0,0,.07)}
.v-section-title{font-family:Poppins,sans-serif;font-weight:700;font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.v-text{font-size:13px;line-height:1.7;color:#334155;white-space:pre-wrap}
.step-row{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:12px}
.step-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.oversize-item{display:flex;align-items:flex-start;gap:10px;padding:12px;border-radius:12px;background:#f0fdf4;border:1.5px solid #86efac;margin-bottom:8px}
.oversize-item:last-child{margin-bottom:0}
.rent-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid #f1f5f9}
.rent-item:last-child{border:none;padding-bottom:0}
@keyframes spin{to{transform:rotate(360deg)}}
.cert-tooltip{font-family:Poppins,sans-serif!important;font-size:11px!important;font-weight:700!important;padding:4px 10px!important;border-radius:8px!important;background:#7c3aed!important;color:#fff!important;border:none!important;box-shadow:0 2px 8px rgba(124,58,237,.3)!important;}
.cert-tooltip::before{border-top-color:#7c3aed!important;}
.poi-tooltip{font-family:Inter,system-ui,sans-serif!important;font-size:12px!important;font-weight:600!important;padding:4px 8px!important;border-radius:6px!important;box-shadow:0 2px 8px rgba(0,0,0,.15)!important;max-width:200px!important;white-space:nowrap!important;overflow:hidden!important;text-overflow:ellipsis!important}
@keyframes driveAcross{0%{left:-60px}100%{left:calc(100% + 60px)}}
@keyframes progressPulse{0%{width:15%}50%{width:85%}100%{width:15%}}
.spin{width:15px;height:15px;border:2.5px solid rgba(249,115,22,.2);border-top-color:#b8860b;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;flex-shrink:0}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fade{animation:fu .3s ease both}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.pulse{animation:pulse 1.5s ease infinite}
.setup-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg)}
.setup-card{background:var(--card);border-radius:20px;padding:24px;width:100%;max-width:390px;box-shadow:0 4px 24px var(--card-shadow)}
.kinp{width:100%;border:2px solid #e2e8f0;border-radius:12px;padding:10px 14px;font-family:Inter,sans-serif;font-size:13px;outline:none;margin-bottom:9px;transition:border-color .2s}
.kinp:focus{border-color:#b8860b}
.ibox{border-radius:10px;padding:10px 12px;font-size:12px;margin-bottom:10px;line-height:1.6}
.src-logo{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700}
.src-gm{background:#e8f0fe;color:#1a73e8}
.src-p4n{background:#f3e8ff;color:#7c3aed}
.src-tt{background:#fefce8;color:#996515}
</style>
</head>

/* ─── Haversine distance in km ─── */
function calcDistKm(lat1,lon1,lat2,lon2){
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

/* Raggio adattivo: 30km base → 50km se pochi risultati */
let _poiSearchLock=null;/* prevent duplicate concurrent searches */
async function searchPOIs(_key,lat,lng){
  const lockKey=lat.toFixed(3)+"_"+lng.toFixed(3);
  if(_poiSearchLock&&_poiSearchLock.key===lockKey)return _poiSearchLock.promise;

  const cacheKeyPOI=lat.toFixed(2)+"_"+lng.toFixed(2);
  const cachedPOIs=OCache.getPOIs(cacheKeyPOI);
  if(cachedPOIs&&cachedPOIs.length>0)return cachedPOIs;

  const searchPromise=_doSearchPOIs(lat,lng,cacheKeyPOI);
  _poiSearchLock={key:lockKey,promise:searchPromise};
  try{return await searchPromise;}finally{_poiSearchLock=null;}
}
async function _doSearchPOIs(lat,lng,cacheKeyPOI){
  console.log("[POI] Search start — 5 sources",lat,lng);
  const R=30000;/* 30km base radius */
  const A=`around:${R},${lat},${lng}`;
  const degR=R/111000;/* approx degrees for bbox */

  /* ═══════ SOURCE 1: Overpass/OSM — single mega-query, race 3 servers ═══════ */
  const qAll=`[out:json][timeout:25];(
    nwr(${A})["tourism"~"camp_site|caravan_site|camp_pitch"];
    nwr(${A})["leisure"="camp_site"];
    nwr(${A})["amenity"~"campervan_site|camping|sanitary_dump_station"];
    nwr(${A})["motorhome"~"yes|designated"];
    nwr(${A})["tourism"="hotel"]["tents"="yes"];
    nwr(${A})["tourism"="resort"]["caravans"="yes"];
    nwr(${A})["landuse"="recreation_ground"]["camping"="yes"];
    nwr(${A})["amenity"="parking"]["caravans"~"yes|designated"];
    nwr(${A})["amenity"="parking"]["motorhome"~"yes|designated"];
    nwr(${A})["overnight_parking"="yes"];
    nwr(${A})["amenity"="parking"]["overnight"~"yes|only"];
    nwr(${A})["amenity"="parking"]["name"~"camper|sosta|stellplatz|aire|wohnmobil|motorhome|caravan",i];
    nwr(${A})["club"="caravanning"];
    nwr(${A})["amenity"="parking"]["tourism"~"camp_site|caravan_site"];
    nwr(${A})["tourism"="alpine_hut"]["caravans"~"yes|designated"];
    nwr(${A})["tourism"="hostel"]["caravans"~"yes|designated"];
    nwr(${A})["tourism"="guest_house"]["tents"="yes"];
    nwr(${A})["name"~"camp|camping|campeggio|campground|kemping|stellplatz|wohnmobil|caravan|camper|sosta camper",i]["tourism"];
    nwr(${A})["name"~"camp|camping|campeggio|campground|kemping|stellplatz|wohnmobil|caravan|camper|sosta camper",i]["leisure"];
  );out body center 800;`;
  const SERVERS=["https://overpass-api.de/api/interpreter","https://overpass.kumi.systems/api/interpreter","https://overpass.private.coffee/api/interpreter"];

  async function fetchOvp(query,srv,timeout){
    try{
      const ctrl=new AbortController();
      const timer=setTimeout(()=>ctrl.abort(),timeout);
      const r=await fetch(srv,{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:"data="+encodeURIComponent(query),signal:ctrl.signal});

      const d=await r.json();

    }catch(e){console.warn("[OVP] "+srv+" fail:",e.message);return[];}
  }
  async function fetchOverpass(){

    try{results=await Promise.any(race);}catch(e){console.warn("[OVP] all servers failed");}
    /* Deduplicate by element type+id */
    const seen=new Set();

    for(const el of results){
      const k=el.type+"_"+el.id;

  }

  /* ═══════ SOURCE 2: OpenCampingMap — GeoJSON, CORS enabled ═══════ */

  /* ═══════ SOURCE 5: Nominatim — keyword search (expanded, parallel batches) ═══════ */
  async function fetchNominatim(){
    const kws=["campeggio","area sosta camper","campsite","camping","Stellplatz","Wohnmobilstellplatz","aire de camping-car","camper park","campground","holiday park","RV park","kemping","caravan park"];
    const results=[];
    const vb=(lng-degR)+","+(lat+degR)+","+(lng+degR)+","+(lat-degR);/* match Overpass radius */
    /* Run in 2 parallel batches to respect Nominatim rate limit */
    async function fetchBatch(kwBatch,delayMs){
      if(delayMs>0)await new Promise(r=>setTimeout(r,delayMs));
      for(let i=0;i<kwBatch.length;i++){
        if(i>0)await new Promise(r=>setTimeout(r,1100));
        try{
          const r=await fetch("https://nominatim.openstreetmap.org/search?q="+encodeURIComponent(kwBatch[i])+"&format=json&limit=30&addressdetails=1&viewbox="+vb+"&bounded=1",
            {headers:{"User-Agent":"OversizeInTour/1.0","Accept-Language":"it,en,de,fr,es"},signal:AbortSignal.timeout(6000)});
          if(!r.ok)continue;
          const batch=await r.json();
          console.log("[NOM] '"+kwBatch[i]+"' → "+((batch||[]).length)+" hits");
          for(const item of(batch||[])){
            const nLat=parseFloat(item.lat),nLng=parseFloat(item.lon);
            if(!nLat||!nLng)continue;
            const dist=calcDistKm(lat,lng,nLat,nLng);
            if(dist>35)continue;
            const raw=item.display_name||"";const short=raw.split(",")[0].trim();
            const city=item.address?(item.address.city||item.address.town||item.address.village||""):"";
            const dup=results.some(m=>calcDistKm(m.lat,m.lng,nLat,nLng)<0.08);
            if(!dup)results.push({id:"nom_"+item.place_id,name:short||"Area sosta",address:raw.split(",").slice(1,3).join(",").trim(),city,lat:nLat,lng:nLng,distKm:dist,website:null,phone:null,isCamp:/(camp|camping|campeggio|kemping|holiday)/i.test(raw),isDump:false,isStellplatz:/(stell|sosta|parking|aire|wohnmobil)/i.test(raw),isOvernight:false,cat:/(camp|camping|campeggio|kemping|campground|holiday)/i.test(raw)?"camp_site":"area sosta",_source:"nominatim",_capacity:null,_fee:null});
          }
        }catch(e){continue;}
      }
    }
    /* Split keywords into 2 batches — first batch starts immediately, second after 500ms */
    const mid=Math.ceil(kws.length/2);
    await Promise.all([fetchBatch(kws.slice(0,mid),0),fetchBatch(kws.slice(mid),500)]);

  }

  /* ═══════ LAUNCH: ALL 5 sources in parallel + 25s master timeout ═══════ */
  let ovpElements=[],ocmResults=[],p4nResults=[],iovResults=[],nomResults=[];
  const masterTimeout=new Promise(r=>setTimeout(()=>r("TIMEOUT"),35000));
  const allSources=Promise.all([
    fetchOverpass().then(r=>{ovpElements=r;}).catch(()=>{}),
    fetchOpenCampingMap().then(r=>{ocmResults=r;}).catch(()=>{}),
    fetchP4N().then(r=>{p4nResults=r;}).catch(()=>{}),
    fetchIOverlander().then(r=>{iovResults=r;}).catch(()=>{}),
    fetchNominatim().then(r=>{nomResults=r;}).catch(()=>{})
  ]);
  await Promise.race([allSources,masterTimeout]);
  console.log("[POI] Sources: OVP="+ovpElements.length+" OCM="+ocmResults.length+" P4N="+p4nResults.length+" IOV="+iovResults.length+" NOM="+nomResults.length);

  /* ── BLACKLIST: officine, benzinai, hotel, ristoranti (NON agricampeggi) ── */
  const BLACKLIST=/officin|meccan|autolavag|benzin|distribut|(?<!agri)hotel|ristoran(?!.*camp)|b&b(?!.*camp)|motel|ostello|pizzer|autorimess|tankstelle|werkstatt|waschanlage|pension(?!.*camp)|gaststätte|restaurant|gasolinera|taller|lavadero|hostal|station.service|(?<!agri)garage|auberge/i;

  /* ── Parse OSM elements ── */
  const osmResults=ovpElements
    .map(function(el){
      const t=el.tags||{};
      const elLat=el.lat!==undefined?el.lat:(el.center?el.center.lat:null);
      const elLng=el.lon!==undefined?el.lon:(el.center?el.center.lon:null);
      if(elLat==null||elLng==null)return null;
      const rawName=t.name||t["name:en"]||t["name:de"]||t["name:fr"]||t["name:es"]||t["name:it"]||t["name:nl"]||t["name:pt"]||"";
      const city=t["addr:city"]||t["addr:municipality"]||t["addr:town"]||"";
      const fallbackName=t["amenity"]==="sanitary_dump_station"?"Scarico acque / Dump station":
        t["motorhome"]==="designated"?"Stellplatz / Area sosta":
        t["overnight_parking"]==="yes"?"Parcheggio notturno":
        t["amenity"]==="parking"?"Parcheggio camper":
        t["club"]==="caravanning"?"Club caravanning":
        t["leisure"]==="marina"?"Marina con sosta camper":"Area sosta camper";
      const name=rawName||(fallbackName+(city?" — "+city:""));
      if(rawName&&BLACKLIST.test(rawName)&&!/(camp|sosta|stell|wohnmobil|motorhome|caravan|camper|aire)/i.test(rawName+" "+(t.tourism||"")+" "+(t.amenity||"")))return null;
      const addr=[t["addr:street"],t["addr:housenumber"],t["addr:city"],t["addr:postcode"]].filter(Boolean).join(", ");
      const distKm=calcDistKm(lat,lng,elLat,elLng);
      const isCamp=/(camp_site|camping)/i.test(t.tourism||t.amenity||t.leisure||"")||/(camp|camping|campeggio|campground)/i.test(rawName);
      const isDump=t.amenity==="sanitary_dump_station"||t.waterway==="sanitary_dump_station";
      const isStellplatz=t.motorhome==="designated"||t.caravan_site==="motorhome_stopover"||t.parking==="motorhome"||/(stellplatz|wohnmobil|sosta camper)/i.test(rawName);
      const isOvernight=t.overnight_parking==="yes"||t.overnight==="yes";
      const cat=isDump?"dump_station":isStellplatz?"stellplatz":isOvernight?"overnight":isCamp?"camp_site":(t.tourism||t.amenity||(t.motorhome?"area sosta":"area sosta"));
      return{
        id:el.id,name,
        address:addr||city||"",city,
        lat:elLat,lng:elLng,distKm,
        website:t.website||t["contact:website"]||null,
        phone:t.phone||t["contact:phone"]||null,
        isCamp,isDump,isStellplatz,isOvernight,cat,
        _source:"osm",_capacity:t.capacity||t["capacity:caravans"]||null,
        _fee:t.fee||null,_power:t.power_supply||null,
        _water:t.drinking_water||null,_wifi:t.internet_access||null,
        _maxlength:parseFloat(t.maxlength)||null,_maxwidth:parseFloat(t.maxwidth)||null,
        _maxheight:parseFloat(t.maxheight||t["maxheight:physical"])||null,_maxweight:parseFloat(t.maxweight)||null
      };
    })
    .filter(Boolean);

  /* ── Filter OCM duplicates of OSM by ID ── */
  const osmIds=new Set(osmResults.map(r=>String(r.id)));
  const ocmFiltered=ocmResults.filter(r=>{
    const rawId=String(r.id).replace("ocm_","");
    return!osmIds.has(rawId);
  });

  /* ── SMART MERGE & DEDUPLICATE all sources (80m proximity + name match) ── */
  /* Priority: OSM > OpenCampingMap > Park4Night > iOverlander > Nominatim */
  const allResults=[...osmResults,...ocmFiltered,...p4nResults,...iovResults,...nomResults];
  const dedup=[];
  for(const r of allResults){
    let existing=null;
    for(const m of dedup){
      const dist=calcDistKm(m.lat,m.lng,r.lat,r.lng);
      /* Merge if <80m, or <200m with similar name */
      if(dist<0.08||(dist<0.2&&m.name&&r.name&&m.name.toLowerCase().split(/\s/)[0]===r.name.toLowerCase().split(/\s/)[0])){existing=m;break;}
    }
    if(!existing){dedup.push(r);continue;}
    /* Merge: enrich existing with data from secondary source */
    if(!existing.website&&r.website)existing.website=r.website;
    if(!existing.phone&&r.phone)existing.phone=r.phone;
    if(!existing._rating&&r._rating)existing._rating=r._rating;
    if((!existing._reviews||existing._reviews<(r._reviews||0)))existing._reviews=r._reviews;
    if(!existing._capacity&&r._capacity)existing._capacity=r._capacity;
    if(!existing._fee&&r._fee)existing._fee=r._fee;
    if(!existing._power&&r._power)existing._power=r._power;
    if(!existing._water&&r._water)existing._water=r._water;
    if(!existing._wifi&&r._wifi)existing._wifi=r._wifi;
    if(!existing._p4nId&&r._p4nId)existing._p4nId=r._p4nId;
    if(!existing._maxlength&&r._maxlength)existing._maxlength=r._maxlength;
    if(!existing._maxwidth&&r._maxwidth)existing._maxwidth=r._maxwidth;
    if(!existing._maxheight&&r._maxheight)existing._maxheight=r._maxheight;
    if(!existing._maxweight&&r._maxweight)existing._maxweight=r._maxweight;
    /* Prefer longer/better name */
    if(r.name&&r.name.length>existing.name.length&&/(area sosta|campeggio|stellplatz)/i.test(existing.name))existing.name=r.name;
    /* Track sources */
    existing._mergedSources=(existing._mergedSources||existing._source)+"+"+r._source;
  }

  /* ── Apply blacklist to non-OSM results ── */
  const finalDedup=dedup.filter(r=>{
    if(r._source==="osm")return true;/* already filtered */
    if(r.name&&BLACKLIST.test(r.name)&&!/(camp|sosta|stell|wohnmobil|motorhome|caravan|camper|aire)/i.test(r.name))return false;
    return true;
  });

  /* ── PRE-FILTRO DIMENSIONI: marca i POI con restrizioni note ── */
  /* Non rimuove — marca con _sizeWarn per avviso visuale */
  let dimFiltered=0;
  finalDedup.forEach(r=>{
    const ml=r._maxlength,mw=r._maxwidth,mh=r._maxheight,mwt=r._maxweight;
    r._sizeOk=true;/* default: nessuna restrizione nota */
    r._sizeWarnings=[];
    if(ml&&ml<12){r._sizeOk=false;r._sizeWarnings.push("max "+ml+"m lungh.");dimFiltered++;}
    if(mw&&mw<2.6){r._sizeOk=false;r._sizeWarnings.push("max "+mw+"m larg.");}
    if(mh&&mh<3.5){r._sizeOk=false;r._sizeWarnings.push("max "+mh+"m alt.");}
    if(mwt&&mwt<8){r._sizeOk=false;r._sizeWarnings.push("max "+mwt+"t peso");}
    /* Parcheggi generici senza nome = bassa affidabilità */
    if(!r.isCamp&&!r.isStellplatz&&r._source==="osm"&&!r.name.match(/\w{4,}/)){r._lowConfidence=true;}
    /* Campeggi con nome/sito = alta affidabilità */
    if(r.isCamp&&r.name&&r.name.length>5){r._highConfidence=true;}
    if(r.website){r._highConfidence=true;}
  });
  if(dimFiltered>0)console.log("[POI] DIM-FILTER: "+dimFiltered+" POI con restrizioni dimensionali note");

  /* Sort: campeggi/alta affidabilità prima, poi stellplatz, poi parcheggi. POI con sizeOk=false in fondo */
  const finalResult=finalDedup.sort(function(a,b){
    /* POI inaccessibili per dimensioni vanno in fondo */
    if(a._sizeOk!==b._sizeOk)return a._sizeOk?-1:1;
    /* Alta affidabilità prima */
    if(a._highConfidence!==b._highConfidence)return a._highConfidence?-1:1;
    /* Campeggi prima dei parcheggi */
    if(a.isCamp!==b.isCamp)return a.isCamp?-1:1;
    /* Per distanza */
    return a.distKm-b.distKm;
  }).slice(0,500);
  console.log("[POI] FINAL: "+finalResult.length+" unique (OSM="+osmResults.length+" OCM="+ocmFiltered.length+" P4N="+p4nResults.length+" IOV="+iovResults.length+" NOM="+nomResults.length+")");
  if(finalResult.length>0)OCache.savePOIs(cacheKeyPOI,finalResult);
  return finalResult;
}
/* ─── Decodifica polyline Valhalla (precision 6) ─── */
function decodePolyline6(enc){
  const pts=[];let idx=0,lat=0,lng=0;
  while(idx<enc.length){
    let b,shift=0,res=0;
    do{b=enc.charCodeAt(idx++)-63;res|=(b&0x1f)<<shift;shift+=5;}while(b>=0x20);
    lat+=(res&1)?~(res>>1):(res>>1);
    shift=0;res=0;
    do{b=enc.charCodeAt(idx++)-63;res|=(b&0x1f)<<shift;shift+=5;}while(b>=0x20);
    lng+=(res&1)?~(res>>1):(res>>1);
    pts.push({lat:lat/1e6,lng:lng/1e6});
  }
  return pts;
}
/* ─── ROUTING: Valhalla/OSM (nessuna API key) ─── */
async function checkRouting(_key,dest,camper){
  const VALHALLA="https://valhalla1.openstreetmap.de/route";
  const D=0.04;
  const approaches=[
    {dir:"N",  lat:dest.lat+D,    lng:dest.lng},
    {dir:"NE", lat:dest.lat+D*.7, lng:dest.lng+D*.7},
    {dir:"E",  lat:dest.lat,      lng:dest.lng+D},
    {dir:"SE", lat:dest.lat-D*.7, lng:dest.lng+D*.7},
    {dir:"S",  lat:dest.lat-D,    lng:dest.lng},
    {dir:"W",  lat:dest.lat,      lng:dest.lng-D},
  ];
  async function tryValhalla(from,costing,costingOpts){
    const body={
      locations:[{lon:from.lng,lat:from.lat},{lon:dest.lng,lat:dest.lat}],
      costing,
      costing_options:costingOpts||{},
      directions_options:{units:"kilometers",language:"it-IT"}
    };
    try{
      const r=await fetch(VALHALLA,{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify(body),signal:AbortSignal.timeout(20000)
      });
      if(!r.ok)return{ok:false};
      const d=await r.json();
      if(!d.trip?.summary)return{ok:false};
      const s=d.trip.summary;
      const pts=d.trip.legs?.[0]?.shape?decodePolyline6(d.trip.legs[0].shape):[];
      return{ok:true,dist:s.length.toFixed(1),time:Math.round(s.time/60),points:pts};
    }catch(e){return{ok:false};}
  }
  const truckOpts={truck:{length:camper.length,width:camper.width,height:camper.height,weight:camper.weight*1000,axle_load:camper.weight*500}};
  // Run all approaches in parallel for speed
  const [carResults,truckResults]=await Promise.all([
    Promise.all(approaches.slice(0,3).map(f=>tryValhalla(f,"auto").then(r=>({...r,dir:f.dir})))),
    Promise.all(approaches.map(f=>tryValhalla(f,"truck",truckOpts).then(r=>({...r,dir:f.dir}))))
  ]);
  const car=carResults.find(r=>r.ok)||null;
  const truckOk=truckResults.filter(r=>r.ok).sort((a,b)=>parseFloat(a.dist)-parseFloat(b.dist));
  const truck=truckOk[0]||null;
  // Alternative truck approaches: other successful directions beyond the primary
  const alternatives=truckOk.slice(1).map(t=>({
    dir:t.dir,dist:t.dist,time:t.time,
    extraKm:car?(parseFloat(t.dist)-parseFloat(car.dist)).toFixed(1):"?"
  }));
  if(truck&&car){
    const ratio=(parseFloat(truck.dist)-parseFloat(car.dist))/parseFloat(car.dist);
    return{ok:true,restricted:ratio>0.3,dist:truck.dist,time:truck.time,points:truck.points,ratio,primaryDir:truck.dir,alternatives,source:"Valhalla/OSM"};
  }
  if(truck)return{ok:true,restricted:false,dist:truck.dist,time:truck.time,points:truck.points,ratio:0,primaryDir:truck.dir,alternatives,source:"Valhalla/OSM"};
  if(car)return{ok:true,restricted:false,dist:car.dist,time:car.time,points:car.points,ratio:0,primaryDir:"auto",alternatives:[],source:"Valhalla/OSM",note:"Solo routing auto disponibile"};
  return{ok:false,restricted:false,dist:null,time:null,points:[],primaryDir:null,alternatives:[],source:"Valhalla/OSM"};
}

function getUserPosition(){

    if(!navigator.geolocation){resolve(null);return;}
    navigator.geolocation.getCurrentPosition(
      pos=>resolve({lat:pos.coords.latitude,lng:pos.coords.longitude}),
      ()=>resolve(null),
      {enableHighAccuracy:true,timeout:8000,maximumAge:60000}
    );
  });
}

async function getMapillaryData(lat,lng,mlyKey){
  if(!mlyKey)return null;
  const delta=0.003;
  const bbox=[lng-delta,lat-delta,lng+delta,lat+delta].join(",");
  try{
    const r=await fetch(
      "https://graph.mapillary.com/images?fields=id,thumb_256_url,thumb_1024_url,captured_at,compass_angle,geometry&bbox="+bbox+"&limit=12&access_token="+mlyKey.trim(),
      {signal:AbortSignal.timeout(8000)}

    const imgs=d.data.sort(function(a,b){return b.captured_at-a.captured_at;});
    const latestDate=new Date(imgs[0].captured_at).toLocaleDateString("it-IT");
    const top3=imgs.slice(0,3);
    return{
      found:true,
      count:imgs.length,
      latestDate,
      thumbUrls:top3.map(function(i){return i.thumb_256_url;}).filter(Boolean),
      hiResUrls:top3.map(function(i){return i.thumb_1024_url;}).filter(Boolean),
      coverage:imgs.length>=8?"alta":imgs.length>=3?"media":"bassa"
    };
  }catch(e){return null;}
}
/* ─── Mapillary Vision: analisi visiva foto con Gemini multimodale ─── */
async function analyzeMapillaryImages(geminiKey,hiResUrls,camper,lang){
  if(!geminiKey||!hiResUrls||hiResUrls.length===0)return null;
  try{
    // Scarica immagini come base64
    const imagesParts=[];
    for(const url of hiResUrls.slice(0,3)){
      try{
        const resp=await fetch(url,{signal:AbortSignal.timeout(6000)});
        const blob=await resp.blob();
        const b64=await new Promise(function(resolve){
          const reader=new FileReader();
          reader.onloadend=function(){resolve(reader.result.split(",")[1]);};
          reader.readAsDataURL(blob);
        });
        imagesParts.push({inlineData:{mimeType:"image/jpeg",data:b64}});
      }catch(e){/* skip immagine fallita */}
    }
    if(imagesParts.length===0)return null;
    const visionPrompt=`${lang&&lang!=="it"?"IMPORTANT: Respond entirely in "+(LANG_NAMES[lang]||"English")+". ":""}Sei un esperto di accessibilità stradale per veicoli oversize. Analizza queste ${imagesParts.length} foto stradali scattate vicino all'ingresso di una struttura/campeggio.

Il veicolo è un camper di: ${camper.length}m lunghezza × ${camper.width}m larghezza × ${camper.height}m altezza × ${camper.weight}t peso.

Per OGNI foto, valuta:
1. LARGHEZZA STRADA stimata (in metri, confronta con veicoli/corsie visibili)
2. OSTACOLI VERTICALI: sbarre, cancelli, archi, cavi, rami bassi — stima altezza
3. OSTACOLI LATERALI: muretti, guard-rail, pali, siepi che riducono larghezza
4. SEGNALETICA: limiti dimensionali, divieti mezzi pesanti, sensi unici
5. CURVE/MANOVRE: angoli stretti, visibilità, spazio di manovra
6. SUPERFICIE: asfalto, sterrato, ghiaia, erba — portanza per ${camper.weight}t
7. COMPATIBILITÀ: il camper da ${camper.length}m×${camper.width}m×${camper.height}m può passare? Sì/No/Dubbio

Rispondi in modo CONCISO (max 150 parole totali). Formato:
FOTO_1: [osservazioni principali, stima misure, compatibilità]
FOTO_2: [...]
SINTESI_VISIVA: [giudizio complessivo basato sulle foto]`;

    const models=["gemini-2.5-flash","gemini-2.0-flash","gemini-2.5-flash-lite"];
    for(const model of models){
      try{
        const resp=await fetch(
          "https://generativelanguage.googleapis.com/v1beta/models/"+model+":generateContent?key="+geminiKey.trim(),
          {method:"POST",headers:{"Content-Type":"application/json"},
           body:JSON.stringify({
             contents:[{parts:[...imagesParts,{text:visionPrompt}]}],
             generationConfig:{maxOutputTokens:800,temperature:0.2}
           }),signal:AbortSignal.timeout(20000)}
        );
        if(!resp.ok)continue;
        const jr=await resp.json();
        const txt=jr?.candidates?.[0]?.content?.parts?.[0]?.text;
        if(txt&&txt.length>20)return{ok:true,analysis:txt,photosAnalyzed:imagesParts.length,model};
      }catch(e){continue;}
    }
    return null;
  }catch(e){return null;}
}
/* ─── OpenRouteService HGV routing (con API key) ─── */
async function checkORS_HGV(dest, camper, orsKey) {
  if(!orsKey)return null;
  const approaches = [
    {dir:"N", lat:dest.lat+0.06, lng:dest.lng},
    {dir:"S", lat:dest.lat-0.06, lng:dest.lng},
    {dir:"E", lat:dest.lat, lng:dest.lng+0.06},
    {dir:"W", lat:dest.lat, lng:dest.lng-0.06},
  ];
  const results = [];
  /* Lancia tutte le direzioni in parallelo */
  const jobs=approaches.map(async(from)=>{
    try {
      const body = {
        coordinates: [[from.lng, from.lat], [dest.lng, dest.lat]],
        alternative_routes:{share_factor:0.6,target_count:2,weight_factor:1.4},
        options: {
          vehicle_type: "hgv",
          profile_params: {
            restrictions: {
              length: camper.length,
              width: camper.width,
              height: camper.height,
              weight: camper.weight
            }
          }
        }
      };
      const r = await fetch("https://api.openrouteservice.org/v2/directions/driving-hgv/json", {
        method: "POST",
        headers: {"Content-Type": "application/json", "Accept": "application/json", "Authorization": orsKey.trim()},
        body: JSON.stringify(body),
        signal: AbortSignal.timeout(15000)
      });
      if (!r.ok){console.warn("[ORS] "+from.dir+" HTTP "+r.status);return null;}
      const d = await r.json();
      /* ORS può restituire più rotte alternative */
      const routes=(d.routes||[]).map((route,idx)=>({
        dir: from.dir+(idx>0?" alt"+(idx+1):""),
        dist: (route.summary.distance / 1000).toFixed(1),
        time: Math.round(route.summary.duration / 60),
        warnings: route.warnings || [],
        extras: route.extras || {},
        ok: true,
        isAlternative: idx>0
      }));
      return routes;
    } catch(e) {console.warn("[ORS] "+from.dir+" err:",e.message);return null;}
  });
  const allRes=await Promise.all(jobs);
  allRes.forEach(r=>{if(r)results.push(...r);});
  if (results.length === 0) return null;
  const sorted=results.sort((a,b) => parseFloat(a.dist) - parseFloat(b.dist));
  const best = sorted[0];
  console.log("[ORS HGV] "+results.length+" rotte trovate, migliore: "+best.dir+" "+best.dist+"km");
  return { ok: true, dist: best.dist, time: best.time, dir: best.dir, warnings: best.warnings, alternatives: sorted.slice(1).slice(0,5), allRoutes: sorted, source: "OpenRouteService HGV", note: "Routing HGV con restrizioni altezza/larghezza/peso — evita ponti bassi e gallerie strette" };
}
/* ─── Mapillary: foto lungo il percorso (ultimo km) ─── */
async function getMapillaryRoutePhotos(routePoints, mlyKey) {

  const samplePts = [lastPts[0], lastPts[Math.min(step, lastPts.length-1)], lastPts[Math.min(step*2, lastPts.length-1)]].filter(Boolean);
  const allPhotos = [];
  for (const pt of samplePts) {
    const delta = 0.001;
    const bbox = [pt.lng-delta, pt.lat-delta, pt.lng+delta, pt.lat+delta].join(",");
    try {
      const r = await fetch(
        "https://graph.mapillary.com/images?fields=id,thumb_256_url,thumb_1024_url,captured_at,geometry&bbox="+bbox+"&limit=2&access_token="+mlyKey.trim(),
        {signal: AbortSignal.timeout(5000)}
      );
      const d = await r.json();
      if (d.data) allPhotos.push(...d.data);
    } catch(e) {}
  }
  if (allPhotos.length === 0) return null;
  const unique = [...new Map(allPhotos.map(p => [p.id, p])).values()];
  return {
    found: true,
    count: unique.length,
    hiResUrls: unique.slice(0, 3).map(i => i.thumb_1024_url).filter(Boolean),
    thumbUrls: unique.slice(0, 3).map(i => i.thumb_256_url).filter(Boolean),
    source: "route"
  };
}

/* ─── 1. SWEPT PATH: traiettoria di sterzata ─── */
function calcSweptPath(camper){
  // Usa i valori reali se inseriti dall'utente, altrimenti stima geometrica
  const wb=camper.wheelbase||parseFloat((camper.length*0.55).toFixed(2));
  const rearOvh=camper.rearOverhang||parseFloat((camper.length*0.22).toFixed(2));
  const frontOvh=parseFloat((camper.length-wb-rearOvh).toFixed(2));
  const minR=parseFloat(Math.max(wb*1.4,6.5).toFixed(2));
  const rearSwing=parseFloat((Math.sqrt(minR**2+rearOvh**2)-minR).toFixed(2));
  const frontSwing=parseFloat((Math.sqrt((minR+wb)**2+frontOvh**2)-(minR+wb)).toFixed(2));
  const totWidth=parseFloat((camper.width+rearSwing+frontSwing+0.3).toFixed(1));
  const minEntry=parseFloat((totWidth+0.5).toFixed(1));
  return{wheelbase:wb.toFixed(2),rearOverhang:rearOvh.toFixed(2),frontOverhang:frontOvh.toFixed(2),minTurnRadius:minR.toFixed(2),rearSwing,frontSwing,totWidth,minEntry};
}
/* ─── 1b. SCORING: punteggio accessibilità 0-100 ─── */
function computeAccessibilityScore(camper, routing, extraData, pitchData, mapillaryData, mapillaryVision, countryInfo) {
  let score = 100;
  const penalties = [];
  const bonuses = [];
  const details = {};
  function pen(cat, pts, reason) { score -= pts; penalties.push({category:cat, points:pts, reason}); if(!details[cat]) details[cat]={value:null,penalty:0,note:""}; details[cat].penalty+=pts; details[cat].note+=(details[cat].note?" | ":"")+ reason; }
  function bon(cat, pts, reason) { score += pts; bonuses.push({category:cat, points:pts, reason}); }
  const osm = extraData?.osm || null;
  const elev = extraData?.elev || null;
  const critical = extraData?.critical || null;
  const swept = extraData?.swept || calcSweptPath(camper);
  // Road width checks
  const allWidths = [...(osm?.maxwidths||[]), ...(osm?.widths||[])].map(w => parseFloat(w)).filter(w => !isNaN(w));
  if (allWidths.length > 0) {
    const minW = Math.min(...allWidths);
    details.roadWidth = {value: minW, penalty: 0, note: ""};
    if (minW < camper.width + 1.2) { pen("roadWidth", 25, "Larghezza strada " + minW + "m < " + (camper.width+1.2).toFixed(1) + "m richiesti"); }
    else if (minW < camper.width + 1.5) { pen("roadWidth", 10, "Larghezza strada " + minW + "m vicina al limite"); }
  }
  // Height restriction
  const allHeights = [...(osm?.maxheights||[]), ...(critical?.restrictions||[]).filter(r=>r.maxheight).map(r=>r.maxheight)].map(h => parseFloat(h)).filter(h => !isNaN(h));
  if (allHeights.length > 0) {
    const minH = Math.min(...allHeights);
    details.height = {value: minH, penalty: 0, note: ""};
    if (minH < camper.height + 0.3) { pen("height", 30, "Altezza " + minH + "m < " + (camper.height+0.3).toFixed(1) + "m richiesti"); }
    else if (minH < camper.height + 0.6) { pen("height", 12, "Altezza " + minH + "m vicina al limite"); }
  }
  // Weight restriction
  const allWeights = [...(critical?.restrictions||[]).filter(r=>r.maxweight).map(r=>parseFloat(r.maxweight)), ...(critical?.bridges||[]).filter(b=>b.maxweight).map(b=>parseFloat(b.maxweight))].filter(w => !isNaN(w));
  if (allWeights.length > 0) {
    const minWt = Math.min(...allWeights);
    details.weight = {value: minWt, penalty: 0, note: ""};
    if (minWt < camper.weight) { pen("weight", 25, "Peso max " + minWt + "t < " + camper.weight + "t camper"); }
  }
  // Bridge weight
  const bridgeWeights = (critical?.bridges||[]).filter(b=>b.maxweight).map(b=>parseFloat(b.maxweight)).filter(w=>!isNaN(w));
  if (bridgeWeights.length > 0) {
    const minBw = Math.min(...bridgeWeights);
    if (minBw < camper.weight) { pen("bridge", 20, "Ponte con limite peso " + minBw + "t < " + camper.weight + "t"); }
  }
  // Gates
  const gateCount = (critical?.gates||[]).length;
  if (gateCount > 0) { pen("gates", Math.min(gateCount * 8, 24), gateCount + " cancello/i o sbarre rilevati"); }
  // Max length
  const maxLengths = [...(critical?.maxlengths||[])];
  if (maxLengths.length > 0) {
    const minLen = Math.min(...maxLengths);
    if (minLen < camper.length) { pen("maxlength", 30, "Limite lunghezza " + minLen + "m < " + camper.length + "m"); }
  }
  // Parking max length
  const parkLens = [...(critical?.parkingLimits||[])];
  if (parkLens.length > 0) {
    const minPL = Math.min(...parkLens);
    if (minPL < camper.length) { pen("parkingLength", 15, "Parcheggio max " + minPL + "m < " + camper.length + "m"); }
  }
  // Turning circles
  if (critical && critical.turningCircles === 0 && camper.length >= 10) { pen("turning", 5, "Nessun punto di inversione per camper " + camper.length + "m"); }
  if (critical && critical.turningCircles > 0) { bon("turning", 3, critical.turningCircles + " punto/i inversione trovati"); }
  // Routing
  const orsHGV = extraData?.orsHGV;
  if (orsHGV && orsHGV.ok) {
    /* ORS HGV è più affidabile di Valhalla per restrizioni fisiche */
    bon("orsHgv", 8, "ORS HGV: rotta verificata per mezzi pesanti "+orsHGV.dist+"km da "+orsHGV.dir);
    if (orsHGV.alternatives?.length > 0) bon("orsAlternatives", 3, orsHGV.alternatives.length+" rotte alternative HGV disponibili");
    if (routing && routing.restricted) {
      /* Valhalla dice deviazione, ma ORS trova una rotta — riduci la penalità */
      pen("routing", 5, "Valhalla segnala deviazione ma ORS HGV ha trovato rotta praticabile");
    }
  } else if (routing) {
    if (!routing.ok) { pen("routing", 10, "Routing camion non disponibile"); }
    else if (routing.restricted) { pen("routing", 15, "Deviazione camion +" + Math.round((routing.ratio||0)*100) + "%"); }
  }
  // Surface
  const surfaces = [...(osm?.surfaces||[]), ...(pitchData?.surfaces||[])];
  const unpaved = surfaces.some(s => /gravel|grass|dirt|ground|earth|sand|mud|unpaved/i.test(s));
  const paved = surfaces.some(s => /asphalt|paved|concrete|sett/i.test(s));
  if (unpaved && camper.weight > 5) { pen("surface", 8, "Fondo non asfaltato con camper " + camper.weight + "t"); }
  if (paved && !unpaved) { bon("surface", 2, "Fondo asfaltato confermato"); }
  // Pitch lengths
  if (pitchData && pitchData.found && pitchData.pitchLengths.length > 0) {
    const pLens = pitchData.pitchLengths.map(l => parseFloat(l)).filter(l => !isNaN(l));
    if (pLens.length > 0 && pLens.every(l => l < camper.length + 1.5)) { pen("pitchLength", 20, "Piazzole tutte < " + (camper.length+1.5).toFixed(1) + "m"); }
  }
  // Internal road widths vs swept minEntry
  if (pitchData && pitchData.roadWidths && pitchData.roadWidths.length > 0) {
    const rw = pitchData.roadWidths.map(w => parseFloat(w)).filter(w => !isNaN(w));
    if (rw.length > 0 && rw.some(w => w < parseFloat(swept.minEntry))) { pen("internalRoads", 15, "Strade interne < " + swept.minEntry + "m swept path"); }
  }
  // Vision analysis
  if (mapillaryVision && mapillaryVision.ok && mapillaryVision.analysis) {
    const vTxt = mapillaryVision.analysis.toLowerCase();
    if (/incompatib|(\bno\b)|nicht|non passa/i.test(vTxt)) { pen("vision", 15, "Analisi visiva indica incompatibilita"); }
    else if (/dubb|doubt|difficile|uncertain/i.test(vTxt)) { pen("vision", 8, "Analisi visiva indica dubbi"); }
    else if (/compatib|ok|passa|sufficient/i.test(vTxt)) { bon("vision", 5, "Analisi visiva positiva"); }
  }
  // Online reviews
  if (extraData?.onlineReviews) {
    const revTxt = (extraData.onlineReviews||"").toLowerCase();
    if (/problem|difficile|strett|narrow|tight|nicht|eng|schwierig/i.test(revTxt)) { pen("reviews", 10, "Recensioni segnalano problemi di accesso"); }
    else if (/ador|perfect|great|excellent|facile|easy|bequem/i.test(revTxt)) { bon("reviews", 3, "Recensioni positive sull'accesso"); }
  }
  // No data penalty for large campers
  if (camper.length >= 10 && !osm?.found && !mapillaryData?.found && !extraData?.onlineReviews) { pen("noData", 10, "Nessun dato disponibile per camper " + camper.length + "m"); }
  // Clamp
  score = Math.max(0, Math.min(100, score));
  return {score, penalties, bonuses, details};
}
/* ─── 2. OSM OVERPASS: dati stradali reali ─── */
async function getOSMData(lat,lng){
  const query=`[out:json][timeout:15];
(
  way(around:400,${lat},${lng})["highway"]["maxwidth"];
  way(around:400,${lat},${lng})["highway"]["maxheight"];
  way(around:400,${lat},${lng})["highway"]["width"];
  way(around:400,${lat},${lng})["highway"]["surface"];
  way(around:400,${lat},${lng})["highway"]["lanes"];
  way(around:400,${lat},${lng})["highway"]["incline"];
  way(around:400,${lat},${lng})["highway"]["smoothness"];
  way(around:400,${lat},${lng})["highway"]["tracktype"];
  node(around:80,${lat},${lng})["barrier"];
  node(around:80,${lat},${lng})["maxheight"];
  node(around:80,${lat},${lng})["maxwidth"];
);
out body;`;
  try{
    const resp=await fetch("https://overpass-api.de/api/interpreter",{
      method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},
      body:"data="+encodeURIComponent(query),signal:AbortSignal.timeout(12000)
    });
    const data=await resp.json();
    if(!data.elements?.length)return{found:false};
    const r={maxwidths:[],maxheights:[],widths:[],surfaces:[],lanes:[],barriers:[],inclines:[],smoothness:[],tracktypes:[]};
    data.elements.forEach(el=>{
      if(el.tags?.maxwidth)  r.maxwidths.push(el.tags.maxwidth);
      if(el.tags?.maxheight) r.maxheights.push(el.tags.maxheight);
      if(el.tags?.width)     r.widths.push(el.tags.width);
      if(el.tags?.surface)   r.surfaces.push(el.tags.surface);
      if(el.tags?.lanes)     r.lanes.push(el.tags.lanes);
      if(el.tags?.barrier)   r.barriers.push(el.tags.barrier);
      if(el.tags?.incline)   r.inclines.push(el.tags.incline);
      if(el.tags?.smoothness) r.smoothness.push(el.tags.smoothness);
      if(el.tags?.tracktype) r.tracktypes.push(el.tags.tracktype);
    });
    Object.keys(r).forEach(k=>{r[k]=[...new Set(r[k])];});
    r.found=true;
    return r;
  }catch(e){return{found:false,err:e.message};}
}
/* ─── 2a-bis. OSM OVERPASS: piazzole e strade interne campeggio ─── */
async function getCampPitchData(lat,lng){
  const query=`[out:json][timeout:15];
(
  node(around:200,${lat},${lng})["tourism"="camp_pitch"];
  way(around:200,${lat},${lng})["tourism"="camp_pitch"];
  way(around:200,${lat},${lng})["highway"="service"]["service"="camp_site"];

  way(around:150,${lat},${lng})["highway"="service"]["width"];
  node(around:200,${lat},${lng})["amenity"~"sanitary_dump_station|toilets|shower"];
);
out body center 50;`;
  const SERVERS=[
    "https://overpass-api.de/api/interpreter",
    "https://overpass.kumi.systems/api/interpreter"
  ];
  for(const srv of SERVERS){
    try{
      const r=await fetch(srv,{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},
        body:"data="+encodeURIComponent(query),signal:AbortSignal.timeout(12000)});
      const d=await r.json();
      if(!d.elements?.length)return{found:false,pitches:[],roads:[],services:[]};
      const pitches=[],roads=[],services=[];

        const t=el.tags||{};

          pitches.push({
            id:el.id,
            name:t.name||t.ref||null,
            length:t.length||null,
            width:t.width||null,
            surface:t.surface||null,
            electricity:t["power_supply"]||t.electricity||null,
            capacity:t.capacity||null
          });
        } else if(el.type==="way"&&t.highway==="service"){
          roads.push({
            id:el.id,
            width:t.width||null,
            surface:t.surface||null,
            name:t.name||null,
            oneway:t.oneway||null
          });
        } else if(t.amenity){
          services.push(t.amenity);
        }
      });
      const pitchWidths=pitches.map(p=>p.width).filter(Boolean);
      const pitchLengths=pitches.map(p=>p.length).filter(Boolean);
      const roadWidths=roads.map(r=>r.width).filter(Boolean);
      const surfaces=[...new Set([...pitches.map(p=>p.surface),...roads.map(r=>r.surface)].filter(Boolean))];
      return{
        found:true,
        pitchCount:pitches.length,
        pitchWidths:[...new Set(pitchWidths)],
        pitchLengths:[...new Set(pitchLengths)],
        roadWidths:[...new Set(roadWidths)],
        surfaces,
        services:[...new Set(services)],
        hasElectricity:pitches.some(p=>p.electricity),
        pitches:pitches.slice(0,10),
        roads:roads.slice(0,10)
      };
    }catch(e){continue;}
  }
  return{found:false,pitches:[],roads:[],services:[]};
}

    });
    const data=await resp.json();
    if(!data.elements?.length)return{found:false,bridges:[],restrictions:[],gates:[],turningCircles:0,maxlengths:[],parkingLimits:[],roadWidths:[],surfaces:[]};
    const bridges=[],restrictions=[],gates=[],maxlengths=[],parkingLimits=[],critRoadWidths=[],critSurfaces=[];
    let turningCircles=0;

      parkingLimits:[...new Set(parkingLimits)],
      roadWidths:[...new Set(critRoadWidths)],
      surfaces:[...new Set(critSurfaces)]
    };
  }catch(e){return{found:false,bridges:[],restrictions:[],gates:[],turningCircles:0,maxlengths:[],parkingLimits:[],roadWidths:[],surfaces:[]};}

function buildReviewKeywords(poi,camper,countryInfo){

  const kwIt=EU_KEYWORDS.it;
  const forumSites=(countryInfo&&EU_REGULATIONS[countryInfo.country])?EU_REGULATIONS[countryInfo.country].forumSites:["park4night.com"];
  const siteQueries=forumSites.slice(0,2).map(s=>`site:${s} "${name}"`);
  const localKw=[
    `"${name}" ${kw.narrow}`,
    `"${name}" ${kw.difficult}`,
    `${name} ${loc} camper oversize`,

    ...siteQueries
  ];

}

function buildHiddenObstacleKeywords(poi,camper,countryInfo){

/* ─── Build analysis prompt (shared by Gemini and Groq) ─── */
function buildAnalysisPrompt(poi,camper,routing,extraData,mapillaryData,countryInfo,lang){

  }

/* ─── Gemini deep analysis (Google Search grounding) ─── */
async function geminiDeepAnalysis(key,poi,camper,routing,extraData,mapillaryData,countryInfo,lang){
  if(!key)return null;
  const prompt=buildAnalysisPrompt(poi,camper,routing,extraData,mapillaryData,countryInfo,lang);
  // Modelli attivi marzo 2026 — v1beta prima (supporta google_search grounding)
  const attempts=[
    {v:"v1beta",m:"gemini-2.5-flash"},
    {v:"v1beta",m:"gemini-2.5-pro"},
    {v:"v1beta",m:"gemini-3-flash"},
    {v:"v1beta",m:"gemini-3.1-flash-lite"},
    {v:"v1beta",m:"gemini-2.5-flash-lite"},
    {v:"v1beta",m:"gemini-2.0-flash"},
    {v:"v1",    m:"gemini-2.5-flash"},
    {v:"v1",    m:"gemini-2.5-flash-lite"},
    {v:"v1",    m:"gemini-2.5-pro"},
  ];
  const log=[];
  for(const {v,m} of attempts){
    let rawRes=null;
    let rawText=null;
    try{
      rawRes=await fetch(
        "https://generativelanguage.googleapis.com/"+v+"/models/"+m+":generateContent?key="+key.trim(),
        {method:"POST",headers:{"Content-Type":"application/json"},
         body:JSON.stringify({contents:[{parts:[{text:prompt}]}],tools:[{google_search:{}}],generationConfig:{maxOutputTokens:3500,temperature:0.3}})}
      );
    }catch(fetchErr){
      log.push(v+"/"+m+": FETCH FAILED — "+fetchErr.message);
      continue;
    }
    let d=null;
    try{
      rawText=await rawRes.text();
      d=JSON.parse(rawText);
    }catch(parseErr){
      log.push(v+"/"+m+": PARSE FAILED — HTTP "+rawRes.status+" — "+rawText?.slice(0,120));
      continue;
    }
    if(d.error){
      const st=d.error.status||String(rawRes.status);
      const msg=d.error.message||"";
      log.push(v+"/"+m+": "+st+" — "+msg.slice(0,80));
      // PERMISSION_DENIED può significare solo che QUEL modello non è accessibile
      // con questo piano → continua a provare gli altri modelli
      // Non fermarci mai in anticipo
      continue;
    }
    const parts=d.candidates?.[0]?.content?.parts||[];
    const txt=parts.filter(p=>p.text).map(p=>p.text).join("\n").trim();
    if(!txt||txt.length<30){
      // Diagnosi più precisa
      const finishReason=d.candidates?.[0]?.finishReason||"";
      const candidateCount=d.candidates?.length||0;
      const blockReason=d.promptFeedback?.blockReason||"";
      log.push(v+"/"+m+": risposta vuota/corta — candidates:"+candidateCount+" finishReason:"+finishReason+" blockReason:"+blockReason);
      // Se c'è del testo comunque (anche corto), usalo come fallback
      if(txt&&txt.length>5){
        return{verdict:"warn",confidence:40,sintesi:"",accesso:"",struttura:"",critici:"",consiglio:"",raw:txt};
      }
      continue;
    }
    const parsed=parseAIResponse(txt);
    if(!parsed){
      // parsing fallito ma abbiamo il testo → mostralo grezzo
      return{verdict:"warn",confidence:50,sintesi:"",accesso:"",struttura:"",critici:"",consiglio:"",raw:txt};
    }
    return parsed;
  }
  // Tutti i modelli falliti — mostra log completo
  const debugInfo=log.map((e,i)=>"["+(i+1)+"] "+e).join("\n");
  return{_apiError:"⚠️ Nessun modello Gemini ha risposto.\n\nLog completo:\n"+debugInfo+"\n\nSe la chiave è corretta, verifica connessione internet e riprova."};
}
/* ─── Parsing risposta AI strutturata ─── */
function parseAIResponse(txt){
  if(!txt||txt.length<20) return null;
  // Estrai sezione in modo robusto
  // Etichette che aprono una nuova sezione (lookahead stop)
  const SECTION_LABELS="VERDETTO|CONFIDENZA|SINTESI|ACCESSO_STRADALE|STREET_VIEW|OSTACOLI_NASCOSTI|SWEPT_PATH|TERRITORIO|PIAZZOLE_INTERNE|STRUTTURA|RECENSIONI|PUNTI_CRITICI|PERCORSI_ALTERNATIVI|CONSIGLIO";
  function get(keys){
    const ks=Array.isArray(keys)?keys:[keys];
    for(const key of ks){
      // Cerca la sezione fino alla prossima etichetta nota o fine testo
      const r1=new RegExp("^"+key+"[:\\s]+([\\s\\S]+?)(?=\\n(?:"+SECTION_LABELS+")[:\\s]|$)","im");
      const m1=txt.match(r1);
      if(m1){
        const v=m1[1].trim();
        if(v.length>2) return v;
      }
      // Fallback: solo la riga
      const r2=new RegExp("^"+key+"[:\\s]+(.+)","im");
      const m2=txt.match(r2);
      if(m2&&m2[1].trim().length>2) return m2[1].trim();
    }
    return "";
  }
  // Determina verdetto SOLO dalla riga VERDETTO: (evita falsi positivi nel testo)
  let verdict="warn";
  const verdRaw=(txt.match(/^VERDETTO[:\s]+(.+)/im)||[])[1]||"";
  const verdUp=verdRaw.trim().toUpperCase();
  if(verdUp.startsWith("NON ADATTO")||verdUp.includes("NON ADATTO")){
    verdict="no";
  } else if(verdUp.startsWith("ADATTO")||verdUp==="ADATTO"){
    verdict="ok";
  } else if(verdUp.startsWith("CON RISERVA")||verdUp.includes("RISERVA")){
    verdict="warn";
  } else {
    // Fallback: scansione limitata al campo PUNTI_CRITICI e SINTESI
    const up=txt.toUpperCase();
    const criticiTxt=(txt.match(/PUNTI_CRITICI[:\s]+([\s\S]+?)(?=\n[A-Z_]{3,}[:\s]|$)/i)||[])[1]||"";
    const hasCritici=criticiTxt.length>10&&!criticiTxt.toUpperCase().includes("NESSUN");
    if(up.includes("NON ADATTO")||up.includes("INCOMPATIB")||up.includes("SCONSIGLIATO")) verdict="no";
    else if(hasCritici) verdict="warn";
    else if(up.includes("ADATTO")||up.includes("IDONEO")||up.includes("ACCESSIBILE")) verdict="ok";
    // Default: warn — se il parser non riesce a capire il verdetto, meglio cautela
  }
  const confMatch=txt.match(/(\d{1,3})\s*%/);
  const confidence=confMatch?Math.min(100,Math.max(10,parseInt(confMatch[1]))):60;
  const sintesi    =get(["SINTESI","SUMMARY","SOMMARIO","RIASSUNTO"]);
  const accesso    =get(["ACCESSO_STRADALE","ACCESSO","STRADE","VIABILITA"]);
  const streetview =get(["STREET_VIEW","STREETVIEW","STREET VIEW","INGRESSO_VISIVO"]);
  const ostacoli   =get(["OSTACOLI_NASCOSTI","OSTACOLI NASCOSTI","OSTACOLI","HIDDEN_OBSTACLES"]);
  const sweptpath  =get(["SWEPT_PATH","SWEPT PATH","TRAIETTORIA","MANOVRA"]);
  const territorio =get(["TERRITORIO","GEOGRAFIA","ZONA","OROGRAFIA"]);
  const piazzole   =get(["PIAZZOLE_INTERNE","PIAZZOLE","PITCH","STALLI"]);
  const struttura  =get(["STRUTTURA","CAMPEGGIO"]);
  const recensioni =get(["RECENSIONI","RECENSIONE","OPINIONI","FEEDBACK"]);
  const critici    =get(["PUNTI_CRITICI","CRITICITA","PROBLEMI","LIMITAZIONI"]);
  const percorsiAlternativi=get(["PERCORSI_ALTERNATIVI","PERCORSI ALTERNATIVI","ALTERNATIVE","DEVIAZIONI"]);
  const consiglio  =get(["CONSIGLIO","RACCOMANDAZIONE","SUGGERIMENTO"]);
  const camperTag=(()=>{
    const lm=txt.match(/Lunghezza[:\s]+([\d.]+)\s*m/i);
    const wm=txt.match(/Larghezza[:\s]+([\d.]+)\s*m/i);
    const hm=txt.match(/Altezza[:\s]+([\d.]+)\s*m/i);
    if(lm&&wm&&hm) return lm[1]+"m×"+wm[1]+"m×"+hm[1]+"m";
    return "";
  })();
  return{verdict,confidence,sintesi,accesso,streetview,ostacoli,sweptpath,territorio,piazzole,struttura,recensioni,critici,percorsiAlternativi,consiglio,camperTag,raw:txt};
}

/* ─── Mappa: Leaflet + OpenStreetMap (gratuito, nessuna chiave) ─── */
function TomMap({center,zoom,markers,routePts,onPoiClick,height}){
  const ref=useRef(null);
  const map=useRef(null);
  const mks=useRef([]);
  const poly=useRef(null);
  const prevSig=useRef("");
  // Init mappa
  useEffect(()=>{
    if(!window.L||map.current||!ref.current)return;
    map.current=window.L.map(ref.current,{center:[center.lat,center.lng],zoom:zoom||11,zoomControl:true});
    window.L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
      maxZoom:19,attribution:'© <a href="https://openstreetmap.org">OSM</a>'
    }).addTo(map.current);
    setTimeout(()=>{if(map.current)map.current.invalidateSize();},150);
    return()=>{if(map.current){map.current.remove();map.current=null;}};
  },[]);
  // Centro e zoom
  useEffect(()=>{
    if(!map.current)return;
    map.current.setView([center.lat,center.lng],zoom||11);
  },[center.lat,center.lng,zoom]);
  // Marker
  useEffect(()=>{
    if(!map.current||!window.L)return;
    const sig=JSON.stringify(markers);
    if(sig===prevSig.current)return;
    prevSig.current=sig;
    mks.current.forEach(m=>m.remove());
    mks.current=[];
    (markers||[]).forEach(m=>{
      const s=m.isDest?34:m.isOversize?28:26;
      const bg=m.isDest?"#b8860b":m.isOversize?"#16a34a":m._markerColor||(m.isCamp?"#8b5cf6":"#3b82f6");
      const html=`<div style="width:${s}px;height:${s}px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);background:${bg};border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.3);cursor:${m.isDest?"default":"pointer"}"></div>`;
      const icon=window.L.divIcon({html,className:"",iconSize:[s,s],iconAnchor:[s/2,s]});
      const wb=m.website?`<br><a href="${m.website}" target="_blank" onclick="event.stopPropagation()" style="color:#b8860b;font-size:10px;font-weight:700">🌐 Sito web</a>`:"";
      const gm=`<br><a href="https://www.google.com/maps/search/${encodeURIComponent((m.name||"")+" "+(m.sub||""))}" target="_blank" onclick="event.stopPropagation()" style="color:#1a73e8;font-size:10px;font-weight:700">🗺 Google Maps</a>`;
      const popup=window.L.popup({offset:[0,-s],maxWidth:200}).setContent(
        `<div style="font-family:Inter,sans-serif;padding:4px"><b style="font-size:12px">${m.name||""}</b><div style="font-size:10px;color:#666;margin:2px 0">${m.sub||""}</div><div style="margin-top:4px">${wb}${gm}</div></div>`
      );
      const mk=window.L.marker([m.lat,m.lng],{icon}).addTo(map.current).bindPopup(popup).bindTooltip(m.name||"",{direction:"top",offset:[0,-s],className:"poi-tooltip"});
      if(!m.isDest&&onPoiClick)mk.on("click",()=>{mk.openPopup();onPoiClick(m);});
      mks.current.push(mk);
    });
  },[JSON.stringify(markers)]);
  // Percorso
  useEffect(()=>{
    if(!map.current||!window.L)return;
    if(poly.current){poly.current.remove();poly.current=null;}
    if(!routePts?.length)return;
    poly.current=window.L.polyline(routePts.map(p=>[p.lat,p.lng]),{color:"#b8860b",weight:4,opacity:.85}).addTo(map.current);
  },[routePts]);
  return<div ref={ref} style={{width:"100%",height:height||200}}/>;
}

      if(res&&!res._apiError&&res.verdict)validResults.push({name:j.name,analysis:res});
    });
    console.log("[AI] "+validResults.length+"/"+aiJobs.length+" AI risposte: "+validResults.map(v=>v.name+"="+v.verdict).join(", "));
    /* Scegli analisi primaria (prima valida) */
    let primaryAnalysis=validResults.length>0?validResults[0].analysis:null;
    let primarySource=validResults.length>0?validResults[0].name:"";
    if(primaryAnalysis){
      setAnalysis(primaryAnalysis);
      setAiSource(primarySource);
    }
    /* ── CONSENSO A MAGGIORANZA (2+ AI) ── */
    if(validResults.length>=2){
      const secondRes=validResults[1];
      setSecondAnalysis(secondRes.analysis);
      /* Conta voti per verdetto */
      const votes={ok:0,warn:0,no:0};
      const names={ok:[],warn:[],no:[]};
      validResults.forEach(v=>{
        const vd=v.analysis.verdict||"warn";
        votes[vd]=(votes[vd]||0)+1;
        names[vd]=(names[vd]||[]);names[vd].push(v.name);
      });
      /* Verdetto finale = maggioranza */
      let finalVerdict=primaryAnalysis.verdict;
      let maxVotes=0;
      for(const v of["ok","warn","no"]){if(votes[v]>maxVotes){maxVotes=votes[v];finalVerdict=v;}}
      const allAgree=validResults.every(v=>v.analysis.verdict===validResults[0].analysis.verdict);
      if(allAgree){
        setConsensusNote("Consenso unanime ("+validResults.length+" AI): "+validResults.map(v=>v.name).join(", ")+" → "+finalVerdict);
      } else {
        const detail=validResults.map(v=>v.name+": "+v.analysis.verdict).join(" · ");
        if(validResults.length>=3&&maxVotes>=2){
          setConsensusNote("Maggioranza "+maxVotes+"/"+validResults.length+": "+detail+" → verdetto: "+finalVerdict);
        } else {
          setConsensusNote("Disaccordo: "+detail+". Valuta con cautela.");
          finalVerdict="warn";/* In caso di parità, cautela */
        }
      }
      /* Applica verdetto di maggioranza se diverso dal primario */
      if(finalVerdict!==primaryAnalysis.verdict){
        primaryAnalysis.verdict=finalVerdict;
        primaryAnalysis.confidence=Math.min(primaryAnalysis.confidence,allAgree?primaryAnalysis.confidence:65);
        setAnalysis({...primaryAnalysis});
      }
      /* Media della confidenza se concordano */
      if(allAgree&&validResults.length>=2){
        const avgConf=Math.round(validResults.reduce((s,v)=>s+(v.analysis.confidence||60),0)/validResults.length);
        primaryAnalysis.confidence=avgConf;
        setAnalysis({...primaryAnalysis});
      }
    }
    setPhase("done");
    // Save to cache
    try{
      LS.setJ(cacheKey,{poi,analysis:primaryAnalysis,score:sRes,routing:r,extraData:extra,mapillaryData:mlyData,mapillaryVision:visionResult,pitchData:pData,timestamp:Date.now()});
      OCache.saveAnalysis(poi.id,{analysis:primaryAnalysis,score:sRes});
    }catch(e){}
  }

    setSaved(true);

      {(()=>{

            {ico} {lbl}

      {/* Salva in Certificati Oversize */}
      <button className={"btn "+(savedCert?"bgh":"bpur")} style={{width:"100%",opacity:savedCert?0.7:1,background:savedCert?undefined:"linear-gradient(135deg,#1e40af 0%,#7c3aed 100%)",color:"#fff",border:"none"}} onClick={handleSaveCert} disabled={savedCert}>
        {savedCert?"✅ Salvato nei Certificati":"🏅 Salva nei Certificati Oversize"}
      </button>
      {/* Naviga */}
      <a href={"https://www.google.com/maps/dir/?api=1&destination="+encodeURIComponent(poi.name+" "+poi.address)} target="_blank" style={{textDecoration:"none"}}>
        <button className="btn bto" style={{width:"100%"}}>🧭 {t("navigate")}</button>
      </a>
    </div>
  );
