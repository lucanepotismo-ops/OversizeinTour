<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useEffect,useCallback,useMemo} = React;
const LS={
  get:k=>{try{return localStorage.getItem(k)||"";}catch(e){return "";}},
  set:(k,v)=>{try{localStorage.setItem(k,v);}catch(e){}},
  del:k=>{try{localStorage.removeItem(k);}catch(e){}},
  getJ:k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}},
  setJ:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
};
/* ─── Geocode: Nominatim/OSM (gratuito, nessuna chiave) ─── */
async function geocode(_key,q){
  try{
    const r=await fetch(
      "https://nominatim.openstreetmap.org/search?q="+encodeURIComponent(q)+"&format=json&limit=1",
      {headers:{"Accept-Language":"it,en","User-Agent":"OversizeInTour/1.0"},signal:AbortSignal.timeout(8000)}
    );
    const d=await r.json();
    if(d&&d[0])return{lat:parseFloat(d[0].lat),lng:parseFloat(d[0].lon),displayName:d[0].display_name||""};
  }catch(e){}
  return null;
}
/* ─── POI search: Overpass/OSM (gratuito, nessuna chiave) ─── */
/* Tag EU: camp_site, caravan_site, motorhome_stopover, parking+motorhome, dump_station */
/* Fallback automatico su 3 server Overpass se il principale è sovraccarico */
async function searchPOIs(_key,lat,lng){
  const R=30000;
  const q=`[out:json][timeout:25];
(
  nwr(around:${R},${lat},${lng})["tourism"~"camp_site|caravan_site"];
  nwr(around:${R},${lat},${lng})["amenity"~"campervan_site|camping"];
  nwr(around:${R},${lat},${lng})["motorhome"~"yes|designated"];
  nwr(around:${R},${lat},${lng})["amenity"="parking"]["caravans"="yes"];
  nwr(around:${R},${lat},${lng})["overnight_parking"="yes"];
  nwr(around:${R},${lat},${lng})["amenity"="sanitary_dump_station"];
);
out body center 80;`;
  const SERVERS=[
    "https://overpass-api.de/api/interpreter",
    "https://overpass.kumi.systems/api/interpreter",
    "https://overpass.private.coffee/api/interpreter"
  ];
  let elements=[];
  for(const srv of SERVERS){
    try{
      const r=await fetch(srv,{
        method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},
        body:"data="+encodeURIComponent(q),signal:AbortSignal.timeout(35000)
      });
      const d=await r.json();
      elements=d.elements||[];
      if(elements.length>0)break;
    }catch(e){continue;}
  }
  // Blacklist: workshop/gas/hotel/restaurant — NOT agricampeggi/agriturismi con campeggio
  const BLACKLIST=/officin|meccan|autolavag|benzin|distribut|(?<!agri)hotel|ristoran(?!.*camp)|b&b(?!.*camp)|motel|ostello|pizzer|autorimess|tankstelle|werkstatt|waschanlage|pension(?!.*camp)|gaststätte|restaurant|gasolinera|taller|lavadero|hostal|station.service|(?<!agri)garage|auberge/i;
  // Park4Night supplementary search (unofficial API, no auth required)
  let p4nResults=[];
  try{
    const p4nR=await fetch("https://guest.park4night.com/services/V4.1/lieuxGetFilter.php?latitude="+lat+"&longitude="+lng+"&distance=30",{signal:AbortSignal.timeout(8000)});
    const p4nD=await p4nR.json();
    if(Array.isArray(p4nD)){
      p4nResults=p4nD.slice(0,30).map(function(p){
        const pLat=parseFloat(p.latitude);const pLng=parseFloat(p.longitude);
        if(!pLat||!pLng)return null;
        return{
          id:"p4n_"+p.id,name:p.titre||p.description_fr||"Park4Night",
          address:p.adresse||"",city:p.ville||"",
          lat:pLat,lng:pLng,distKm:calcDistKm(lat,lng,pLat,pLng),
          website:"https://park4night.com/lieu/"+p.id,phone:null,
          isCamp:/camp/i.test(p.titre||""),cat:"park4night",
          _source:"park4night",_rating:p.note_moy||null,_reviews:p.nb_commentaires||0
        };
      }).filter(Boolean);
    }
  }catch(e){/* park4night non disponibile */}
  const osmResults=elements
    .map(function(el){
      const t=el.tags||{};
      const elLat=el.lat!==undefined?el.lat:(el.center?el.center.lat:null);
      const elLng=el.lon!==undefined?el.lon:(el.center?el.center.lon:null);
      if(!elLat||!elLng)return null;
      const rawName=t.name||t["name:en"]||t["name:de"]||t["name:fr"]||t["name:es"]||t["name:it"]||t["name:nl"]||t["name:pt"]||"";
      const fallbackName=t["amenity"]==="sanitary_dump_station"?"Scarico acque/Dump station":t["motorhome"]==="designated"?"Stellplatz / Area sosta":"Area sosta camper";
      const name=rawName||(fallbackName+(city?" — "+city:""));
      if(rawName&&BLACKLIST.test(rawName)&&!/(camp|sosta|stell|wohnmobil|motorhome|caravan)/i.test(rawName+" "+(t.tourism||"")+" "+(t.amenity||"")))return null;
      const addr=[t["addr:street"],t["addr:housenumber"],t["addr:city"]].filter(Boolean).join(", ");
      const city=t["addr:city"]||t["addr:municipality"]||t["addr:town"]||"";
      const distKm=calcDistKm(lat,lng,elLat,elLng);
      const isCamp=/(camp_site|camping)/i.test(t.tourism||t.amenity||"");
      const isDump=t.amenity==="sanitary_dump_station";
      const isStellplatz=t.motorhome==="designated"||t.caravan_site==="motorhome_stopover";
      const cat=isDump?"dump_station":isStellplatz?"stellplatz":(t.tourism||t.amenity||(t.motorhome?"area sosta":"area sosta"));
      return{
        id:el.id,name,
        address:addr||city||"",city,
        lat:elLat,lng:elLng,distKm,
        website:t.website||t["contact:website"]||null,
        phone:t.phone||t["contact:phone"]||null,
        isCamp,isDump,isStellplatz,cat,
        _source:"osm",_capacity:t.capacity||null,_fee:t.fee||null
      };
    })
    .filter(Boolean);
  // Deduplicate OSM results by proximity (100m) — keeps first (closest) of each cluster
  const dedupOsm=[];
  for(const r of osmResults){
    const dup=dedupOsm.some(function(m){return calcDistKm(m.lat,m.lng,r.lat,r.lng)<0.1;});
    if(!dup)dedupOsm.push(r);
  }
  // Merge OSM + Park4Night, deduplicate by proximity (100m)
  const merged=[...dedupOsm];
  for(const p of p4nResults){
    const dup=merged.some(function(m){return calcDistKm(m.lat,m.lng,p.lat,p.lng)<0.1;});
    if(!dup)merged.push(p);
  }
  return merged
    .sort(function(a,b){return a.distKm-b.distKm;})
    .slice(0,80);
}
/* ─── Decodifica polyline Valhalla (precision 6) ─── */
function decodePolyline6(enc){
  const pts=[];let idx=0,lat=0,lng=0;
  while(idx<enc.length){
    let b,shift=0,res=0;
    do{b=enc.charCodeAt(idx++)-63;res|=(b&0x1f)<<shift;shift+=5;}while(b>=0x20);
    lat+=(res&1)?~(res>>1):(res>>1);
    shift=0;res=0;
    do{b=enc.charCodeAt(idx++)-63;res|=(b&0x1f)<<shift;shift+=5;}while(b>=0x20);
    lng+=(res&1)?~(res>>1):(res>>1);
    pts.push({lat:lat/1e6,lng:lng/1e6});
  }
  return pts;
}
/* ─── ROUTING: Valhalla/OSM (nessuna API key) ─── */
async function checkRouting(_key,dest,camper){
  const VALHALLA="https://valhalla1.openstreetmap.de/route";
  const D=0.04;
  const approaches=[
    {dir:"N",  lat:dest.lat+D,    lng:dest.lng},
    {dir:"NE", lat:dest.lat+D*.7, lng:dest.lng+D*.7},
    {dir:"E",  lat:dest.lat,      lng:dest.lng+D},
    {dir:"SE", lat:dest.lat-D*.7, lng:dest.lng+D*.7},
    {dir:"S",  lat:dest.lat-D,    lng:dest.lng},
    {dir:"W",  lat:dest.lat,      lng:dest.lng-D},
  ];
  async function tryValhalla(from,costing,costingOpts){
    const body={
      locations:[{lon:from.lng,lat:from.lat},{lon:dest.lng,lat:dest.lat}],
      costing,
      costing_options:costingOpts||{},
      directions_options:{units:"kilometers",language:"it-IT"}
    };
    try{
      const r=await fetch(VALHALLA,{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify(body),signal:AbortSignal.timeout(20000)
      });
      if(!r.ok)return{ok:false};
      const d=await r.json();
      if(!d.trip?.summary)return{ok:false};
      const s=d.trip.summary;
      const pts=d.trip.legs?.[0]?.shape?decodePolyline6(d.trip.legs[0].shape):[];
      return{ok:true,dist:s.length.toFixed(1),time:Math.round(s.time/60),points:pts};
    }catch(e){return{ok:false};}
  }
  const truckOpts={truck:{length:camper.length,width:camper.width,height:camper.height,weight:camper.weight*1000,axle_load:camper.weight*500}};
  // Run all approaches in parallel for speed
  const [carResults,truckResults]=await Promise.all([
    Promise.all(approaches.slice(0,3).map(f=>tryValhalla(f,"auto").then(r=>({...r,dir:f.dir})))),
    Promise.all(approaches.map(f=>tryValhalla(f,"truck",truckOpts).then(r=>({...r,dir:f.dir}))))
  ]);
  const car=carResults.find(r=>r.ok)||null;
  const truckOk=truckResults.filter(r=>r.ok).sort((a,b)=>parseFloat(a.dist)-parseFloat(b.dist));
  const truck=truckOk[0]||null;
  // Alternative truck approaches: other successful directions beyond the primary
  const alternatives=truckOk.slice(1).map(t=>({
    dir:t.dir,dist:t.dist,time:t.time,
    extraKm:car?(parseFloat(t.dist)-parseFloat(car.dist)).toFixed(1):"?"
  }));
  if(truck&&car){
    const ratio=(parseFloat(truck.dist)-parseFloat(car.dist))/parseFloat(car.dist);
    return{ok:true,restricted:ratio>0.3,dist:truck.dist,time:truck.time,points:truck.points,ratio,primaryDir:truck.dir,alternatives,source:"Valhalla/OSM"};
  }
  if(truck)return{ok:true,restricted:false,dist:truck.dist,time:truck.time,points:truck.points,ratio:0,primaryDir:truck.dir,alternatives,source:"Valhalla/OSM"};
  if(car)return{ok:true,restricted:false,dist:car.dist,time:car.time,points:car.points,ratio:0,primaryDir:"auto",alternatives:[],source:"Valhalla/OSM",note:"Solo routing auto disponibile"};
  return{ok:false,restricted:false,dist:null,time:null,points:[],primaryDir:null,alternatives:[],source:"Valhalla/OSM"};
}
/* ─── Geolocation: posizione reale utente ─── */
function getUserPosition(){
  return new Promise((resolve)=>{
    if(!navigator.geolocation){resolve(null);return;}
    navigator.geolocation.getCurrentPosition(
      pos=>resolve({lat:pos.coords.latitude,lng:pos.coords.longitude}),
      ()=>resolve(null),
      {enableHighAccuracy:true,timeout:8000,maximumAge:60000}
    );
  });
}
/* ─── Valhalla truck route: da posizione reale a destinazione ─── */
async function routeFromUser(userPos,dest,camper){
  if(!userPos)return null;
  const VALHALLA="https://valhalla1.openstreetmap.de/route";
  const truckOpts={truck:{length:camper.length,width:camper.width,height:camper.height,weight:camper.weight*1000,axle_load:camper.weight*500}};
  try{
    const r=await fetch(VALHALLA,{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        locations:[{lon:userPos.lng,lat:userPos.lat},{lon:dest.lng,lat:dest.lat}],
        costing:"truck",costing_options:truckOpts,
        directions_options:{units:"kilometers",language:"it-IT"}
      }),signal:AbortSignal.timeout(25000)
    });
    if(!r.ok)return null;
    const d=await r.json();
    if(!d.trip?.summary)return null;
    const s=d.trip.summary;
    const pts=d.trip.legs?.[0]?.shape?decodePolyline6(d.trip.legs[0].shape):[];
    return{ok:true,dist:s.length.toFixed(1),time:Math.round(s.time/60),points:pts};
  }catch(e){return null;}
}
/* ─── Park4Night: link diretto (nessuna API) ─── */
function openP4N(lat,lng,e){
  if(e){e.preventDefault();e.stopPropagation();}
  window.open("https://park4night.com/it/search?lat="+lat+"&lng="+lng+"&z=17","_blank");
}
/* ─── Mapillary: foto stradali reali (gratuita — chiave da mapillary.com/developer) ─── */
async function getMapillaryData(lat,lng,mlyKey){
  if(!mlyKey)return null;
  const delta=0.003;
  const bbox=[lng-delta,lat-delta,lng+delta,lat+delta].join(",");
  try{
    const r=await fetch(

7. COMPATIBILITÀ: il camper da ${camper.length}m×${camper.width}m×${camper.height}m può passare? Sì/No/Dubbio

Rispondi in modo CONCISO (max 150 parole totali). Formato:
FOTO_1: [osservazioni principali, stima misure, compatibilità]
FOTO_2: [...]

    const models=["gemini-2.5-flash","gemini-2.0-flash","gemini-2.5-flash-lite"];

           }),signal:AbortSignal.timeout(20000)}

/* ─── OpenRouteService HGV routing ─── */
async function checkORS_HGV(dest, camper) {
  const approaches = [
    {dir:"N", lat:dest.lat+0.04, lng:dest.lng},
    {dir:"S", lat:dest.lat-0.04, lng:dest.lng},
    {dir:"E", lat:dest.lat, lng:dest.lng+0.04},
  ];
  const results = [];
  for(const from of approaches) {
    try {
      const body = {
        coordinates: [[from.lng, from.lat], [dest.lng, dest.lat]],
        options: {
          vehicle_type: "hgv",
          profile_params: {
            restrictions: {
              length: camper.length,
              width: camper.width,
              height: camper.height,
              weight: camper.weight
            }
          }
        }
      };
      const r = await fetch("https://api.openrouteservice.org/v2/directions/driving-hgv/json", {
        method: "POST",
        headers: {"Content-Type": "application/json", "Accept": "application/json"},
        body: JSON.stringify(body),
        signal: AbortSignal.timeout(12000)
      });
      if (!r.ok) continue;
      const d = await r.json();
      const route = d.routes?.[0];
      if (route) {
        results.push({
          dir: from.dir,
          dist: (route.summary.distance / 1000).toFixed(1),
          time: Math.round(route.summary.duration / 60),
          warnings: route.warnings || [],
          ok: true
        });
      }
    } catch(e) { continue; }
  }
  if (results.length === 0) return null;
  const best = results.sort((a,b) => parseFloat(a.dist) - parseFloat(b.dist))[0];
  return { ok: true, dist: best.dist, time: best.time, dir: best.dir, warnings: best.warnings, alternatives: results.slice(1), source: "OpenRouteService HGV" };
}
/* ─── Mapillary: foto lungo il percorso (ultimo km) ─── */
async function getMapillaryRoutePhotos(routePoints, mlyKey) {
  if (!mlyKey || !routePoints || routePoints.length < 5) return null;
  const lastPts = routePoints.slice(-Math.min(routePoints.length, 30));
  const step = Math.max(1, Math.floor(lastPts.length / 4));
  const samplePts = [lastPts[0], lastPts[Math.min(step, lastPts.length-1)], lastPts[Math.min(step*2, lastPts.length-1)]].filter(Boolean);
  const allPhotos = [];
  for (const pt of samplePts) {
    const delta = 0.001;
    const bbox = [pt.lng-delta, pt.lat-delta, pt.lng+delta, pt.lat+delta].join(",");
    try {
      const r = await fetch(
        "https://graph.mapillary.com/images?fields=id,thumb_256_url,thumb_1024_url,captured_at,geometry&bbox="+bbox+"&limit=2&access_token="+mlyKey.trim(),
        {signal: AbortSignal.timeout(5000)}
      );
      const d = await r.json();
      if (d.data) allPhotos.push(...d.data);
    } catch(e) {}
  }
  if (allPhotos.length === 0) return null;
  const unique = [...new Map(allPhotos.map(p => [p.id, p])).values()];
  return {
    found: true,
    count: unique.length,
    hiResUrls: unique.slice(0, 3).map(i => i.thumb_1024_url).filter(Boolean),
    thumbUrls: unique.slice(0, 3).map(i => i.thumb_256_url).filter(Boolean),

  };
}

/* ─── 1. SWEPT PATH: traiettoria di sterzata ─── */
function calcSweptPath(camper){
  // Usa i valori reali se inseriti dall'utente, altrimenti stima geometrica
  const wb=camper.wheelbase||parseFloat((camper.length*0.55).toFixed(2));
  const rearOvh=camper.rearOverhang||parseFloat((camper.length*0.22).toFixed(2));
  const frontOvh=parseFloat((camper.length-wb-rearOvh).toFixed(2));
  const minR=parseFloat(Math.max(wb*1.4,6.5).toFixed(2));
  const rearSwing=parseFloat((Math.sqrt(minR**2+rearOvh**2)-minR).toFixed(2));
  const frontSwing=parseFloat((Math.sqrt((minR+wb)**2+frontOvh**2)-(minR+wb)).toFixed(2));
  const totWidth=parseFloat((camper.width+rearSwing+frontSwing+0.3).toFixed(1));
  const minEntry=parseFloat((totWidth+0.5).toFixed(1));
  return{wheelbase:wb.toFixed(2),rearOverhang:rearOvh.toFixed(2),frontOverhang:frontOvh.toFixed(2),minTurnRadius:minR.toFixed(2),rearSwing,frontSwing,totWidth,minEntry};
}
/* ─── 1b. SCORING: punteggio accessibilità 0-100 ─── */
function computeAccessibilityScore(camper, routing, extraData, pitchData, mapillaryData, mapillaryVision, countryInfo) {
  let score = 100;
  const penalties = [];
  const bonuses = [];
  const details = {};
  function pen(cat, pts, reason) { score -= pts; penalties.push({category:cat, points:pts, reason}); if(!details[cat]) details[cat]={value:null,penalty:0,note:""}; details[cat].penalty+=pts; details[cat].note+=(details[cat].note?" | ":"")+ reason; }
  function bon(cat, pts, reason) { score += pts; bonuses.push({category:cat, points:pts, reason}); }
  const osm = extraData?.osm || null;
  const elev = extraData?.elev || null;
  const critical = extraData?.critical || null;
  const swept = extraData?.swept || calcSweptPath(camper);
  // Road width checks
  const allWidths = [...(osm?.maxwidths||[]), ...(osm?.widths||[])].map(w => parseFloat(w)).filter(w => !isNaN(w));
  if (allWidths.length > 0) {
    const minW = Math.min(...allWidths);
    details.roadWidth = {value: minW, penalty: 0, note: ""};
    if (minW < camper.width + 1.2) { pen("roadWidth", 25, "Larghezza strada " + minW + "m < " + (camper.width+1.2).toFixed(1) + "m richiesti"); }
    else if (minW < camper.width + 1.5) { pen("roadWidth", 10, "Larghezza strada " + minW + "m vicina al limite"); }
  }
  // Height restriction
  const allHeights = [...(osm?.maxheights||[]), ...(critical?.restrictions||[]).filter(r=>r.maxheight).map(r=>r.maxheight)].map(h => parseFloat(h)).filter(h => !isNaN(h));
  if (allHeights.length > 0) {
    const minH = Math.min(...allHeights);
    details.height = {value: minH, penalty: 0, note: ""};
    if (minH < camper.height + 0.3) { pen("height", 30, "Altezza " + minH + "m < " + (camper.height+0.3).toFixed(1) + "m richiesti"); }
    else if (minH < camper.height + 0.6) { pen("height", 12, "Altezza " + minH + "m vicina al limite"); }
  }
  // Weight restriction
  const allWeights = [...(critical?.restrictions||[]).filter(r=>r.maxweight).map(r=>parseFloat(r.maxweight)), ...(critical?.bridges||[]).filter(b=>b.maxweight).map(b=>parseFloat(b.maxweight))].filter(w => !isNaN(w));
  if (allWeights.length > 0) {
    const minWt = Math.min(...allWeights);
    details.weight = {value: minWt, penalty: 0, note: ""};
    if (minWt < camper.weight) { pen("weight", 25, "Peso max " + minWt + "t < " + camper.weight + "t camper"); }
  }
  // Bridge weight
  const bridgeWeights = (critical?.bridges||[]).filter(b=>b.maxweight).map(b=>parseFloat(b.maxweight)).filter(w=>!isNaN(w));
  if (bridgeWeights.length > 0) {
    const minBw = Math.min(...bridgeWeights);
    if (minBw < camper.weight) { pen("bridge", 20, "Ponte con limite peso " + minBw + "t < " + camper.weight + "t"); }
  }
  // Gates
  const gateCount = (critical?.gates||[]).length;
  if (gateCount > 0) { pen("gates", Math.min(gateCount * 8, 24), gateCount + " cancello/i o sbarre rilevati"); }
  // Max length
  const maxLengths = [...(critical?.maxlengths||[])];
  if (maxLengths.length > 0) {
    const minLen = Math.min(...maxLengths);
    if (minLen < camper.length) { pen("maxlength", 30, "Limite lunghezza " + minLen + "m < " + camper.length + "m"); }
  }
  // Parking max length
  const parkLens = [...(critical?.parkingLimits||[])];
  if (parkLens.length > 0) {
    const minPL = Math.min(...parkLens);
    if (minPL < camper.length) { pen("parkingLength", 15, "Parcheggio max " + minPL + "m < " + camper.length + "m"); }
  }
  // Turning circles
  if (critical && critical.turningCircles === 0 && camper.length >= 10) { pen("turning", 5, "Nessun punto di inversione per camper " + camper.length + "m"); }
  if (critical && critical.turningCircles > 0) { bon("turning", 3, critical.turningCircles + " punto/i inversione trovati"); }
  // Gradient
  if (elev) {
    const maxGrad = parseFloat(elev.maxGradPct);
    if (maxGrad > 18) { pen("gradient", 20, "Pendenza " + maxGrad + "% molto ripida"); }
    else if (maxGrad > 12) { pen("gradient", 10, "Pendenza " + maxGrad + "% significativa"); }
  }
  // Routing
  if (routing) {
    if (!routing.ok) { pen("routing", 10, "Routing camion non disponibile"); }
    else if (routing.restricted) { pen("routing", 15, "Deviazione camion +" + Math.round((routing.ratio||0)*100) + "%"); }
  }
  // Surface
  const surfaces = [...(osm?.surfaces||[]), ...(pitchData?.surfaces||[])];
  const unpaved = surfaces.some(s => /gravel|grass|dirt|ground|earth|sand|mud|unpaved/i.test(s));
  const paved = surfaces.some(s => /asphalt|paved|concrete|sett/i.test(s));
  if (unpaved && camper.weight > 5) { pen("surface", 8, "Fondo non asfaltato con camper " + camper.weight + "t"); }
  if (paved && !unpaved) { bon("surface", 2, "Fondo asfaltato confermato"); }
  // Pitch lengths
  if (pitchData && pitchData.found && pitchData.pitchLengths.length > 0) {
    const pLens = pitchData.pitchLengths.map(l => parseFloat(l)).filter(l => !isNaN(l));
    if (pLens.length > 0 && pLens.every(l => l < camper.length + 1.5)) { pen("pitchLength", 20, "Piazzole tutte < " + (camper.length+1.5).toFixed(1) + "m"); }
  }
  // Internal road widths vs swept minEntry
  if (pitchData && pitchData.roadWidths && pitchData.roadWidths.length > 0) {
    const rw = pitchData.roadWidths.map(w => parseFloat(w)).filter(w => !isNaN(w));
    if (rw.length > 0 && rw.some(w => w < parseFloat(swept.minEntry))) { pen("internalRoads", 15, "Strade interne < " + swept.minEntry + "m swept path"); }
  }
  // Vision analysis
  if (mapillaryVision && mapillaryVision.ok && mapillaryVision.analysis) {
    const vTxt = mapillaryVision.analysis.toLowerCase();
    if (/incompatib|(\bno\b)|nicht|non passa/i.test(vTxt)) { pen("vision", 15, "Analisi visiva indica incompatibilita"); }
    else if (/dubb|doubt|difficile|uncertain/i.test(vTxt)) { pen("vision", 8, "Analisi visiva indica dubbi"); }
    else if (/compatib|ok|passa|sufficient/i.test(vTxt)) { bon("vision", 5, "Analisi visiva positiva"); }
  }
  // Online reviews
  if (extraData?.onlineReviews) {
    const revTxt = (extraData.onlineReviews||"").toLowerCase();
    if (/problem|difficile|strett|narrow|tight|nicht|eng|schwierig/i.test(revTxt)) { pen("reviews", 10, "Recensioni segnalano problemi di accesso"); }
    else if (/ador|perfect|great|excellent|facile|easy|bequem/i.test(revTxt)) { bon("reviews", 3, "Recensioni positive sull'accesso"); }
  }
  // No data penalty for large campers
  if (camper.length >= 10 && !osm?.found && !mapillaryData?.found && !extraData?.onlineReviews) { pen("noData", 10, "Nessun dato disponibile per camper " + camper.length + "m"); }
  // Clamp
  score = Math.max(0, Math.min(100, score));
  return {score, penalties, bonuses, details};
}
/* ─── 2. OSM OVERPASS: dati stradali reali ─── */
async function getOSMData(lat,lng){
  const query=`[out:json][timeout:15];
(
  way(around:400,${lat},${lng})["highway"]["maxwidth"];
  way(around:400,${lat},${lng})["highway"]["maxheight"];
  way(around:400,${lat},${lng})["highway"]["width"];
  way(around:400,${lat},${lng})["highway"]["surface"];
  way(around:400,${lat},${lng})["highway"]["lanes"];
  way(around:400,${lat},${lng})["highway"]["incline"];
  way(around:400,${lat},${lng})["highway"]["smoothness"];
  way(around:400,${lat},${lng})["highway"]["tracktype"];
  node(around:80,${lat},${lng})["barrier"];
  node(around:80,${lat},${lng})["maxheight"];
  node(around:80,${lat},${lng})["maxwidth"];
);
out body;`;
  try{
    const resp=await fetch("https://overpass-api.de/api/interpreter",{
      method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},
      body:"data="+encodeURIComponent(query),signal:AbortSignal.timeout(12000)
    });
    const data=await resp.json();
    if(!data.elements?.length)return{found:false};
    const r={maxwidths:[],maxheights:[],widths:[],surfaces:[],lanes:[],barriers:[],inclines:[],smoothness:[],tracktypes:[]};
    data.elements.forEach(el=>{
      if(el.tags?.maxwidth)  r.maxwidths.push(el.tags.maxwidth);
      if(el.tags?.maxheight) r.maxheights.push(el.tags.maxheight);
      if(el.tags?.width)     r.widths.push(el.tags.width);
      if(el.tags?.surface)   r.surfaces.push(el.tags.surface);
      if(el.tags?.lanes)     r.lanes.push(el.tags.lanes);
      if(el.tags?.barrier)   r.barriers.push(el.tags.barrier);
      if(el.tags?.incline)   r.inclines.push(el.tags.incline);
      if(el.tags?.smoothness) r.smoothness.push(el.tags.smoothness);
      if(el.tags?.tracktype) r.tracktypes.push(el.tags.tracktype);
    });
    Object.keys(r).forEach(k=>{r[k]=[...new Set(r[k])];});
    r.found=true;
    return r;
  }catch(e){return{found:false,err:e.message};}
}

      body:"data="+encodeURIComponent(query),signal:AbortSignal.timeout(15000)
    });
    const data=await resp.json();
    if(!data.elements?.length)return{found:false,bridges:[],restrictions:[],gates:[],turningCircles:0,maxlengths:[],parkingLimits:[],roadWidths:[],surfaces:[]};

      if(t.maxheight||t.maxwidth||t.maxweight||t.barrier) restrictions.push({id:el.id,type:el.type,barrier:t.barrier||null,maxheight:t.maxheight||null,maxwidth:t.maxwidth||null,maxweight:t.maxweight||null});

      if(t.highway==="turning_circle"||t.highway==="turning_loop") turningCircles++;
      if(t.highway&&t.maxlength) maxlengths.push(parseFloat(t.maxlength));
      if(t.amenity==="parking"&&t.maxlength) parkingLimits.push(parseFloat(t.maxlength));
      if(t.highway&&t.width) critRoadWidths.push(t.width);
      if(t.highway&&t.surface) critSurfaces.push(t.surface);

    return{found:true,
      bridges:[...new Map(bridges.map(b=>[b.id,b])).values()],
      restrictions:[...new Map(restrictions.map(r=>[r.id,r])).values()],
      gates:[...new Map(gates.map(g=>[g.id,g])).values()],
      turningCircles,
      maxlengths:[...new Set(maxlengths)],
      parkingLimits:[...new Set(parkingLimits)],
      roadWidths:[...new Set(critRoadWidths)],
      surfaces:[...new Set(critSurfaces)]
    };
  }catch(e){return{found:false,bridges:[],restrictions:[],gates:[],turningCircles:0,maxlengths:[],parkingLimits:[],roadWidths:[],surfaces:[]};}

/* ─── 3. OPEN-ELEVATION: pendenza accesso ─── */
async function getElevationGradient(lat,lng){
  const pts=Array.from({length:6},(_,i)=>({latitude:lat+(i*0.0022),longitude:lng}));
  try{
    const resp=await fetch("https://api.open-elevation.com/api/v1/lookup",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({locations:pts}),signal:AbortSignal.timeout(8000)
    });
    const data=await resp.json();
    const elevs=data.results.map(r=>r.elevation);
    const delta=Math.abs(elevs[5]-elevs[0]);
    const gradients=elevs.map((e,i)=>i>0?Math.abs(e-elevs[i-1])/244*100:0);
    const maxGrad=Math.max(...gradients);
    return{elevMin:Math.min(...elevs),elevMax:Math.max(...elevs),deltam:delta.toFixed(0),maxGradPct:maxGrad.toFixed(1),elevs:elevs.map(e=>Math.round(e))};
  }catch(e){return null;}
}
/* ─── 4. KEYWORD REVIEW BUILDER ─── */
function buildReviewKeywords(poi,camper,countryInfo){
  const name=poi.name;
  const loc=poi.city||poi.address.split(",").slice(-2).join(",");
  const lang=countryInfo?getLangForCountry(countryInfo.country):"it";
  const kw=getKeywordsForLang(lang);
  const kwIt=EU_KEYWORDS.it;
  const forumSites=(countryInfo&&EU_REGULATIONS[countryInfo.country])?EU_REGULATIONS[countryInfo.country].forumSites:["park4night.com"];
  const siteQueries=forumSites.slice(0,2).map(s=>`site:${s} "${name}"`);
  const localKw=[
    `"${name}" ${kw.narrow}`,
    `"${name}" ${kw.difficult}`,
    `${name} ${loc} camper oversize`,
    `${name} ${loc} motorhome`,
    ...siteQueries
  ];
  // Add Italian keywords too if destination is not in Italy
  if(lang!=="it")localKw.push(`"${name}" ${kwIt.narrow}`,`"${name}" ${kwIt.difficult}`);
  return localKw.join(" | ");
}
/* ─── 4b. OSTACOLI NASCOSTI: termini visivi non rilevabili da mappe vettoriali ─── */
function buildHiddenObstacleKeywords(poi,camper,countryInfo){
  const name=poi.name;
  const loc=poi.city||poi.address.split(",").slice(-2).join(",");
  const lang=countryInfo?getLangForCountry(countryInfo.country):"it";
  const kw=getKeywordsForLang(lang);
  const kwIt=EU_KEYWORDS.it;
  // Vegetazione sporgente
  const veg=[`"${name}" ${kw.branches}`,`"${name}" ${kwIt.branches}`].filter((v,i,a)=>a.indexOf(v)===i);
  // Strutture edilizie
  const edil=[`"${name}" ${kw.balcony}`,`"${name}" ${kw.wall}`,`"${name}" ${kw.arch}`];
  // Infrastrutture sospese
  const infra=[`"${name}" ${kw.cables}`];
  // Barriere fisiche accesso
  const barrier=[`"${name}" ${kw.gate}`,`"${name}" ${kw.bollard}`];
  // Review mining su forum camperisti
  const forumSites=(countryInfo&&EU_REGULATIONS[countryInfo.country])?EU_REGULATIONS[countryInfo.country].forumSites:["park4night.com"];
  const forum=[
    `${name} ${loc} ${kw.low}`,`${name} ${loc} ${kw.tight}`,
    ...forumSites.slice(0,2).map(s=>`site:${s} "${name}"`),
    `${name} camper "too tall" OR "too wide" OR "${kw.long}"`
  ];
  return{veg,edil,infra,barrier,forum,all:[...veg,...edil,...infra,...barrier,...forum].join(" | ")};
}

async function geminiDeepAnalysis(key,poi,camper,routing,extraData,mapillaryData,countryInfo){

  const prompt=buildAnalysisPrompt(poi,camper,routing,extraData,mapillaryData,countryInfo);

  const attempts=[
    {v:"v1beta",m:"gemini-2.5-flash"},
    {v:"v1beta",m:"gemini-2.5-pro"},
    {v:"v1beta",m:"gemini-3-flash"},
    {v:"v1beta",m:"gemini-3.1-flash-lite"},
    {v:"v1beta",m:"gemini-2.5-flash-lite"},
    {v:"v1beta",m:"gemini-2.0-flash"},
    {v:"v1",    m:"gemini-2.5-flash"},
    {v:"v1",    m:"gemini-2.5-flash-lite"},
    {v:"v1",    m:"gemini-2.5-pro"},
  ];
  const log=[];
  for(const {v,m} of attempts){
    let rawRes=null;
    let rawText=null;
    try{
      rawRes=await fetch(
        "https://generativelanguage.googleapis.com/"+v+"/models/"+m+":generateContent?key="+key.trim(),
        {method:"POST",headers:{"Content-Type":"application/json"},
         body:JSON.stringify({contents:[{parts:[{text:prompt}]}],tools:[{google_search:{}}],generationConfig:{maxOutputTokens:3500,temperature:0.3}})}
      );
    }catch(fetchErr){
      log.push(v+"/"+m+": FETCH FAILED — "+fetchErr.message);
      continue;
    }
    let d=null;
    try{
      rawText=await rawRes.text();
      d=JSON.parse(rawText);
    }catch(parseErr){
      log.push(v+"/"+m+": PARSE FAILED — HTTP "+rawRes.status+" — "+rawText?.slice(0,120));
      continue;
    }
    if(d.error){
      const st=d.error.status||String(rawRes.status);
      const msg=d.error.message||"";
      log.push(v+"/"+m+": "+st+" — "+msg.slice(0,80));
      // PERMISSION_DENIED può significare solo che QUEL modello non è accessibile
      // con questo piano → continua a provare gli altri modelli
      // Non fermarci mai in anticipo
      continue;
    }
    const parts=d.candidates?.[0]?.content?.parts||[];
    const txt=parts.filter(p=>p.text).map(p=>p.text).join("\n").trim();
    if(!txt||txt.length<30){
      // Diagnosi più precisa
      const finishReason=d.candidates?.[0]?.finishReason||"";
      const candidateCount=d.candidates?.length||0;
      const blockReason=d.promptFeedback?.blockReason||"";
      log.push(v+"/"+m+": risposta vuota/corta — candidates:"+candidateCount+" finishReason:"+finishReason+" blockReason:"+blockReason);
      // Se c'è del testo comunque (anche corto), usalo come fallback
      if(txt&&txt.length>5){
        return{verdict:"warn",confidence:40,sintesi:"",accesso:"",struttura:"",critici:"",consiglio:"",raw:txt};
      }
      continue;
    }
    const parsed=parseAIResponse(txt);
    if(!parsed){
      // parsing fallito ma abbiamo il testo → mostralo grezzo
      return{verdict:"warn",confidence:50,sintesi:"",accesso:"",struttura:"",critici:"",consiglio:"",raw:txt};
    }
    return parsed;
  }
  // Tutti i modelli falliti — mostra log completo
  const debugInfo=log.map((e,i)=>"["+(i+1)+"] "+e).join("\n");
  return{_apiError:"⚠️ Nessun modello Gemini ha risposto.\n\nLog completo:\n"+debugInfo+"\n\nSe la chiave è corretta, verifica connessione internet e riprova."};
}
/* ─── Parsing risposta AI strutturata ─── */
function parseAIResponse(txt){
  if(!txt||txt.length<20) return null;
  // Estrai sezione in modo robusto
  // Etichette che aprono una nuova sezione (lookahead stop)
  const SECTION_LABELS="VERDETTO|CONFIDENZA|SINTESI|ACCESSO_STRADALE|STREET_VIEW|OSTACOLI_NASCOSTI|SWEPT_PATH|TERRITORIO|PIAZZOLE_INTERNE|STRUTTURA|RECENSIONI|PUNTI_CRITICI|PERCORSI_ALTERNATIVI|CONSIGLIO";
  function get(keys){
    const ks=Array.isArray(keys)?keys:[keys];
    for(const key of ks){
      // Cerca la sezione fino alla prossima etichetta nota o fine testo
      const r1=new RegExp("^"+key+"[:\\s]+([\\s\\S]+?)(?=\\n(?:"+SECTION_LABELS+")[:\\s]|$)","im");
      const m1=txt.match(r1);
      if(m1){
        const v=m1[1].trim();
        if(v.length>2) return v;
      }
      // Fallback: solo la riga
      const r2=new RegExp("^"+key+"[:\\s]+(.+)","im");
      const m2=txt.match(r2);
      if(m2&&m2[1].trim().length>2) return m2[1].trim();
    }
    return "";
  }
  // Determina verdetto SOLO dalla riga VERDETTO: (evita falsi positivi nel testo)
  let verdict="warn";
  const verdRaw=(txt.match(/^VERDETTO[:\s]+(.+)/im)||[])[1]||"";
  const verdUp=verdRaw.trim().toUpperCase();
  if(verdUp.startsWith("NON ADATTO")||verdUp.includes("NON ADATTO")){
    verdict="no";
  } else if(verdUp.startsWith("ADATTO")||verdUp==="ADATTO"){
    verdict="ok";
  } else if(verdUp.startsWith("CON RISERVA")||verdUp.includes("RISERVA")){
    verdict="warn";
  } else {
    // Fallback: scansione limitata al campo PUNTI_CRITICI e SINTESI
    const up=txt.toUpperCase();
    const criticiTxt=(txt.match(/PUNTI_CRITICI[:\s]+([\s\S]+?)(?=\n[A-Z_]{3,}[:\s]|$)/i)||[])[1]||"";
    const hasCritici=criticiTxt.length>10&&!criticiTxt.toUpperCase().includes("NESSUN");
    if(up.includes("NON ADATTO")||up.includes("INCOMPATIB")||up.includes("SCONSIGLIATO")) verdict="no";
    else if(hasCritici) verdict="warn";
    else if(up.includes("ADATTO")||up.includes("IDONEO")||up.includes("ACCESSIBILE")) verdict="ok";
    // Default: warn — se il parser non riesce a capire il verdetto, meglio cautela
  }
  const confMatch=txt.match(/(\d{1,3})\s*%/);
  const confidence=confMatch?Math.min(100,Math.max(10,parseInt(confMatch[1]))):60;
  const sintesi    =get(["SINTESI","SUMMARY","SOMMARIO","RIASSUNTO"]);
  const accesso    =get(["ACCESSO_STRADALE","ACCESSO","STRADE","VIABILITA"]);
  const streetview =get(["STREET_VIEW","STREETVIEW","STREET VIEW","INGRESSO_VISIVO"]);
  const ostacoli   =get(["OSTACOLI_NASCOSTI","OSTACOLI NASCOSTI","OSTACOLI","HIDDEN_OBSTACLES"]);
  const sweptpath  =get(["SWEPT_PATH","SWEPT PATH","TRAIETTORIA","MANOVRA"]);
  const territorio =get(["TERRITORIO","GEOGRAFIA","ZONA","OROGRAFIA"]);
  const piazzole   =get(["PIAZZOLE_INTERNE","PIAZZOLE","PITCH","STALLI"]);
  const struttura  =get(["STRUTTURA","CAMPEGGIO"]);
  const recensioni =get(["RECENSIONI","RECENSIONE","OPINIONI","FEEDBACK"]);
  const critici    =get(["PUNTI_CRITICI","CRITICITA","PROBLEMI","LIMITAZIONI"]);
  const percorsiAlternativi=get(["PERCORSI_ALTERNATIVI","PERCORSI ALTERNATIVI","ALTERNATIVE","DEVIAZIONI"]);
  const consiglio  =get(["CONSIGLIO","RACCOMANDAZIONE","SUGGERIMENTO"]);
  const camperTag=(()=>{
    const lm=txt.match(/Lunghezza[:\s]+([\d.]+)\s*m/i);
    const wm=txt.match(/Larghezza[:\s]+([\d.]+)\s*m/i);
    const hm=txt.match(/Altezza[:\s]+([\d.]+)\s*m/i);
    if(lm&&wm&&hm) return lm[1]+"m×"+wm[1]+"m×"+hm[1]+"m";
    return "";
  })();
  return{verdict,confidence,sintesi,accesso,streetview,ostacoli,sweptpath,territorio,piazzole,struttura,recensioni,critici,percorsiAlternativi,consiglio,camperTag,raw:txt};
}

/* ─── Mappa: Leaflet + OpenStreetMap (gratuito, nessuna chiave) ─── */
function TomMap({center,zoom,markers,routePts,onPoiClick,height}){
  const ref=useRef(null);
  const map=useRef(null);
  const mks=useRef([]);
  const poly=useRef(null);
  const prevSig=useRef("");
  // Init mappa
  useEffect(()=>{
    if(!window.L||map.current||!ref.current)return;
    map.current=window.L.map(ref.current,{center:[center.lat,center.lng],zoom:zoom||11,zoomControl:true});
    window.L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
      maxZoom:19,attribution:'© <a href="https://openstreetmap.org">OSM</a>'
    }).addTo(map.current);
    setTimeout(()=>{if(map.current)map.current.invalidateSize();},150);
    return()=>{if(map.current){map.current.remove();map.current=null;}};
  },[]);
  // Centro e zoom
  useEffect(()=>{
    if(!map.current)return;
    map.current.setView([center.lat,center.lng],zoom||11);
  },[center.lat,center.lng,zoom]);
  // Marker
  useEffect(()=>{
    if(!map.current||!window.L)return;
    const sig=JSON.stringify(markers);
    if(sig===prevSig.current)return;
    prevSig.current=sig;
    mks.current.forEach(m=>m.remove());
    mks.current=[];
    (markers||[]).forEach(m=>{
      const s=m.isDest?34:m.isOversize?28:26;
      const bg=m.isDest?"#f97316":m.isOversize?"#16a34a":m._markerColor||(m.isCamp?"#8b5cf6":"#3b82f6");
      const html=`<div style="width:${s}px;height:${s}px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);background:${bg};border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.3);cursor:${m.isDest?"default":"pointer"}"></div>`;
      const icon=window.L.divIcon({html,className:"",iconSize:[s,s],iconAnchor:[s/2,s]});
      const wb=m.website?`<br><a href="${m.website}" target="_blank" onclick="event.stopPropagation()" style="color:#f97316;font-size:10px;font-weight:700">🌐 Sito web</a>`:"";
      const gm=`<br><a href="https://www.google.com/maps/search/${encodeURIComponent((m.name||"")+" "+(m.sub||""))}" target="_blank" onclick="event.stopPropagation()" style="color:#1a73e8;font-size:10px;font-weight:700">🗺 Google Maps</a>`;
      const p4n=`<br><a href="#" onclick="openP4N(${m.lat},${m.lng},event)" style="color:#7c3aed;font-size:10px;font-weight:700">🌿 Park4Night</a>`;
      const popup=window.L.popup({offset:[0,-s],maxWidth:200}).setContent(
        `<div style="font-family:Inter,sans-serif;padding:4px"><b style="font-size:12px">${m.name||""}</b><div style="font-size:10px;color:#666;margin:2px 0">${m.sub||""}</div><div style="margin-top:4px">${wb}${gm}${p4n}</div></div>`
      );
      const mk=window.L.marker([m.lat,m.lng],{icon}).addTo(map.current).bindPopup(popup);
      if(!m.isDest&&onPoiClick)mk.on("click",()=>{mk.openPopup();onPoiClick(m);});
      mks.current.push(mk);
    });
  },[JSON.stringify(markers)]);
  // Percorso
  useEffect(()=>{
    if(!map.current||!window.L)return;
    if(poly.current){poly.current.remove();poly.current=null;}
    if(!routePts?.length)return;
    poly.current=window.L.polyline(routePts.map(p=>[p.lat,p.lng]),{color:"#f97316",weight:4,opacity:.85}).addTo(map.current);
  },[routePts]);
  return<div ref={ref} style={{width:"100%",height:height||200}}/>;
}

function AnalisiScreen({poi,camper,ttKey,geminiKey,groqKey,mapillaryKey,onBack,onSave,tripMode,tripStops,onAddTrip}){

  function saveFeedback(correct, note) {
    const fb = {
      poiId: poi.id,
      poiName: poi.name,

      aiVerdict: analysis?.verdict,
      userVerdict: correct,

      score: scoreResult?.score
    };
    LS.setJ("oit_feedback_" + poi.id, fb);

    allFb.push(fb);
    LS.setJ("oit_feedback_all", allFb);
    setFeedback(fb);
  }
  function loadFromCache(){
    if(!cachedData)return;
    if(cachedData.analysis)setAnalysis(cachedData.analysis);
    if(cachedData.score)setScoreResult(cachedData.score);
    if(cachedData.routing)setRouting(cachedData.routing);
    if(cachedData.extraData)setExtraData(cachedData.extraData);
    if(cachedData.mapillaryVision)setMapillaryVision(cachedData.mapillaryVision);
    if(cachedData.mapillaryData)setMapillaryData(cachedData.mapillaryData);
    if(cachedData.pitchData)setPitchData(cachedData.pitchData);
    setUsedCache(true);
    setPhase("done");
  }
  useEffect(()=>{if(cachedData){loadFromCache();}else{run();}},[]);
  async function run(){
    // 1. Get user GPS position
    setPhase("gps");
    const uPos=await getUserPosition();
    setUserPos(uPos);

    setPhase("routing");

    ]);
    const swept=calcSweptPath(camper);

    setExtraData(extra);

    const pData=await getCampPitchData(poi.lat,poi.lng);
    setPitchData(pData);

    // 5. Mapillary: fetch street photos (optional, free API)

    // Route photos vision analysis
    if(geminiKey && rPhotosLocal && rPhotosLocal.hiResUrls && rPhotosLocal.hiResUrls.length>0){
      parallelTasks.push(analyzeMapillaryImages(geminiKey,rPhotosCur.hiResUrls,camper).then(v=>{routeVisionResult=v;}));
    }
    if(parallelTasks.length>0){
      if(phase!=="vision")setPhase("vision");
      await Promise.all(parallelTasks);
    }
    if(visionResult){setMapillaryVision(visionResult);extra.mapillaryVision=visionResult;}
    if(routeVisionResult && routeVisionResult.ok){
      extra.routeVision=routeVisionResult;
      // Merge route vision into main vision if no main vision
      if(!visionResult){setMapillaryVision(routeVisionResult);extra.mapillaryVision=routeVisionResult;}
    }
    if(reviewData)extra.onlineReviews=reviewData;
    // 5d. Compute accessibility score BEFORE AI
    const sRes=computeAccessibilityScore(camper, r, extra, pData, mlyData, visionResult, cInfo);
    setScoreResult(sRes);
    extra.accessibilityScore=sRes;
    // 5e. Inject historical feedback into extra
    const allFb=LS.getJ("oit_feedback_all")||[];
    const relevantFb=allFb.filter(fb=>fb.poiId===poi.id||(fb.poiName&&fb.poiName===poi.name));
    if(relevantFb.length>0) extra.historicalFeedback=relevantFb;
    setPhase("ai");
    let primaryAnalysis=null;
    let primarySource=null;
    if(groqKey){
      const prompt=buildAnalysisPrompt(poi,camper,r,extra,mlyData,cInfo);
      const groqRes=await groqDeepAnalysis(groqKey,prompt);
      if(groqRes&&!groqRes._apiError){
        const parsed=parseAIResponse(groqRes.txt);
        if(parsed){primaryAnalysis=parsed;primarySource="groq";}
      }
    }
    if(!primaryAnalysis&&geminiKey){
      const ai=await geminiDeepAnalysis(geminiKey,poi,camper,r,extra,mlyData,cInfo);
      if(ai?._apiError){
        setAiError(ai._apiError);
      } else if(ai){
        primaryAnalysis=ai;primarySource="gemini";
      }
    } else if(!primaryAnalysis&&!groqKey&&!geminiKey){
      setAiError("Nessuna chiave AI configurata. Aggiungi Groq (gratuita) o Gemini nel Profilo.");
    }
    if(primaryAnalysis){
      setAnalysis(primaryAnalysis);
      setAiSource(primarySource);
    }
    // Multi-model consensus
    let secAn=null;
    if(groqKey&&geminiKey&&primaryAnalysis){
      try{
        if(primarySource==="groq"){
          secAn=await geminiDeepAnalysis(geminiKey,poi,camper,r,extra,mlyData,cInfo);
        } else {
          const prompt2=buildAnalysisPrompt(poi,camper,r,extra,mlyData,cInfo);
          const groqRes2=await groqDeepAnalysis(groqKey,prompt2);
          if(groqRes2&&!groqRes2._apiError) secAn=parseAIResponse(groqRes2.txt);
        }
      }catch(e){}
    }
    if(secAn&&!secAn._apiError){
      setSecondAnalysis(secAn);
      if(secAn.verdict===primaryAnalysis.verdict){
        setConsensusNote("Consenso: entrambi i modelli concordano -> "+primaryAnalysis.verdict);
      } else {
        let cn="Disaccordo: "+primarySource+" dice "+primaryAnalysis.verdict+", l'altro dice "+secAn.verdict+". Valuta con cautela.";
        if((primaryAnalysis.verdict==="ok"&&secAn.verdict==="no")||(primaryAnalysis.verdict==="no"&&secAn.verdict==="ok")){
          primaryAnalysis.verdict="warn";
          primaryAnalysis.confidence=Math.min(primaryAnalysis.confidence,60);
          setAnalysis({...primaryAnalysis});
        }
        setConsensusNote(cn);
      }
    }
    setPhase("done");
    // Save to cache
    try{
      LS.setJ(cacheKey,{poi,analysis:primaryAnalysis,score:sRes,routing:r,extraData:extra,mapillaryData:mlyData,mapillaryVision:visionResult,pitchData:pData,timestamp:Date.now()});
    }catch(e){}
  }
  function handleSave(){
    onSave(poi,analysis);
    setSaved(true);
  }
  const vcfg={
    ok:{cls:"v-ok",bdg:"vb-ok",label:"✅ ADATTO AL TUO CAMPER",meterColor:"#16a34a"},
    warn:{cls:"v-warn",bdg:"vb-warn",label:"ADATTO CON ATTENZIONE",meterColor:"#ca8a04"},
    no:{cls:"v-no",bdg:"vb-no",label:"🔴 NON ADATTO — INCOMPATIBILITÀ RILEVATE",meterColor:"#dc2626"}
  };
  const vc=analysis?vcfg[analysis.verdict]||vcfg.warn:vcfg.warn;
  const gmUrl="https://www.google.com/maps/search/"+encodeURIComponent(poi.name+" "+poi.address);
  // Park4Night: cerca per nome e coord - formato più affidabile
  const webUrl=(poi.website&&poi.website.startsWith("http"))?poi.website:("https://www.google.com/search?q="+encodeURIComponent('"'+poi.name+'"'+' '+poi.address+' campeggio'));
  const mapillaryUrl="https://www.mapillary.com/app/?lat="+poi.lat+"&lng="+poi.lng+"&z=17&menu=false";
  const [showMapillary,setShowMapillary]=useState(false);
  return(
    <div className="pg fade">
      {/* Back + Title */}
      <div style={{display:"flex",gap:10,alignItems:"center"}}>
        <button className="btn bgh bsm" onClick={onBack}>← Torna</button>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontFamily:"Poppins",fontWeight:800,fontSize:14,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{poi.name}</div>
          <div style={{fontSize:11,color:"#64748b"}}>📍 {poi.address}</div>
        </div>
      </div>
      {/* Cache badge */}
      {usedCache&&(
        <div style={{display:"flex",alignItems:"center",gap:8,background:"#fef3c7",border:"1.5px solid #fde68a",borderRadius:10,padding:"8px 12px"}}>
          <span style={{fontSize:12}}>📦 Dati in cache</span>
          <span style={{fontSize:10,color:"#92400e"}}>Caricati da {new Date(cachedData?.timestamp).toLocaleDateString("it-IT")}</span>
          <button className="btn bsm" style={{marginLeft:"auto",background:"#fff7ed",color:"#ea580c",border:"1px solid #fed7aa",fontSize:10}} onClick={()=>{setUsedCache(false);setPhase("gps");setAnalysis(null);setScoreResult(null);run();}}>🔄 Rianalizza</button>
        </div>
      )}
      {cachedData&&!usedCache&&phase!=="done"&&(
        <div style={{display:"flex",alignItems:"center",gap:8,background:"#eff6ff",border:"1.5px solid #bfdbfe",borderRadius:10,padding:"8px 12px"}}>
          <span style={{fontSize:10,color:"#1d4ed8"}}>📦 Cache disponibile dal {new Date(cachedData.timestamp).toLocaleDateString("it-IT")}</span>
          <button className="btn bsm" style={{marginLeft:"auto",background:"#dbeafe",color:"#1d4ed8",border:"1px solid #93c5fd",fontSize:10}} onClick={loadFromCache}>Usa cache</button>
        </div>
      )}
      {/* Links rapidi */}
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        <a href={gmUrl} target="_blank" style={{textDecoration:"none"}}>
          <button className="btn bsm" style={{background:"#e8f0fe",color:"#1a73e8",border:"none",fontFamily:"Inter",fontWeight:700}}>🗺 Google Maps</button>
        </a>
        <button className="btn bsm" style={{background:"#f3e8ff",color:"#7c3aed",border:"none",fontFamily:"Inter",fontWeight:700}} onClick={()=>openP4N(poi.lat,poi.lng,null)}>🌿 Park4Night</button>
        <a href={webUrl} target="_blank" style={{textDecoration:"none"}}>
          <button className="btn bsm" style={{background:"#fff7ed",color:"#ea580c",border:"none",fontFamily:"Inter",fontWeight:700}}>{poi.website?"🌐 Sito":"🔍 Cerca"}</button>
        </a>
        <button className="btn bsm" style={{background:showMapillary?"#fef9c3":"#f0fdf4",color:showMapillary?"#a16207":"#15803d",border:"1.5px solid "+(showMapillary?"#fde047":"#86efac"),fontFamily:"Inter",fontWeight:700}} onClick={()=>setShowMapillary(v=>!v)}>
          📸 {showMapillary?"Chiudi Foto Stradale":"Foto Stradale"}
        </button>
      </div>
      {/* Link foto stradali — iframe non supportato dai servizi, apri in nuova scheda */}
      {showMapillary&&(
        <div style={{borderRadius:12,border:"1.5px solid #e2e8f0",background:"#f8fafc",padding:"12px 14px"}}>
          <div style={{fontFamily:"Poppins",fontWeight:700,fontSize:12,color:"#334155",marginBottom:10}}>📸 Foto Stradali — Ingresso Struttura</div>
          <a href={"https://maps.google.com/?cbll="+poi.lat+","+poi.lng+"&cbp=12,0,,0,0&layer=c"} target="_blank" style={{textDecoration:"none"}}>
            <div style={{display:"flex",alignItems:"center",gap:10,background:"#fff",border:"1.5px solid #bbf7d0",borderRadius:10,padding:"10px 12px"}}>
              <span style={{fontSize:22}}>🗺</span>
              <div>
                <div style={{fontWeight:700,fontSize:12,color:"#15803d"}}>Google Street View</div>
                <div style={{fontSize:10,color:"#64748b"}}>Vista panoramica 360° — tocca per aprire</div>
              </div>
              <span style={{marginLeft:"auto",fontSize:14,color:"#16a34a"}}>↗</span>
            </div>
          </a>
        </div>
      )}
      {/* Mappa con percorso reale da posizione GPS */}
      <div className="mwrap">
        <TomMap ttKey={ttKey} center={{lat:poi.lat,lng:poi.lng}} zoom={realRoute?8:14}
          markers={[
            {...poi,isDest:true,sub:poi.address,name:poi.name},
            ...(userPos?[{lat:userPos.lat,lng:userPos.lng,name:"📍 Tu sei qui",sub:"Posizione GPS",_markerColor:"#3b82f6"}]:[])
          ]}
          routePts={realRoute?.points?.length?realRoute.points:(routing?.points?.length?routing.points:null)} height={220}/>
      </div>
      {/* Route info */}
      {realRoute&&(
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <div style={{flex:1,background:"#eff6ff",borderRadius:10,padding:"8px 10px",textAlign:"center"}}>
            <div style={{fontSize:16,fontWeight:800,color:"#1d4ed8"}}>{realRoute.dist} km</div>
            <div style={{fontSize:10,color:"#64748b"}}>Percorso camion {camper.length}m</div>
          </div>
          <div style={{flex:1,background:"#f0fdf4",borderRadius:10,padding:"8px 10px",textAlign:"center"}}>
            <div style={{fontSize:16,fontWeight:800,color:"#16a34a"}}>{Math.floor(realRoute.time/60)}h {realRoute.time%60}min</div>
            <div style={{fontSize:10,color:"#64748b"}}>Tempo stimato</div>
          </div>
        </div>
      )}
      {!userPos&&phase==="done"&&(
        <div style={{fontSize:11,color:"#a16207",background:"#fef9c3",borderRadius:8,padding:"6px 10px",textAlign:"center"}}>
          📍 GPS non disponibile — attiva la geolocalizzazione per il percorso dalla tua posizione
        </div>
      )}
      {/* Link satellite */}
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        <a href={"https://www.google.com/maps/@"+poi.lat+","+poi.lng+",18z/data=!3m1!1e1"} target="_blank" style={{flex:1,textDecoration:"none"}}>
          <div style={{background:"#fef3c7",borderRadius:10,padding:"8px 10px",textAlign:"center",border:"1px solid #fde68a"}}>
            <div style={{fontSize:14}}>🛰</div>
            <div style={{fontSize:10,fontWeight:700,color:"#92400e"}}>Vista Satellite</div>
          </div>
        </a>
        <a href={"https://www.google.com/maps/dir/?api=1&destination="+poi.lat+","+poi.lng+"&travelmode=driving"} target="_blank" style={{flex:1,textDecoration:"none"}}>
          <div style={{background:"#eff6ff",borderRadius:10,padding:"8px 10px",textAlign:"center",border:"1px solid #bfdbfe"}}>
            <div style={{fontSize:14}}>🧭</div>
            <div style={{fontSize:10,fontWeight:700,color:"#1d4ed8"}}>Naviga con Google</div>
          </div>
        </a>
      </div>
      {/* Loading phases */}
      {phase!=="done"&&(
        <div style={{background:"#fff",border:"1.5px solid #e2e8f0",borderRadius:14,padding:"14px 16px"}}>
          <div style={{fontFamily:"Poppins",fontWeight:700,fontSize:13,marginBottom:10}}>🔍 Analisi in corso...</div>
          {[
            ["gps","📍 Rilevamento posizione GPS..."],
            ["routing","🗺 Calcolo percorso camion "+camper.length+"m (Valhalla + ORS HGV)..."],
            ["osm","🗄 Query Overpass: ponti, strettoie, restrizioni..."],
            ["pitches","🏕 Piazzole e strade interne campeggio (OSM)..."],
            ...(mapillaryKey?[["mapillary","📸 Mapillary: foto stradali ingresso..."]]:[] ),
            ...(geminiKey?[["vision","👁 Analisi visiva + ricerca recensioni online (Gemini)..."]]:[] ),
            ["ai","🤖 Analisi AI"+(groqKey&&geminiKey?" + Consenso multi-modello":"")+": "+(groqKey?"Groq":"")+(groqKey&&geminiKey?" + ":"")+(geminiKey?"Gemini":"")+"..."]
          ].map(([p,label])=>(
            <div key={p} className="step-row">
              <div className="step-dot" style={{
                background:phase===p?"#f97316":["done"].includes(phase)?"#16a34a":"#e2e8f0"
              }}/>
              <span style={{color:phase===p?"#1a1a2e":"#94a3b8",fontWeight:phase===p?600:400}}
                className={phase===p?"pulse":""}>{label}</span>
              {phase===p&&<span className="spin" style={{marginLeft:"auto"}}/>}
              {phase==="done"&&<span style={{marginLeft:"auto",color:"#16a34a",fontSize:12}}>✓</span>}
            </div>
          ))}
        </div>
      )}
      {/* Riquadro dati tecnici pre-analisi */}
      {(routing||extraData.swept)&&(
        <div style={{background:"#f8fafc",border:"1.5px solid #e2e8f0",borderRadius:12,padding:"10px 14px",fontSize:12}}>
          <div style={{fontWeight:700,color:"#334155",marginBottom:6,fontSize:13}}>📊 Dati Tecnici Raccolti</div>
          {routing&&<div style={{color:"#64748b",marginBottom:4}}>
            <b>🗺 Valhalla/OSM:</b> {routing.ok
              ?(routing.restricted
                ?"⚠️ "+routing.dist+"km da "+routing.primaryDir+" — deviazione camion (+"+Math.round((routing.ratio||0)*100)+"%)"
                :"✅ "+routing.dist+"km · "+routing.time+"min da "+routing.primaryDir+" per "+camper.length+"m×"+camper.width+"m×"+camper.height+"m")
              :(routing.restricted?"🚫 Restrizioni dimensionali":"⚠️ Percorso non calcolabile")}
            {routing.alternatives&&routing.alternatives.length>0&&(
              <span style={{color:"#0369a1",marginLeft:4,fontSize:11}}>
                {" · Alt: "+routing.alternatives.map(a=>a.dir+" "+a.dist+"km").join(", ")}
              </span>
            )}
          </div>}
          {extraData.critical&&extraData.critical.found&&(extraData.critical.bridges.length>0||extraData.critical.restrictions.length>0||extraData.critical.gates?.length>0)&&<div style={{color:"#b91c1c",marginBottom:4}}>
            <b>🌉 Punti critici Overpass:</b>
            {extraData.critical.bridges.length>0&&" "+extraData.critical.bridges.length+" ponte/i"}
            {extraData.critical.restrictions.length>0&&" · "+extraData.critical.restrictions.length+" restrizione/i"}
            {extraData.critical.gates?.length>0&&" · "+extraData.critical.gates.length+" cancello/sbarra"}
            {extraData.critical.turningCircles>0&&" · "+extraData.critical.turningCircles+" punto/i inversione"}
            {extraData.critical.maxlengths?.length>0&&" · lim.lungh: "+extraData.critical.maxlengths.join("/")+"m"}
            {extraData.critical.parkingLimits?.length>0&&" · parking max: "+extraData.critical.parkingLimits.join("/")+"m"}
          </div>}
          {extraData.critical&&extraData.critical.found&&extraData.critical.bridges.length===0&&extraData.critical.restrictions.length===0&&!extraData.critical.gates?.length&&<div style={{color:"#16a34a",marginBottom:4}}>
            <b>🌉 Overpass:</b> nessun ponte, restrizione o sbarra critica nel raggio 800m ✅
          </div>}
          {extraData.swept&&<div style={{color:"#1e3a5f",marginBottom:4}}>
            <b>📐 Swept Path:</b> raggio min {extraData.swept.minTurnRadius}m · sbalzo post. {extraData.swept.rearSwing}m · largh. min ingresso {extraData.swept.minEntry}m
          </div>}
          {extraData.osm&&extraData.osm.found&&<div style={{color:"#065f46",marginBottom:4}}>
            <b>🗄 OSM:</b>
            {extraData.osm.maxwidths.length?" largh.max "+extraData.osm.maxwidths.join("/")+"m":""}
            {extraData.osm.maxheights.length?" · alt.max "+extraData.osm.maxheights.join("/")+"m":""}
            {extraData.osm.surfaces.length?" · fondo "+extraData.osm.surfaces.join(", "):""}
            {extraData.osm.barriers.length?" · barriere: "+extraData.osm.barriers.join(", "):""}
            {extraData.osm.inclines?.length?" · pendenze: "+extraData.osm.inclines.join(", "):""}
            {extraData.osm.smoothness?.length?" · scorrevolezza: "+extraData.osm.smoothness.join(", "):""}
            {extraData.osm.tracktypes?.length?" · tipo: "+extraData.osm.tracktypes.join(", "):""}
            {!extraData.osm.maxwidths.length&&!extraData.osm.maxheights.length?" dati disponibili":""}
          </div>}
          {extraData.osm&&!extraData.osm.found&&<div style={{color:"#94a3b8",marginBottom:4}}><b>🗄 OSM:</b> nessun dato per questa zona</div>}
          {extraData.elev&&<div style={{color:"#7c3aed",marginBottom:4}}>
            <b>🏔 Elevazione:</b> {extraData.elev.elevMin}-{extraData.elev.elevMax}m s.l.m. · dislivello {extraData.elev.deltam}m · pendenza max {extraData.elev.maxGradPct}%
          </div>}
          {pitchData&&pitchData.found&&<div style={{color:"#b45309",marginBottom:4}}>
            <b>🏕 Piazzole OSM:</b> {pitchData.pitchCount} mappate
            {pitchData.pitchLengths.length?" · lungh. "+pitchData.pitchLengths.join("/")+"m":""}
            {pitchData.pitchWidths.length?" · largh. "+pitchData.pitchWidths.join("/")+"m":""}
            {pitchData.roadWidths.length?" · strade interne "+pitchData.roadWidths.join("/")+"m":""}
            {pitchData.surfaces.length?" · "+pitchData.surfaces.join(", "):""}
          </div>}
          {pitchData&&!pitchData.found&&<div style={{color:"#94a3b8",marginBottom:4}}><b>🏕 Piazzole:</b> non mappate su OSM — l'AI verificherà sul sito ufficiale</div>}
          {realRoute&&<div style={{color:"#1d4ed8"}}>
            <b>📍 Percorso reale:</b> {realRoute.dist}km · {Math.floor(realRoute.time/60)}h{realRoute.time%60}min (camion {camper.length}m dalla tua posizione)
          </div>}
          {orsRoute&&orsRoute.ok&&<div style={{color:"#7c3aed",marginBottom:4}}>
            <b>🛣 ORS HGV:</b> {orsRoute.dist}km · {orsRoute.time}min da {orsRoute.dir} {orsRoute.warnings.length>0?" · "+orsRoute.warnings.length+" avvisi":""}
          </div>}
          {orsRoute===null&&phase==="done"&&<div style={{color:"#94a3b8",marginBottom:4}}>
            <b>🛣 ORS HGV:</b> non disponibile
          </div>}
        </div>
      )}
      {/* Galleria foto Mapillary + analisi visiva */}
      {mapillaryData&&mapillaryData.found&&mapillaryData.thumbUrls&&mapillaryData.thumbUrls.length>0&&(
        <div style={{background:"#f8fafc",border:"1.5px solid #e2e8f0",borderRadius:12,padding:"10px 14px"}}>
          <div style={{fontWeight:700,color:"#334155",marginBottom:8,fontSize:13,display:"flex",alignItems:"center",gap:8}}>
            📸 Foto Stradali Ingresso (Mapillary)
            {mapillaryVision&&mapillaryVision.ok&&<span style={{background:"#dcfce7",color:"#166534",borderRadius:6,padding:"2px 8px",fontSize:10,fontWeight:700}}>👁 AI ha analizzato {mapillaryVision.photosAnalyzed} foto</span>}
          </div>
          <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4}}>
            {mapillaryData.thumbUrls.map(function(url,i){return(
              <img key={i} src={url} alt={"Foto "+(i+1)} style={{width:120,height:90,objectFit:"cover",borderRadius:8,border:"1.5px solid #e2e8f0",flexShrink:0}} loading="lazy"/>
            );})}
          </div>
          {mapillaryVision&&mapillaryVision.ok&&(
            <div style={{marginTop:8,fontSize:11,color:"#1e3a5f",background:"#eff6ff",borderRadius:8,padding:"8px 10px",border:"1px solid #bfdbfe",lineHeight:1.5,whiteSpace:"pre-wrap"}}>
              <b>👁 Analisi Visiva AI ({mapillaryVision.model}):</b>{"\n"}{mapillaryVision.analysis}
            </div>
          )}
        </div>
      )}
      {/* Route Photos (last km) */}
      {routePhotos&&routePhotos.found&&routePhotos.thumbUrls&&routePhotos.thumbUrls.length>0&&(
        <div style={{background:"#faf5ff",border:"1.5px solid #ddd6fe",borderRadius:12,padding:"10px 14px"}}>
          <div style={{fontWeight:700,color:"#5b21b6",marginBottom:8,fontSize:12}}>
            🛣 Foto lungo il percorso (ultimo km) — {routePhotos.count} foto
          </div>
          <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4}}>
            {routePhotos.thumbUrls.map(function(url,i){return(
              <img key={"rp"+i} src={url} alt={"Percorso "+(i+1)} style={{width:110,height:82,objectFit:"cover",borderRadius:8,border:"1.5px solid #ddd6fe",flexShrink:0}} loading="lazy"/>
            );})}
          </div>
        </div>
      )}
      {/* Satellite image when few Mapillary photos */}
      {phase==="done"&&(!mapillaryData?.found||!mapillaryData?.thumbUrls||mapillaryData?.thumbUrls?.length<2)&&(
        <div style={{background:"var(--card)",border:"1.5px solid var(--border2)",borderRadius:12,padding:"10px 14px"}}>
          <div style={{fontWeight:700,color:"#334155",marginBottom:8,fontSize:12}}>🛰 Vista Satellitare (ESRI)</div>
          <img src={`https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/export?bbox=${poi.lng-0.002},${poi.lat-0.0015},${poi.lng+0.002},${poi.lat+0.0015}&size=400,300&format=png&f=image`}
            style={{width:"100%",borderRadius:8,border:"1px solid var(--border2)"}} alt="Vista Satellitare" loading="lazy"
            onError={e=>{e.target.style.display="none";}}/>
          <div style={{fontSize:9,color:"var(--text3)",marginTop:4,textAlign:"center"}}>Immagine satellitare ESRI World Imagery — area circostante la struttura</div>
        </div>
      )}
      {/* Parametri di Riferimento per il Calcolo */}
      {extraData.swept&&(
        <div style={{background:"#eff6ff",border:"1.5px solid #bfdbfe",borderRadius:12,padding:"12px 14px",fontSize:12}}>
          <div style={{fontWeight:700,color:"#1e40af",marginBottom:8,fontSize:13}}>📐 Parametri di Riferimento per il Calcolo AI</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:"5px 12px",alignItems:"center"}}>

      </a>

  );

/* ══════════════════ CONFRONTO METE ══════════════════ */
function ConfrontoScreen({pois,camper,onBack}){
  const results=useMemo(()=>{
    return pois.map(p=>{
      const cacheKey="oit_cache_"+p.id;
      const cached=LS.getJ(cacheKey);
      const hasCache=cached&&(Date.now()-cached.timestamp<7*24*3600*1000);
      return{poi:p,cached:hasCache?cached:null};
    });
  },[pois]);
  const bestIdx=useMemo(()=>{
    let best=-1,bestScore=-1;
    results.forEach((r,i)=>{if(r.cached&&r.cached.score&&r.cached.score.score>bestScore){bestScore=r.cached.score.score;best=i;}});
    return best;
  },[results]);
  return(
    <div className="pg fade">
      <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:8}}>
        <button className="btn bgh bsm" onClick={onBack}>← Torna</button>
        <div style={{fontFamily:"Poppins",fontWeight:800,fontSize:14}}>⚖️ Confronto {pois.length} mete</div>
      </div>
      <div style={{overflowX:"auto",paddingBottom:8}}>
        <table style={{width:"100%",borderCollapse:"separate",borderSpacing:6,fontSize:11}}>
          <thead>
            <tr>
              <td style={{fontWeight:700,color:"var(--text2)",padding:4,minWidth:90}}></td>
              {results.map((r,i)=>(
                <td key={i} style={{padding:6,background:bestIdx===i?"#dcfce7":"var(--card)",border:"1.5px solid "+(bestIdx===i?"#86efac":"var(--border2)"),borderRadius:10,minWidth:120,verticalAlign:"top",textAlign:"center"}}>
                  <div style={{fontWeight:700,fontSize:12,marginBottom:4}}>{r.poi.name}</div>
                  {bestIdx===i&&<span style={{background:"#16a34a",color:"#fff",borderRadius:6,padding:"1px 6px",fontSize:9,fontWeight:700}}>Migliore</span>}
                </td>
              ))}
            </tr>
          </thead>
          <tbody>
            {[
              ["Punteggio",r=>r.cached?.score?r.cached.score.score+"/100":"—"],
              ["Verdetto",r=>r.cached?.analysis?({ok:"✅ Adatto",warn:"⚠️ Riserva",no:"🔴 Non adatto"}[r.cached.analysis.verdict]||"—"):"—"],
              ["Distanza",r=>r.cached?.routing?.dist?r.cached.routing.dist+"km":"—"],
              ["Tempo",r=>r.cached?.routing?.time?r.cached.routing.time+"min":"—"],
              ["Confidenza",r=>r.cached?.analysis?.confidence?r.cached.analysis.confidence+"%":"—"],
              ["Distanza",r=>r.poi.distKm<99?r.poi.distKm+"km":"—"],
            ].map(([label,fn])=>(
              <tr key={label}>
                <td style={{fontWeight:600,color:"var(--text2)",padding:"4px 6px"}}>{label}</td>
                {results.map((r,i)=>(
                  <td key={i} style={{padding:"4px 6px",textAlign:"center",background:bestIdx===i?"#f0fdf4":"transparent",borderRadius:6}}>{fn(r)}</td>
                ))}
              </tr>
            ))}
            <tr>
              <td style={{fontWeight:600,color:"var(--text2)",padding:"4px 6px"}}>Stato</td>
              {results.map((r,i)=>(
                <td key={i} style={{padding:"4px 6px",textAlign:"center",fontSize:10}}>
                  {r.cached?<span style={{color:"#16a34a",fontWeight:700}}>📦 Analizzato</span>:<span style={{color:"#94a3b8"}}>Non analizzato</span>}
                </td>
              ))}
            </tr>
            <tr>
              <td style={{fontWeight:600,color:"var(--text2)",padding:"4px 6px"}}>Sintesi</td>
              {results.map((r,i)=>(
                <td key={i} style={{padding:"4px 6px",fontSize:10,lineHeight:1.5,color:"var(--text2)"}}>{r.cached?.analysis?.sintesi||"—"}</td>
              ))}
            </tr>
          </tbody>
        </table>
      </div>
      {results.some(r=>!r.cached)&&(
        <div style={{fontSize:11,color:"#a16207",background:"#fef9c3",borderRadius:8,padding:"8px 10px",textAlign:"center"}}>
          ⚠️ Alcune mete non hanno ancora dati in cache. Analizzale singolarmente prima di confrontare.
        </div>
      )}
    </div>
  );
}
